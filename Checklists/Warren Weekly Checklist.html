document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f86f011b-15a4-4049-a213-1eddbafb4776\"><\/script>\n<\/head>\n<body>\n<div id=\"startDayBar\" style=\"max-width:920px;margin:16px auto 0;padding:9px 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#1c1a17;display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n<span style=\"font-weight:600;letter-spacing:.04em;\">WEEK STARTING ON:<\/span>\n<select id=\"startDaySel\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;padding:5px 10px;border:1px solid #cfc7b8;border-radius:8px;background:#fff;color:#1c1a17;cursor:pointer;\"><\/select>\n<span id=\"startDayHint\" style=\"color:#8a8175;\"><\/span>\n<\/div>\n<style id=\"colHLStyle\"><\/style>\n<script>\n(function(){\n  var DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];\n  var KEY='dcStartDay:'+location.pathname;\n  var sel=document.getElementById('startDaySel');\n  var hint=document.getElementById('startDayHint');\n  var st=document.getElementById('colHLStyle');\n  if(!sel||!st)return;\n  var o0=document.createElement('option');o0.value='';o0.textContent='— none —';sel.appendChild(o0);\n  for(var i=0;i<7;i++){var o=document.createElement('option');o.value=String(i);o.textContent=DAYS[i];sel.appendChild(o);}\n  var FULL=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];\n  function setDeadline(v){\n    var dl=document.getElementById('dcDeadline');\n    if(!dl)return;\n    dl.textContent=(v===''||v==null)?'Sunday':FULL[(parseInt(v,10)+6)%7];\n  }\n  function apply(v){\n    setDeadline(v);\n    if(v===''||v==null){st.textContent='';if(hint)hint.textContent='';return;}\n    var idx=parseInt(v,10);var n=3+idx;\n    st.textContent='.dc-hl-row>*:nth-child('+n+'){background:rgba(212,160,23,.18);}';\n    if(hint)hint.textContent='('+DAYS[idx]+' column highlighted)';\n  }\n  var saved='';try{saved= {{ yellow }} · 🟥 {{ red }} · = {{ redEq }} RED-EQ · LIMIT 10%<\/div>\n        <\/div>\n        <div style=\"flex:1;\">\n          <div style=\"position:relative; height:15px; background:#efe9df; border:1px solid #e0d8c9; border-radius:99px; overflow:hidden;\">\n            <div style=\"position:absolute; top:0; left:0; bottom:0; background:{{ barColor }}; width:{{ redBarStr }};\"><\/div>\n          <\/div>\n          <div style=\"display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.03em; margin-top:3px;\">\n            <span style=\"color:#8a8175;\">0% RED · SAFE<\/span><span style=\"color:#c0392b; font-weight:700;\">◄ 10% FAIL LIMIT<\/span>\n          <\/div>\n        <\/div>\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:500; letter-spacing:0.03em; padding:5px 13px; border-radius:99px; background:{{ badgeBg }}; color:{{ badgeFg }}; white-space:nowrap;\">{{ passLabel }} · {{ redPct }}%<\/div>\n        <button onclick=\"{{ reset }}\" class=\"screen-only\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.05em; color:#8a8175; background:none; border:1px solid #cfc7b8; border-radius:99px; padding:6px 13px; cursor:pointer;\">RESET<\/button>\n      <\/div>\n\n      <div style=\"margin:0 0 28px; padding:13px 16px; background:{{ failBg }}; border-left:3px solid {{ failBorder }}; border-radius:4px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.04em; color:#b4622f;\">🟨 <b style=\"font-size:15px; color:#8a6d00;\">{{ yellow }}<\/b> YELLOW · 🟥 <b style=\"font-size:15px; color:#c0392b;\">{{ red }}<\/b> RED · = <b style=\"font-size:15px; color:#c0392b;\">{{ redEq }}<\/b> RED-EQ<\/div>\n        <div style=\"font-size:14px; font-weight:700; color:#c0392b;\">{{ failMsg }}<\/div>\n      <\/div>\n\n      <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"5\">\n        <div class=\"grp\" style=\"margin-bottom:24px;\">\n          <div style=\"display:flex; align-items:baseline; gap:8px; margin-bottom:7px;\">\n            <span style=\"font-size:17px;\">{{ g.emoji }}<\/span>\n            <h2 style=\"font-family:'Fraunces',serif; font-weight:600; font-size:18px; margin:0; letter-spacing:0.01em;\">{{ g.title }}<\/h2>\n          <\/div>\n          <div class=\"dc-hl-row\" style=\"display:grid; grid-template-columns:minmax(0,1fr) 92px repeat(7,34px); align-items:end; border-bottom:1.5px solid #1c1a17; padding-bottom:6px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:10.5px; letter-spacing:0.06em; color:#6b6358; padding-left:4px;\">TASK<\/div>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:10.5px; letter-spacing:0.06em; color:#6b6358;\">NOTES<\/div>\n            <div style=\"text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; color:#1c1a17;\">MON<\/div>\n            <div style=\"text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; color:#1c1a17;\">TUE<\/div>\n            <div style=\"text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; color:#1c1a17;\">WED<\/div>\n            <div style=\"text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; color:#1c1a17;\">THU<\/div>\n            <div style=\"text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; color:#1c1a17;\">FRI<\/div>\n            <div style=\"text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; color:#b4622f;\">SAT<\/div>\n            <div style=\"text-align:center; font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:11px; color:#b4622f;\">SUN<\/div>\n          <\/div>\n          <sc-for list=\"{{ g.tasks }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div class=\"dc-hl-row\" style=\"display:grid; grid-template-columns:minmax(0,1fr) 92px repeat(7,34px); align-items:center; border-bottom:1px solid #e6e0d6;\">\n              <div style=\"font-size:14.5px; padding:9px 8px 9px 4px;\">{{ t.name }}<\/div>\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#8a8175; padding-right:6px;\">{{ t.notes }}<\/div>\n              <div onclick=\"{{ t.b0.onClick }}\" style=\"display:flex; justify-content:center; padding:9px 0; cursor:pointer;\"><span style=\"{{ t.b0.spanStyle }}\">{{ t.b0.glyph }}<\/span><\/div>\n              <div onclick=\"{{ t.b1.onClick }}\" style=\"display:flex; justify-content:center; padding:9px 0; cursor:pointer;\"><span style=\"{{ t.b1.spanStyle }}\">{{ t.b1.glyph }}<\/span><\/div>\n              <div onclick=\"{{ t.b2.onClick }}\" style=\"display:flex; justify-content:center; padding:9px 0; cursor:pointer;\"><span style=\"{{ t.b2.spanStyle }}\">{{ t.b2.glyph }}<\/span><\/div>\n              <div onclick=\"{{ t.b3.onClick }}\" style=\"display:flex; justify-content:center; padding:9px 0; cursor:pointer;\"><span style=\"{{ t.b3.spanStyle }}\">{{ t.b3.glyph }}<\/span><\/div>\n              <div onclick=\"{{ t.b4.onClick }}\" style=\"display:flex; justify-content:center; padding:9px 0; cursor:pointer;\"><span style=\"{{ t.b4.spanStyle }}\">{{ t.b4.glyph }}<\/span><\/div>\n              <div onclick=\"{{ t.b5.onClick }}\" style=\"display:flex; justify-content:center; padding:9px 0; cursor:pointer;\"><span style=\"{{ t.b5.spanStyle }}\">{{ t.b5.glyph }}<\/span><\/div>\n              <div onclick=\"{{ t.b6.onClick }}\" style=\"display:flex; justify-content:center; padding:9px 0; cursor:pointer;\"><span style=\"{{ t.b6.spanStyle }}\">{{ t.b6.glyph }}<\/span><\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/sc-for>\n\n      <div style=\"display:flex; gap:14px; margin-top:30px;\">\n        <div style=\"flex:1; border:1.5px solid #3f7d4e; border-radius:5px; padding:13px 16px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.05em; color:#3f7d4e; margin-bottom:3px;\">PASS · RED ≤ 10%<\/div>\n          <div style=\"font-size:13.5px; color:#4a443c;\">Reward unlocked 🎉 — write it here: ____________________<\/div>\n        <\/div>\n        <div style=\"flex:1; border:1.5px solid #b4622f; border-radius:5px; padding:13px 16px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.05em; color:#b4622f; margin-bottom:3px;\">PENALTY KICK · RED > 10%<\/div>\n          <div style=\"font-size:13.5px; color:#4a443c;\">Penalty: ____________________<\/div>\n        <\/div>\n      <\/div>\n\n    <\/td><\/tr><\/tbody>\n    <tfoot><tr><td class=\"ftr-space\"><\/td><\/tr><\/tfoot>\n  <\/table>\n<\/main>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { checked: {} };\n\n  componentDidMount() {\n    this.storageKey = 'warren_weekly_checklist_v2_cards';\n    this.cloudKey = 'warren_cards';\n    if (window.ChecklistCloud) {\n      window.ChecklistCloud.attach(this, this.cloudKey, this.storageKey);\n    } else {\n      try {\n        const raw = localStorage.getItem(this.storageKey);\n        if (raw) this.setState({ checked: JSON.parse(raw) });\n      } catch (e) {}\n    }\n  }\n\n  save(checked) {\n    if (window.ChecklistCloud) {\n      window.ChecklistCloud.save(this.cloudKey, checked, this.storageKey);\n    } else {\n      try { localStorage.setItem(this.storageKey, JSON.stringify(checked)); } catch (e) {}\n    }\n  }\n\n  toggle(id) {\n    this.setState(s => {\n      const checked = Object.assign({}, s.checked);\n      // cycle: on-track -> 1 (yellow) -> 2 (red) -> on-track\n      const cur = checked[id] || 0;\n      const next = (cur + 1) % 3;\n      if (next === 0) delete checked[id]; else checked[id] = next;\n      this.save(checked);\n      return { checked };\n    });\n  }\n\n  reset() {\n    const checked = {};\n    this.save(checked);\n    this.setState({ checked });\n  }\n\n  groupsDef() {\n    return [\n      { emoji: '🌅', title: 'Morning Routine', tasks: [\n        { name: 'Wake up & Get Ready Downstair', notes: '7:45 AM · Sat–Sun 8:45' },\n        { name: 'Prepare / organize clothes & other', notes: 'After waking' },\n        { name: 'Brush teeth', notes: 'Morning & night' },\n        { name: 'Keep bathroom / contact lenses clean', notes: 'Morning hygiene' },\n      ]},\n      { emoji: '📚', title: 'School & Learning', tasks: [\n        { name: 'Homework (School + After School)', notes: '—' },\n        { name: 'Read one book', notes: '30 min · finish in 2 wks' },\n      ]},\n      { emoji: '🧹', title: 'Chores & Cleanliness', tasks: [\n        { name: 'Clean room', notes: 'Each kid · own room' },\n        { name: 'Laundry', notes: 'Take turns' },\n        { name: 'Clean kitchen', notes: 'Take turns' },\n        { name: 'Keep stuff clean', notes: 'Ongoing' },\n        { name: 'Garbage', notes: 'Take out / empty bins' },\n      ]},\n      { emoji: '😇', title: 'Behavior', tasks: [\n        { name: 'Behave in public (sit properly, no lying on ground)', notes: 'In public' },\n        { name: 'Buckle seat belt in the car', notes: 'Every ride' },\n        { name: \"No using mom's iPhone without permission\", notes: 'Ask first' },\n        { name: 'Listen to instructions', notes: 'Ongoing' },\n        { name: 'Always having excuse', notes: 'Ongoing' },\n      ]},\n      { emoji: '🌙', title: 'Sleep', tasks: [\n        { name: 'Sleep at 10 PM', notes: 'by 10:00 PM' },\n      ]},\n    ];\n  }\n\n  renderVals() {\n    const groups = this.groupsDef();\n\n    const checked = this.state.checked || {};\n    const boxBase = 'display:flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:3px;font-size:12px;font-weight:700;line-height:1;font-family:IBM Plex Mono,monospace;';\n    const yellowStyle = boxBase + 'border:1.5px solid #d4a017;background:#f2c200;color:#5c4a00;';\n    const redStyle = boxBase + 'border:1.5px solid #a5281b;background:#c0392b;color:#fff;';\n    const normalStyle = (wknd) => boxBase + 'border:1.5px solid #bcd0bf;background:' + (wknd ? '#e3ecdd' : '#e9f0e6') + ';color:#3f7d4e;';\n\n    let total = 0, yellow = 0, red = 0, taskCount = 0;\n    groups.forEach((g, gi) => g.tasks.forEach((t, ti) => {\n      taskCount++;\n      for (let di = 0; di < 7; di++) {\n        total++;\n        const id = gi + '-' + ti + '-' + di;\n        const st = checked[id] || 0;      // 0 = on-track, 1 = yellow, 2 = red\n        if (st === 1) yellow++; else if (st === 2) red++;\n        const spanStyle = st === 1 ? yellowStyle : st === 2 ? redStyle : normalStyle(di >= 5);\n        const glyph = st === 1 ? '!' : st === 2 ? '✕' : '';\n        t['b' + di] = { onClick: () => this.toggle(id), spanStyle, glyph };\n      }\n    }));\n\n    const redEq = red + yellow / 2;                 // 2 yellow cards = 1 red card\n    const failLimit = total * 0.1;                  // PENALTY KICK if red rate exceeds 10%\n    const redPct = total ? Math.round(redEq / total * 100) : 0;\n    const pass = redEq <= failLimit;\n    const redLeft = Math.max(0, failLimit - redEq);\n    const penaltyHit = !pass;\n    const leftDisp = Number.isInteger(redLeft) ? String(redLeft) : redLeft.toFixed(1);\n    const redEqDisp = Number.isInteger(redEq) ? String(redEq) : redEq.toFixed(1);\n    const failMsg = penaltyHit\n      ? '⚽ PENALTY KICK — red-card rate is over 10%!'\n      : (redLeft < 1\n        ? '⚠ Nearly there — one more card = PENALTY KICK!'\n        : leftDisp + ' red-cards of room left before the PENALTY KICK');\n    const failBorder = penaltyHit ? '#c0392b' : (redLeft < 1 ? '#b4622f' : '#3f7d4e');\n    const failBg = penaltyHit ? '#fbeae7' : (redLeft < 1 ? '#f7ece5' : '#f6f3ed');\n    const redBarPct = failLimit ? Math.min(100, Math.round(redEq / failLimit * 100)) : 0;\n    let _sd = '';\n    try { _sd = localStorage.getItem('dcStartDay:' + location.pathname) || ''; } catch (e) {}\n    const deadline = (_sd === '' || _sd == null)\n      ? 'Sunday'\n      : ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][(parseInt(_sd, 10) + 6) % 7];\n\n    return {\n      groups, taskCount, total, yellow, red, redEq: redEqDisp, redPct, failMsg, failBg, failBorder, deadline,\n      redBarStr: redBarPct + '%',\n      passLabel: pass ? 'PASS ✓' : 'PENALTY KICK ⚽',\n      barColor: penaltyHit ? '#c0392b' : (redEq >= failLimit * 0.7 ? '#e08a1e' : '#3f7d4e'),\n      badgeBg: pass ? '#e7f0e9' : '#fbeae7',\n      badgeFg: pass ? '#3f7d4e' : '#c0392b',\n      reset: () => this.reset(),\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
