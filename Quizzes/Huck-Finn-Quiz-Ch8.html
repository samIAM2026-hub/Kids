<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 8 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Comprehension Quiz · Chapter 8 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 10</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Think about WHY, not just what happens. Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 8 · The Search",
    q:"The townspeople float loaves of bread on the river because they believe the bread will drift to Huck's drowned body. Why is it a funny, upside-down moment when Huck grabs one and eats it?",
    options:[
      "The bread was meant to find his dead body, but instead it feeds him — alive and hiding nearby",
      "The bread is poisoned and makes him sick",
      "It proves Huck really did drown",
      "The bread actually belonged to Jim"],
    answer:0,
    why:"We know Huck is alive, so the bread sent to find his 'body' ends up feeding the living boy watching the whole search. A twist like that is called irony." },

  { ch:"Chapter 8 · How Huck Thinks",
    q:"When the bread floats right to him, Huck decides maybe praying really does work after all. What does this tell us about how Huck decides what to believe?",
    options:[
      "He believes things based on whether they seem to work for him, not just because he's told to",
      "He has suddenly become very religious",
      "He no longer believes in luck or signs",
      "He wants to grow up to be a preacher"],
    answer:0,
    why:"Huck is practical — the widow's 'prayer' seemed to work because the bread reached him. He tests ideas by what actually happens instead of just accepting what adults tell him." },

  { ch:"Chapter 8 · Huck and the Town",
    q:"Huck hides and calmly watches Pap, the judge, and Tom search for his body — he even feels relaxed. What does this show about how he feels about his old life?",
    options:[
      "He's glad to be away from it and doesn't really want to go back",
      "He misses home and wants to return",
      "He feels so guilty he almost gives himself up",
      "He's angry that nobody is crying for him"],
    answer:0,
    why:"Instead of wanting to rejoin them, Huck is happy just to watch his old life look for him. Feeling that relaxed shows how much he prefers being free to living in town." },

  { ch:"Chapter 8 · Feeling Alone",
    q:"Before Jim shows up, Twain shows Huck getting lonely on the island. Why does the author include this part?",
    options:[
      "To show that being free isn't enough — Huck also needs a friend",
      "To show the island is haunted",
      "To make Huck want to go back to Pap",
      "To show Huck is scared of animals"],
    answer:0,
    why:"Huck's loneliness shows that escaping isn't enough by itself. It sets up why Jim's company means so much — their friendship, not just freedom, becomes the heart of the story." },

  { ch:"Chapter 8 · How Huck Acts",
    q:"Huck finds a campfire with ashes that are still warm. How does he act, and what does it show about him?",
    options:[
      "He's scared, but stays calm and careful and quietly checks who is there",
      "He shouts out loud to find them",
      "He leaves the island right away",
      "He kicks out the fire and hides it"],
    answer:0,
    why:"Huck is frightened but doesn't panic — he carefully watches and sneaks around to learn who it is. It shows he's smart and level-headed in a scary moment." },

  { ch:"Chapter 8 · Meeting Jim",
    q:"When Jim first sees Huck, he falls down and begs Huck not to haunt him. Why does Jim think that?",
    options:[
      "Everyone thinks Huck was murdered, so Jim believes he is seeing Huck's ghost",
      "Jim has never met Huck before",
      "Jim is only joking around",
      "Jim thinks Huck is his father, Pap"],
    answer:0,
    why:"The whole town believes Huck is dead. So when Jim sees the 'murdered' boy, he thinks it's a ghost — which also fits how much Jim believes in spirits and signs." },

  { ch:"Chapter 8 · Why Jim Ran",
    q:"Jim tells Huck why he ran away. What was he most afraid would happen to him?",
    options:[
      "Being sold far away to New Orleans, away from his wife and children",
      "Having to do extra chores for Miss Watson",
      "Being sent away to school",
      "Being set free before he was ready"],
    answer:0,
    why:"Jim heard Miss Watson thinking about selling him for $800. Being sold 'down the river' meant harder work far south and never seeing his family again — so he ran that same night." },

  { ch:"Chapter 8 · Huck's Choice",
    q:"Huck promises to keep Jim's secret, even though he says people would hate him and call him a bad name for helping a runaway. What does this choice show about Huck?",
    options:[
      "He stays loyal to his friend even though the town taught him it was wrong",
      "He has decided to fight to end slavery everywhere",
      "He is secretly planning to turn Jim in for money",
      "He doesn't really understand what he promised"],
    answer:0,
    why:"Huck keeps his promise to a friend even though he knows people would look down on him for it. It's an early sign that what Huck feels is right doesn't match what his town taught him." },

  { ch:"Chapter 8 · Two Runaways",
    q:"Huck and Jim both ran away on the very same night. Why does that matter in the story?",
    options:[
      "It connects them as two people escaping something unfair, and starts their journey together",
      "It proves they planned the escape as a team",
      "It shows the island is magic",
      "It means they are family"],
    answer:0,
    why:"Both are running from something unfair — Huck from Pap, Jim from being sold. Running the same night ties them together and begins the friendship that drives the rest of the book." },

  { ch:"Chapter 8 · Jim's Big Idea",
    q:"After losing all his money on a cow and other bad deals, Jim says he is rich because he 'owns himself' and is 'worth eight hundred dollars.' What does he really mean?",
    options:[
      "Being free — owning himself — is worth more than any money",
      "He found eight hundred dollars buried on the island",
      "He has lots of money saved at home",
      "He wants Huck to pay him eight hundred dollars"],
    answer:0,
    why:"Even after losing every bit of money, Jim says he's rich because he owns himself now. It turns a joke into a big idea: a person's freedom and worth are far more valuable than any price." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Think about WHY, not just what happens. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 8 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 8 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
