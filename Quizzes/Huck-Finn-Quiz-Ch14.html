<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 14 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Chapter 14 · Fill-in-the-Blank &amp; Comprehension · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 13</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80%</footer>
</div>

<script>
const questions = [
  // ---------- PART 1: FILL IN THE BLANK ----------
  { ch:"Part 1 · Fill in the Blank",
    q:"The morning after their narrow escape from the wreck, Huck happily called the whole scary night an ______, but Jim did not agree.",
    options:["accident","adventure","honor","errand"],
    answer:1,
    why:"Huck saw the dangerous night as a thrilling 'adventure' — but Jim, who had far more to lose, saw it very differently." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Jim said he wanted no more adventures, because he could have drowned or been captured and dragged back into ______.",
    options:["prison","the army","slavery","school"],
    answer:2,
    why:"For Jim the stakes were life-and-death: getting caught meant being returned to slavery, torn from his family. That's why he wanted no more risks." },

  { ch:"Part 1 · Fill in the Blank",
    q:"To pass the time, Huck read aloud to Jim about ______ and noblemen, who could take whatever they wanted and go to war.",
    options:["pirates","farmers","sailors","kings"],
    answer:3,
    why:"Huck read about kings and nobles, which sparked the pair's funny and surprisingly deep arguments about royalty." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Jim insisted that King ______ was a fool for wanting to settle an argument by chopping a baby in two.",
    options:["Solomon","Arthur","David","Louis"],
    answer:0,
    why:"Jim judged King Solomon a fool for the famous 'cut the baby in half' story — and used it to make a bigger point about wealth." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Huck also told Jim about King Louis the Sixteenth of ______, whose young son was locked away after the king was executed.",
    options:["Spain","Egypt","France","England"],
    answer:2,
    why:"Huck described the real King Louis XVI of France and his imprisoned little son (the dauphin) — a detail that quietly foreshadows the fake 'king' later in the book." },

  // ---------- PART 2: COMPREHENSION ----------
  { ch:"Part 2 · Comprehension",
    q:"Why does Jim refuse to call the night an 'adventure' the way Huck does?",
    options:[
      "He is far too lazy to ever want to do anything exciting or risky again",
      "He is angry that Huck left him behind alone on the raft",
      "For him one mistake could mean drowning or being enslaved again",
      "He thinks adventures are only meant for young boys like Huck"],
    answer:2,
    why:"To Huck it's a fun story; to Jim it was nearly fatal. A runaway who is caught loses everything, so Jim can't romanticize the danger the way a free white boy can." },

  { ch:"Part 2 · Comprehension",
    q:"Huck decides Jim has 'an uncommon level head.' What does this line really show about Huck?",
    options:[
      "He now truly believes that Jim is smarter than everyone in the whole town",
      "He is only teasing Jim and does not mean the praise at all",
      "He has completely stopped caring what Jim thinks about anything",
      "He is beginning to respect Jim's mind, though still in a prejudiced way"],
    answer:3,
    why:"Huck is impressed by Jim's good sense — real growth — but the backhanded phrasing ('for a person like Jim') shows the racist ideas he was raised with still cling to him." },

  { ch:"Part 2 · Comprehension",
    q:"In the argument about King Solomon and the baby, what is Jim's DEEPER point?",
    options:[
      "Babies should always be shared out fairly between two mothers",
      "A person with plenty stops valuing what those with little treasure",
      "Solomon was a wise king who always made careful, fair choices",
      "A king is allowed to do absolutely whatever he wishes with his own children"],
    answer:1,
    why:"Jim isn't really talking about babies — he's making a point about wealth: people with little cherish what they have, while people with too much stop valuing it." },

  { ch:"Part 2 · Comprehension",
    q:"Jim compares a man with many children to someone who owns lots of 'cats.' What is he suggesting?",
    options:[
      "Solomon truly kept a great many pet cats around his palace",
      "Cats and kings both enjoy being treated as very important",
      "Children start to act like cats when there are too many of them",
      "When you have so many, each one comes to feel far less precious"],
    answer:3,
    why:"To Jim, having a huge number makes each one seem cheap and replaceable — so Solomon, with dozens of children, could treat them carelessly. It's really a comment on plenty versus scarcity." },

  { ch:"Part 2 · Comprehension",
    q:"The book hints Jim 'may be missing the point, but is not entirely wrong.' Why show Jim this way?",
    options:[
      "It proves that Jim can never follow any story that Huck reads",
      "It shows Jim thinking for himself and reaching honest insights",
      "It shows the book agrees Solomon was the wisest man ever",
      "It means Jim only repeats back the very same ideas that Huck taught him"],
    answer:1,
    why:"Twain lets Jim be both a little off and genuinely insightful. That mix makes Jim a real, thinking person — not the foolish stereotype the story's world expects him to be." },

  { ch:"Part 2 · Comprehension",
    q:"Why does Jim feel so sorry for the little French prince?",
    options:[
      "The prince had been very rude to Jim earlier that same day",
      "The boy lost his father and was shut away all by himself",
      "The prince was made to give away all his gold and jewels",
      "Jim believes every French person deserves a lot of pity"],
    answer:1,
    why:"Jim's sympathy is about the child's loss and loneliness, not his royalty. It shows Jim's warmth and his habit of feeling for others who are trapped or alone — much like himself." },

  { ch:"Part 2 · Comprehension",
    q:"When Huck says the prince might have escaped to America, Jim worries the boy would be lonely. What does this reveal about Jim?",
    options:[
      "He is secretly jealous that a prince gets to sail to America",
      "He does not really believe any true prince could exist",
      "He wishes that he himself could be a king in a faraway land",
      "He is kind and imagines how another person would truly feel"],
    answer:3,
    why:"Even about a made-up prince, Jim thinks about the boy's feelings. That instinct to imagine another's inner life is exactly the empathy the novel keeps highlighting in him." },

  { ch:"Part 2 · Comprehension",
    q:"In the argument over whether all people speak the same language, who 'wins,' and what does that show?",
    options:[
      "Huck wins easily because he has read far more books than Jim",
      "They instantly agree that everyone speaks in the very same way",
      "Jim out-argues Huck, showing his quick and logical mind",
      "Neither speaks again because they both fall fast asleep"],
    answer:2,
    why:"Jim pokes a hole in Huck's reasoning, and Huck gives up — 'it warn't no use wasting words.' Even though the book is set in a racist world, it lets Jim clearly win the debate." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position or length).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 14 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 14 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
