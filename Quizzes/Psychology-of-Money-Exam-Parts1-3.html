      { diff:"hard", ch:"Luck & Risk", q:"Why does the book warn against learning money lessons from the MOST extreme examples (the richest person, the biggest failure)?",

      { diff:"medium", ch:"Luck & Risk", q:"Luck and risk are best described as…",

      { essay:true, ch:"Essay · Part 1", diff:"essay",
        q:"Housel writes that your own experiences with money are only a tiny fraction of everything that has happened in the world — yet they shape a huge part of how you think money works. In your own words, explain what this means. Then give ONE example of how a person's background might make them save or spend differently from someone else.",

        model:"Each of us has only lived through a small, almost random slice of history, so our money 'knowledge' comes from very little real evidence. But those few experiences feel like the whole truth, so they drive most of what we believe and feel about money. For example, someone whose family lost everything in a crash might save cash fearfully and avoid stocks, while someone who only ever saw markets go up might invest boldly. Neither is 'crazy' — they're each reacting sensibly to the different world they lived through.",

          { concept:"Personal experience is only a small / biased sample of the world", keys:["tiny","small","fraction","little","sample","not much","limited","slice","part of"], hint:"Say that one person's experience is only a small piece of all that has happened." },
          { concept:"Yet it shapes most of how we think/feel about money", keys:["shape","most","80","how we think","believe","feel","influence","view","huge"], hint:"Explain that this small experience still drives most of our money beliefs." },
          { concept:"A concrete example linking a life experience to a money habit", keys:["example","depression","crash","inflation","poor","rich","grew up","war","parents","lottery","recession","childhood","family"], hint:"Give a real example (e.g., someone who lived through a crash saves more)." },
          { concept:"So we shouldn't judge others as 'crazy'", keys:["crazy","judge","reasonable","makes sense","different","not stupid","understand"], hint:"Add that this is why we shouldn't call other people's money choices crazy." }
        ] }
    ]
  },
  {
    k: "Part 2", title: "Getting Rich & Staying Rich",
    blurb: "Knowing 'enough' · compounding needs time · survival first · tails drive everything.",

      { diff:"easy", ch:"Never Enough", q:"'The hardest financial skill is getting the goalpost to stop moving' is about…",

      { essay:true, ch:"Essay · Part 2", diff:"essay",
        q:"Explain, in your own words, why the book says SURVIVING (not getting wiped out) is more important than earning the highest possible returns. Use the idea of compounding in your answer, and describe ONE habit that helps a person 'stay wealthy.'",

        model:"Compounding only works if your money is left alone to grow for a very long time. If you take a huge risk and get wiped out, you're knocked out of the game — and you lose not just today's money but every future gain compounding would have made. That's why avoiding ruin matters more than scoring the biggest return in any one year. A habit that helps you stay wealthy is keeping room for error — being frugal, not over-borrowing, and holding some cash so a bad surprise can't force you to sell at the worst time.",
        checks:[
          { concept:"Compounding needs a long, uninterrupted time to work", keys:["compound","time","long","years","grow","runway","uninterrupted","patience"], hint:"Explain that compounding needs a long time without interruption." },
          { concept:"Getting wiped out / ruin ends the game and destroys future gains", keys:["wiped","ruin","lose everything","broke","knocked out","end","zero","bankrupt","start over"], hint:"Say that being wiped out ends the game and erases future gains." },
          { concept:"Therefore survival matters more than the highest return", keys:["survival","survive","stay in","avoid","more important","keep playing","safety","protect"], hint:"State that survival is more important than the biggest return." },
          { concept:"A concrete 'staying wealthy' habit", keys:["frugal","frugality","room for error","margin","cash","save","don't borrow","not over","paranoia","humble","don't panic","diversif"], hint:"Name a real habit (frugality, room for error, cash cushion, not over-borrowing)." }

          { concept:"Saving (savings rate / wanting less) buys freedom & flexibility", keys:["save","saving","savings rate","want less","humility","flexib","cushion","independ","frugal"], hint:"Explain how saving builds the freedom and flexibility described." }

/* ================= BUILD FLAT LIST ================= */
const items = [];
PARTS.forEach((p, pi) => {
  items.push({ type:"banner", part:pi });
  p.questions.forEach(q => items.push(Object.assign({ type: q.essay ? "essay" : "mcq", part:pi }, q)));
});
const totalQuestions = PARTS.reduce((n,p)=>n+p.questions.length,0); // 30

// Shuffle MCQ options so the correct answer isn't always first
items.forEach(item => {
  if (item.type !== "mcq") return;
  const correct = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correct);
});

/* ================= STATE ================= */
let idx = 0;
let mcqScore = 0;
const partMcq = [0,0,0], partMcqTotal = [0,0,0];
const partEssay = [0,0,0];        // 0..3 each
let answered = false;

const MCQ_TOTAL = items.filter(i=>i.type==="mcq").length;   // 27
const ESSAY_MAX = 9;                                        // 3 essays x 3
const GRAND_TOTAL = MCQ_TOTAL + ESSAY_MAX;                  // 36
const PASS = Math.ceil(GRAND_TOTAL * 0.75);
items.forEach(i => { if (i.type==="mcq") partMcqTotal[i.part]++; });

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function currentQn() { return items.slice(0, idx+1).filter(i => i.type !== "banner").length; }
function updateBar() {
  const qn = currentQn();
  qcount.textContent = `Question ${qn} of ${totalQuestions}`;
  scoreboard.textContent = `🏅 ${(mcqScore + partEssay.reduce((a,b)=>a+b,0))}`;
  progress.style.width = `${(qn / totalQuestions) * 100}%`;
}

function render() {
  answered = false;
  const item = items[idx];

  if (item.type === "banner") {
    const p = PARTS[item.part];
    quizArea.innerHTML = `
      <div class="partbanner">
        <div class="k">${p.k}</div>
        <h2>${p.title}</h2>
        <p>${p.blurb}</p>
      </div>
      <div class="center"><button class="btn" onclick="next()">Start ${p.k} →</button></div>`;
    return;
  }

  updateBar();

  if (item.type === "mcq") {
    const opts = item.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
    quizArea.innerHTML = `
      <div class="card">
        <div class="qhead"><span class="qmeta">${item.ch}</span><span class="diff ${item.diff}">${item.diff}</span></div>
        <div class="qtext">${item.q}</div>
        ${opts}
        <div class="feedback" id="fb"></div>
        <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
      </div>`;
  } else { // essay
    quizArea.innerHTML = `
      <div class="card">
        <div class="qhead"><span class="qmeta">${item.ch}</span><span class="diff hard">essay</span></div>
        <div class="qtext">${item.q}</div>
        <div class="essay-note">${item.note}</div>
        <textarea id="essayInput" placeholder="Type your answer here..."></textarea>
        <div class="center" style="margin-top:12px;"><button class="btn grade" id="gradeBtn" onclick="gradeEssay()">Grade my answer</button></div>
        <div class="rubric" id="rubric"></div>
        <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
      </div>`;
  }
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = items[idx];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    mcqScore++; partMcq[item.part]++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  updateBar();
  document.getElementById('nextBtn').style.display = 'inline-block';
}

/* ===== Copy detector: how much of the answer is lifted word-for-word
   from the QUESTION (or the on-screen note). Returns a fraction 0–1. ===== */
function normWords(s){ return s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function copyOverlap(answer, source){
  const a = normWords(answer).split(' ').filter(Boolean);
  const src = ' ' + normWords(source) + ' ';
  if (a.length === 0) return 0;
  // Short answers: flag if the whole thing sits inside the question text.
  if (a.length < 6) return src.includes(' ' + a.join(' ') + ' ') ? 1 : 0;
  const N = 5; // any run of 5+ consecutive copied words counts as lifted text
  const covered = new Array(a.length).fill(false);
  for (let i = 0; i + N <= a.length; i++){
    if (src.includes(' ' + a.slice(i, i+N).join(' ') + ' ')){
      for (let j = i; j < i + N; j++) covered[j] = true;
    }
  }
  return covered.filter(Boolean).length / a.length;
}

/* ===== Essay auto-grader: checks the answer for each key concept ===== */
function gradeEssay() {
  if (answered) return;
  const item = items[idx];
  const raw = (document.getElementById('essayInput').value || '').trim();
  if (raw.length < 15) {
    alert("Please write a few sentences before grading — try to explain the idea in your own words.");
    return;
  }
  answered = true;
  document.getElementById('gradeBtn').disabled = true;
  document.getElementById('essayInput').disabled = true;

  const r = document.getElementById('rubric');

  // ---- Anti-copy check: must be in his OWN words, not copied from the question ----
  const overlap = Math.max(
    copyOverlap(raw, item.q),
    copyOverlap(raw, item.note || '')
  );
  if (overlap >= 0.4) {
    partEssay[item.part] = 0;
    r.className = "rubric show";
    r.innerHTML = `
      <h4 style="color:#b23b2e;">Auto-graded: 0 / 3 — copied from the question</h4>
      <div style="color:#b23b2e;font-weight:bold;margin-bottom:8px;">
        It looks like this answer copies the words of the question (about ${Math.round(overlap*100)}% matches).
        Please answer in your <u>own words</u> — explain the idea the way you would tell a friend.</div>
      <div class="model"><b>Model answer (for after you try again):</b> ${item.model}</div>`;
    updateBar();
    document.getElementById('nextBtn').style.display = 'inline-block';
    return;
  }

  const text = raw.toLowerCase();
  let hits = 0;
  const rows = item.checks.map(c => {
    const found = c.keys.some(k => new RegExp(k).test(text));
    if (found) hits++;
    return found
      ? `<div class="checkitem hit"><span class="mk">✓</span> ${c.concept}</div>`
      : `<div class="checkitem miss"><span class="mk">✗</span> ${c.concept}<br><span style="color:#7a6a2e;">→ ${c.hint}</span></div>`;
  }).join('');

  // Map concepts hit (out of N) to a 0–3 score
  const n = item.checks.length;
  const points = Math.round((hits / n) * 3);
  partEssay[item.part] = points;

  let verdict, vcolor;
  if (points >= 3)      { verdict = "Excellent — you captured the main ideas!"; vcolor="#2e7d32"; }
  else if (points === 2){ verdict = "Good — you've got most of it. Add the missing idea below."; vcolor="#8a6d1a"; }
  else if (points === 1){ verdict = "A start — but re-read and include more of the key ideas."; vcolor="#b9791a"; }
  else                  { verdict = "Let's revisit this one — the key ideas are missing."; vcolor="#b23b2e"; }

  r.className = "rubric show";
  r.innerHTML = `
    <h4>Auto-graded: ${points} / 3 &nbsp;·&nbsp; ${hits} of ${n} key ideas found</h4>
    <div style="color:${vcolor};font-weight:bold;margin-bottom:8px;">${verdict}</div>
    ${rows}
    <div class="model"><b>Model answer:</b> ${item.model}</div>`;
  updateBar();
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  idx++;
  if (idx < items.length) render();
  else showResult();
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const essayTotal = partEssay.reduce((a,b)=>a+b,0);
  const total = mcqScore + essayTotal;
  const pct = Math.round((total / GRAND_TOTAL) * 100);
  const passed = total >= PASS;

  let stars, msg, emoji;
  if (pct === 100)      { stars="⭐⭐⭐⭐⭐"; emoji="🏆"; msg="Perfect! You truly understand these ideas."; }
  else if (pct >= 90)   { stars="⭐⭐⭐⭐⭐"; emoji="🎖️"; msg="Outstanding grasp of the concepts."; }
  else if (passed)      { stars="⭐⭐⭐⭐"; emoji="✅"; msg="Well done — you passed and clearly get the big ideas."; }
  else if (pct >= 60)   { stars="⭐⭐⭐"; emoji="📈"; msg="Close! Review the parts you missed and try again — passing is 75%."; }
  else if (pct >= 40)   { stars="⭐⭐"; emoji="📚"; msg="Good effort. Re-read the chapters and give it another go."; }
  else                  { stars="⭐"; emoji="🌱"; msg="Let's revisit the ideas together and try once more."; }

  const rows = PARTS.map((p,i)=>`
    <div class="row"><span>${p.k} · ${p.title}</span>
      <b>${partMcq[i]}/${partMcqTotal[i]} MCQ &nbsp;+&nbsp; ${partEssay[i]}/3 essay</b></div>`).join('');

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:22px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:22px;font-weight:bold;margin:14px 0;">Not passed yet — need 75%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Exam Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">Total: <strong>${total}</strong> / ${GRAND_TOTAL} &nbsp;(${pct}%)</div>
    <div style="font-size:14px;color:#5b6b62;margin:-2px 0 6px;">Multiple-choice: ${mcqScore}/${MCQ_TOTAL} · Essays: ${essayTotal}/${ESSAY_MAX} · Passing: 75% (${PASS}/${GRAND_TOTAL})</div>
    <div class="partscores">${rows}</div>
    <p style="margin:8px 0 18px;font-size:16px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  idx = 0; mcqScore = 0; answered = false;
  for (let i=0;i<3;i++){ partMcq[i]=0; partEssay[i]=0; }
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
