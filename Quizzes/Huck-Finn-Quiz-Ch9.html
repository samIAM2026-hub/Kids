<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 9 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Comprehension Quiz · Chapter 9 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 10</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Think about WHY, not just what happens. Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 9 · Jim's Caution",
    q:"Jim insists they hide the gear in the cavern and hide the canoe too. Why is Jim even MORE careful than Huck about not being found?",
    options:[
      "If Jim is caught, he faces punishment and being sold back into slavery, away from his family",
      "Jim just enjoys keeping things tidy",
      "Huck ordered Jim to hide everything",
      "Jim is afraid of the island animals"],
    answer:0,
    why:"Huck is only running from Pap, but if Jim is caught he loses everything — he'd be punished and sold 'down the river,' away from his family. That's why he takes extra care to stay hidden." },

  { ch:"Chapter 9 · What Jim Is Like",
    q:"Hiding the supplies and the canoe in the cave shows what kind of person Jim is?",
    options:[
      "Sensible and careful — he plans ahead for danger",
      "Lazy and careless",
      "Silly and forgetful",
      "Mean and selfish"],
    answer:0,
    why:"Jim thinks ahead and prepares for trouble before it happens. Twain shows him as practical and wise — not the foolish stereotype Huck first assumed." },

  { ch:"Chapter 9 · The Storm",
    q:"When the huge storm hits, Jim reminds Huck that without him, Huck would be 'out in the woods drowning.' What does this really show?",
    options:[
      "Jim's smart planning is what kept them both safe and dry",
      "Jim is just bragging for no reason",
      "Huck is much smarter than Jim",
      "Hiding in the cave was a mistake"],
    answer:0,
    why:"Jim's idea to shelter in the cavern saved them from the storm. It's clear proof that his judgment is good — and that Huck is lucky to have him." },

  { ch:"Chapter 9 · Huck Changing",
    q:"At the start of the book Huck doesn't respect Black people's intelligence. How does Chapter 9 begin to challenge that?",
    options:[
      "Jim keeps proving to be just as reasonable and practical as Huck",
      "Jim gives a big speech about equality",
      "Huck reads a book that changes his mind",
      "Nothing about Huck's thinking changes"],
    answer:0,
    why:"Twain quietly chips away at Huck's prejudice by showing Jim being right, careful, and protective again and again — forcing Huck to notice that Jim is every bit as capable as he is." },

  { ch:"Chapter 9 · Staying Hidden",
    q:"Why do Huck and Jim travel only at night and leave the drifting saw-logs alone?",
    options:[
      "They don't want to be seen and caught",
      "They are afraid of the logs",
      "The logs are too heavy to lift",
      "They are saving the logs for winter"],
    answer:0,
    why:"Being spotted could mean the end of their freedom — especially Jim's. So they move only in the dark and pass up the logs rather than risk being noticed." },

  { ch:"Chapter 9 · The Floating House",
    q:"One night an entire two-story house floats down the river. Why is a whole house drifting by like that?",
    options:[
      "The flooded river tore it loose and carried it downstream",
      "Someone was steering it like a boat",
      "It was built to float on purpose",
      "A tornado dropped it in the water"],
    answer:0,
    why:"The Mississippi has flooded, and the rising water ripped the house off its foundation and swept it downriver — a sign of how powerful the river is." },

  { ch:"Chapter 9 · Being Careful",
    q:"Huck and Jim climb into the floating house but wait until morning to look around. Why?",
    options:[
      "It was too dark at night to see anything inside",
      "They were too tired to explore",
      "They were afraid of ghosts",
      "The doors were all locked"],
    answer:0,
    why:"It was pitch dark inside, so they tied up their canoe and waited for daylight before exploring — another careful, sensible choice." },

  { ch:"Chapter 9 · Jim Protects Huck",
    q:"Inside the house is a dead man who was shot. Why does Jim tell Huck NOT to look at the man's face?",
    options:[
      "The sight was too horrible, and Jim wanted to spare Huck from seeing it",
      "The man was only pretending to be dead",
      "Jim wanted to keep the body a secret forever",
      "Huck was too short to see"],
    answer:0,
    why:"Jim looks first and then shields Huck from the gruesome sight. It's a caring, almost fatherly act — Jim looking out for Huck's feelings." },

  { ch:"Chapter 9 · Reading the Clues",
    q:"The house is full of playing cards, whisky bottles, masks, and words scribbled on the walls. What do these clues suggest about who lived there?",
    options:[
      "Rough, troubled people had been living there",
      "A rich, happy family lived there",
      "Children used it as a playhouse",
      "No one had ever lived in it"],
    answer:0,
    why:"Cards, liquor, masks, and scrawled writing paint a picture of a hard, lawless household — not a cheerful, respectable home. The reader has to piece that together." },

  { ch:"Chapter 9 · Hiding Jim",
    q:"As they push off from the house, Jim lies down in the canoe under a quilt. Why does he do this?",
    options:[
      "So passersby won't spot him and realize he's a runaway",
      "Because he is feeling cold",
      "So he can take a nap",
      "To hide the clothes they took"],
    answer:0,
    why:"A Black man traveling openly would draw attention and put Jim in danger, so he stays hidden under the quilt. Even in a small moment, the threat to Jim's freedom is always there." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Think about WHY, not just what happens. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 9 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 9 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
