<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 15 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌫️</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Chapter 15 · Fill-in-the-Blank &amp; Comprehension · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 13</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80%</footer>
</div>

<script>
const questions = [
  // ---------- PART 1: FILL IN THE BLANK ----------
  { ch:"Part 1 · Fill in the Blank",
    q:"Huck and Jim were getting close to the town of ______, where they hoped to catch a steamboat up the Ohio River toward the free states.",
    options:["Boston","Cairo","Richmond","Nashville"],
    answer:1,
    why:"They were nearing Cairo, where the Ohio River meets the Mississippi. From there they planned to head up the Ohio into the free states." },

  { ch:"Part 1 · Fill in the Blank",
    q:"A thick ______ rolled over the river so they could barely see, and it pulled Huck and Jim apart.",
    options:["storm","snow","fog","wind"],
    answer:2,
    why:"A heavy fog swallowed the river. It's nature — not slave-hunters — that separates Huck from Jim at this key moment." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Huck was paddling the little ______ when he lost Jim, who was drifting on the raft.",
    options:["steamboat","canoe","ferry","rowboat"],
    answer:1,
    why:"Huck was in the canoe trying to tie up to a tow-head when the current and fog carried him away from Jim and the raft." },

  { ch:"Part 1 · Fill in the Blank",
    q:"When they finally found each other again, Huck decided to play a cruel ______ on Jim, telling him the whole night had only been a dream.",
    options:["song","trick","game","favor"],
    answer:1,
    why:"Huck pretended nothing had happened and that Jim had dreamed the fog and separation — a mean trick on his loyal friend." },

  { ch:"Part 1 · Fill in the Blank",
    q:"When Jim discovered the truth, he was so hurt that he called Huck ______ — the kind of person who shames a friend.",
    options:["brave","clever","trash","kind"],
    answer:2,
    why:"Jim says a person who would shame a friend that loved him is 'trash.' It's one of the most powerful lines in the book." },

  // ---------- PART 2: COMPREHENSION ----------
  { ch:"Part 2 · Comprehension",
    q:"Why does reaching the free states matter so much to Jim?",
    options:[
      "He has always wanted to visit the busy northern towns as a curious tourist",
      "There slavery is against the law, so no one can hunt or own him",
      "He is hoping to dig up buried gold in the free states",
      "He simply wants to get as far away from Huck as he can"],
    answer:1,
    why:"In the free states slavery is illegal, so Jim could no longer be captured or owned. It's his whole reason for the dangerous journey — freedom itself." },

  { ch:"Part 2 · Comprehension",
    q:"It's the fog — not slave-hunters — that blocks their journey here. What point does the book make with this?",
    options:[
      "The slave-hunters had secretly made the fog appear",
      "Nature always helps Huck and Jim safely reach their freedom in the end",
      "The fog proves their trip was never truly dangerous",
      "Nature can be random and dangerous, not just cruel people"],
    answer:3,
    why:"Society persecutes Jim on purpose, but nature is simply indifferent — random and sometimes dangerous. Here the harmless-seeming fog nearly costs them everything." },

  { ch:"Part 2 · Comprehension",
    q:"After they reunite, why does Huck tell Jim the fog and separation were 'only a dream'?",
    options:[
      "He honestly cannot remember anything about the night",
      "He wants to play a mean joke and make a fool of Jim",
      "He is trying to calm Jim down and ease his fear",
      "Jim had begged Huck to make up a fun story"],
    answer:1,
    why:"Huck isn't confused or being kind — he's amusing himself by fooling Jim. Twain shows this as childish, and worse, a sign Huck doesn't yet see Jim as a full equal." },

  { ch:"Part 2 · Comprehension",
    q:"Why does Jim believe Huck at first and 'interpret' the dream so carefully?",
    options:[
      "He secretly knows it is a lie but plays along",
      "He is only pretending, to trick Huck right back",
      "He trusts Huck and takes the 'dream' as seriously as his signs",
      "He wants to show everyone that Huck tells truly terrible, boring stories"],
    answer:2,
    why:"Jim trusts Huck completely and, being superstitious, treats the 'dream' as a real message full of warnings. His sincerity makes Huck's trick even crueler." },

  { ch:"Part 2 · Comprehension",
    q:"What finally makes Jim realize there was no dream at all?",
    options:[
      "Huck suddenly bursts out laughing and confesses",
      "Huck points at the leaves and broken oar on the raft",
      "Another passing riverboat tells Jim exactly what really happened that night",
      "Jim falls asleep again and then remembers the fog"],
    answer:1,
    why:"Huck slyly asks what the leaves, dirt, and smashed oar 'mean' — real proof of the rough night. That's when Jim sees he was never dreaming; he was tricked." },

  { ch:"Part 2 · Comprehension",
    q:"When Jim understands the trick, what does he say hurt him the most?",
    options:[
      "That Huck had greedily eaten the very last of all their food supplies",
      "That Huck would not help steer through the fog",
      "That Huck wanted to leave him alone on the raft",
      "That Huck shamed him after he had wept for Huck's safety"],
    answer:3,
    why:"Jim had cried and feared Huck was dead — and Huck repaid that love by mocking him. It's the betrayal of his feelings, not the danger, that wounds Jim." },

  { ch:"Part 2 · Comprehension",
    q:"Jim calls Huck 'trash.' What does he mean by that word?",
    options:[
      "A person too young to understand the river",
      "Someone who carelessly litters the raft with leaves, dirt and mud",
      "A person who shames and hurts a friend who loves them",
      "A boy who cannot swim or paddle a canoe"],
    answer:2,
    why:"To Jim, 'trash' isn't about garbage — it's a person who would humiliate a friend who cared for them. He is holding Huck to a real moral standard, as an equal would." },

  { ch:"Part 2 · Comprehension",
    q:"Huck apologizes to Jim and says he was never sorry for it afterward. Why is this such a big moment?",
    options:[
      "It is the very first lie that Huck has ever told anyone in his whole life",
      "It shows Huck has decided to turn Jim in",
      "It proves Huck no longer cares about freedom",
      "He humbles himself to Jim as an equal, against how he was raised"],
    answer:3,
    why:"In Huck's racist society, a white boy apologizing to a Black man was almost unthinkable. Huck does it anyway and feels right about it — a real step in his growing conscience." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position or length).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 15 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 15 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
