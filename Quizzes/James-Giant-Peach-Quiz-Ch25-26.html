<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 25–26 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 25–26</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read the chapters, then test what you remember! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 25 · Who Do Farmers Love?", q:"Why did James start asking the Earthworm friendly questions?",
    options:["To stop the Centipede and the Earthworm from arguing again","Because he was bored","To make the Earthworm cry","To find something to eat"], answer:0,
    why:"James asked the Earthworm about himself to keep the peace and stop another argument between the Centipede and the Earthworm." },
  { ch:"Chapter 25 · Who Do Farmers Love?", q:"What surprising fact did the Earthworm tell James about the soil in fields and gardens?",
    options:["It is full of gold","Every bit of it has recently passed through an earthworm","It never gets wet","It is made of sugar"], answer:1,
    why:"The Earthworm proudly said that nearly every bit of soil has recently passed through an earthworm's body." },
  { ch:"Chapter 25 · Who Do Farmers Love?", q:"Why do farmers love earthworms so much?",
    options:["Earthworms make the soil better for growing plants","Earthworms scare away birds","Earthworms sing to the crops","Earthworms guard the barn"], answer:0,
    why:"By swallowing soil, earthworms make it richer and better for plants — so farmers love them." },
  { ch:"Chapter 25 · Who Do Farmers Love?", q:"According to the Ladybug, why do farmers love ladybugs?",
    options:["Ladybugs eat the pesky insects that ruin crops","Ladybugs paint the flowers","Ladybugs carry water","Ladybugs keep the soil warm"], answer:0,
    why:"Ladybugs eat the harmful insects that destroy crops — and they do it for free — so farmers even buy ladybugs to release." },
  { ch:"Chapter 25 · Who Do Farmers Love?", q:"James asked if you can tell a ladybug's age by her spots. What do the spots REALLY show?",
    options:["Which family she belongs to","How old she is","How far she can fly","How many eggs she has"], answer:0,
    why:"The Ladybug said the age idea is just a myth — the number of spots really tells which family a ladybug belongs to." },
  { ch:"Chapter 25 · Who Do Farmers Love?", q:"How many spots does this Ladybug have?",
    options:["Two","Five","Nine","Twenty"], answer:2,
    why:"She proudly says she is a Nine-Spotted Ladybug, which she calls a great family branch." },
  { ch:"Chapter 25 · Poor Miss Spider", q:"Why was Miss Spider so sad?",
    options:["Nobody loves spiders, and Aunt Sponge had flushed her father down the drain","She had lost her web","She was hungry","She wanted to go home"], answer:0,
    why:"Miss Spider cried because people treat spiders unfairly — Aunt Sponge had even flushed her father down the bathtub drain." },
  { ch:"Chapter 25 · Poor Miss Spider", q:"What does the Centipede say happens when you kill a spider?",
    options:["It is very unlucky — and Aunt Sponge died soon after","Nothing at all","You get a reward","It starts to rain"], answer:0,
    why:"The Centipede says killing a spider is very unlucky — and sure enough, Aunt Sponge was squashed by the peach soon after." },
  { ch:"Chapter 25 · The Centipede's Songs", q:"In the Centipede's song, what was Aunt Sponge like, and what did the peach do to her?",
    options:["She was very fat, and the peach squashed her flat","She was very kind, and the peach saved her","She was tiny, and the peach lifted her","She was a good cook, and the peach fed her"], answer:0,
    why:"The Centipede sang that the fat Aunt Sponge wanted to be slim — and the peach made her thinner than any diet by flattening her." },
  { ch:"Chapter 25 · The Centipede's Songs", q:"In the song about Aunt Spiker, she was so thin you could use her as a — ?",
    options:["Fire poker","Fishing rod","Flag pole","Broom"], answer:0,
    why:"The Centipede sang that skinny Aunt Spiker was thin enough to use as a fire poker before the peach 'ironed her out on the lawn.'" },

  { ch:"Chapter 26 · The Centipede Falls!", q:"What was the Centipede doing that made him fall off the peach?",
    options:["Dancing wildly to his own songs","Sleeping","Fixing his boots","Climbing the stem"], answer:0,
    why:"The Centipede had been dancing so wildly during his songs that he teetered and tumbled off the edge." },
  { ch:"Chapter 26 · The Centipede Falls!", q:"Where did the Centipede fall?",
    options:["Off the edge of the peach, down toward the sea","Into the stem","Onto the Earthworm","Into a cloud"], answer:0,
    why:"He toppled right off the edge of the peach and fell down toward the ocean." },
  { ch:"Chapter 26 · James to the Rescue", q:"What brave thing did James do the moment the Centipede fell?",
    options:["He tied a string around his waist and dived in after him","He hid inside the peach","He called for a boat","He did nothing"], answer:0,
    why:"James quickly tied a string around his waist and dived over the edge to rescue the Centipede." },
  { ch:"Chapter 26 · James to the Rescue", q:"Who did James tell to start spinning so he'd have a rescue string?",
    options:["The Silkworm","The Ladybug","The Grasshopper","The Glow-worm"], answer:0,
    why:"James shouted for the Silkworm to start spinning silk to make the string." },
  { ch:"Chapter 26 · James to the Rescue", q:"What signal did James arrange so his friends would pull him back up?",
    options:["Three tugs on the string","A loud whistle","Waving his arms","Shouting 'up!'"], answer:0,
    why:"James told them to haul him up if he tugged on the string three times." },
  { ch:"Chapter 26 · James to the Rescue", q:"While James was over the edge, what did the Ladybug and the others believe?",
    options:["That James and the Centipede were lost forever","That they would be fine","That a storm was coming","That the peach would sink"], answer:0,
    why:"The others quickly assumed the worst — they were sure James and the Centipede were lost." },
  { ch:"Chapter 26 · James to the Rescue", q:"What did the Old-Green-Grasshopper play while everyone thought James was gone?",
    options:["A sad funeral march on his violin","A happy dance tune","A marching drum","Nothing"], answer:0,
    why:"Believing James was lost, the Old-Green-Grasshopper played a mournful funeral march on his violin." },
  { ch:"Chapter 26 · James to the Rescue", q:"How did the friends know it was time to pull James up?",
    options:["They felt three tugs on the string","They heard him shout","The peach shook","The Grasshopper told them"], answer:0,
    why:"Suddenly they felt three tugs on the string — the signal — and hauled James and the Centipede back up." },
  { ch:"Chapter 26 · Safe Again", q:"After being pulled back up, what silly thing did the Centipede complain about?",
    options:["That his boots were ruined from his swim in the Atlantic","That he was hungry","That the song was over","That it was too dark"], answer:0,
    why:"Instead of being thankful, the Centipede grumbled that his boots were ruined after his unexpected swim in the Atlantic — a very silly worry after nearly drowning!" },
  { ch:"Chapter 26 · Safe Again", q:"As night fell, what did the Old-Green-Grasshopper suggest they do?",
    options:["Stay on top of the peach to keep watch","Jump into the sea","Go back to sleep inside","Sing more songs"], answer:0,
    why:"With night coming, the Old-Green-Grasshopper suggested they all stay on top of the peach to keep watch." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read the chapters, then test what you remember! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know these chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
