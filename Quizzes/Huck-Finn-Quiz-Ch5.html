<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 5 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.45;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🪵🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Reading Quiz · Chapter 5 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer>For Warren · Read Chapter 5, then show what you know! Passing score: 80% (12 of 15)</footer>
</div>

<script>
const questions = [
  {
    ch: "Chapter 5 · Pap Returns",
    q: "Who was waiting in Huck's room, and how did Huck feel after the first shock wore off?",
    options: ["His Pap; surprisingly, Huck wasn't really scared anymore", "Jim; Huck felt relieved", "The widow; Huck felt guilty", "Tom Sawyer; Huck felt excited"],
    answer: 0,
    why: "It was Pap. After the first jolt, Huck realized he wasn't truly afraid of his father the way he used to be."
  },
  {
    ch: "Chapter 5 · Pap's Looks",
    q: "How does Huck describe Pap's appearance?",
    options: ["About fifty, with long tangled greasy black hair and a sickly white face", "Young and clean-shaven with a friendly smile", "Short and round with red cheeks", "Tall and neatly dressed in a suit"],
    answer: 0,
    why: "Pap was nearly fifty, with long, greasy, tangled black hair (no gray) and an unsettling pale face."
  },
  {
    ch: "Chapter 5 · Pap's Looks",
    q: "What memorable comparison does Huck use for the awful white color of Pap's face?",
    options: ["A 'tree-toad white, a fish-belly white'", "A 'snow-white, cloud white'", "A 'milk white, pearl white'", "A 'paper white, chalk white'"],
    answer: 0,
    why: "Huck says it was a 'tree-toad white, a fish-belly white' — a color that made a body's flesh crawl."
  },
  {
    ch: "Chapter 5 · Pap's Looks",
    q: "What detail shows how ragged Pap's clothes and boots were?",
    options: ["His coat was missing buttons", "His boot was busted and two of his toes stuck through", "His shirt was torn at the collar", "He wore no shoes at all"],
    answer: 1,
    why: "Pap wore nothing but rags, and one boot was so broken that two of his toes poked through it."
  },
  {
    ch: "Chapter 5 · The Argument",
    q: "Why was Pap so angry about Huck's clean clothes and schooling?",
    options: ["He thought Huck was wasting money", "He thought Huck was putting on airs and trying to be better than his own father", "He wanted Huck to become a teacher", "He was jealous of the widow"],
    answer: 1,
    why: "Pap accused Huck of putting on 'frills' and acting better than his illiterate father, which infuriated him."
  },
  {
    ch: "Chapter 5 · The Argument",
    q: "What did Pap order Huck to do about school?",
    options: ["Study even harder", "Drop out of school and stop going", "Switch to a new school", "Teach Pap to read"],
    answer: 1,
    why: "Pap demanded Huck quit school, threatening to 'tan' (whip) him if he caught him going again."
  },
  {
    ch: "Chapter 5 · The Argument",
    q: "Pap made Huck read aloud to prove he could. What did Pap do with the book?",
    options: ["He read along with Huck", "He knocked it across the house with a whack", "He kept it for himself", "He praised Huck for reading"],
    answer: 1,
    why: "Huck read about General Washington and the wars, and Pap smacked the book clear across the room."
  },
  {
    ch: "Chapter 5 · The Argument",
    q: "What did Pap do with the little picture Huck had earned as a prize for good lessons?",
    options: ["He hung it on the wall", "He tore it up and offered Huck a 'cowhide' instead", "He sold it for whisky", "He gave it back to the widow"],
    answer: 1,
    why: "Pap ripped up the prize picture and sneered that he'd give Huck a cowhide (a whipping) instead."
  },
  {
    ch: "Chapter 5 · The Money",
    q: "What was the real reason Pap had come back to town?",
    options: ["He missed Huck", "He had heard Huck was rich and wanted the money", "He wanted to live with the widow", "He was looking for a job"],
    answer: 1,
    why: "Pap had heard — even far down the river — that Huck was rich, and he came demanding that money."
  },
  {
    ch: "Chapter 5 · The Money",
    q: "What did Pap take from Huck before leaving to buy whisky?",
    options: ["Huck's only dollar", "Huck's school books", "Huck's new coat", "Huck's hat"],
    answer: 0,
    why: "Pap bit the coin to check it was real, then took Huck's single dollar and headed off for whisky."
  },
  {
    ch: "Chapter 5 · The Law",
    q: "When the widow and Judge Thatcher went to court to become Huck's guardian, what happened?",
    options: ["The court gave Huck to the widow", "A new judge refused to separate a child from his father, so Huck stayed with Pap", "Pap was sent to prison for life", "The case was never heard"],
    answer: 1,
    why: "A new judge who didn't know Pap's reputation ruled that courts shouldn't split up families, leaving Huck with Pap."
  },
  {
    ch: "Chapter 5 · The Law",
    q: "How much money did Huck borrow from Judge Thatcher, which Pap then drank away?",
    options: ["Three dollars", "Fifty dollars", "One hundred dollars", "Ten dollars"],
    answer: 0,
    why: "Huck borrowed three dollars; Pap took it, got drunk, and made a ruckus all over town until he was jailed."
  },
  {
    ch: "Chapter 5 · The 'Reform'",
    q: "How did the new judge try to reform Pap?",
    options: ["He locked him up for a year", "He took Pap into his home, cleaned him up, and talked to him about temperance", "He gave Pap a job on a steamboat", "He sent Pap far away"],
    answer: 1,
    why: "The judge brought Pap home, dressed him nicely, and lectured him on temperance until Pap cried and signed a pledge."
  },
  {
    ch: "Chapter 5 · The 'Reform'",
    q: "How did Pap's promise to turn over a new leaf end that very same night?",
    options: ["He kept his promise for a year", "He traded his new coat for a jug of whisky, got drunk, and fell off the porch, breaking his arm", "He ran away on a boat", "He went peacefully to sleep"],
    answer: 1,
    why: "Pap sneaked out, swapped his new coat for a jug of 'forty-rod' whisky, got drunk, and rolled off the porch roof, breaking his left arm in two places."
  },
  {
    ch: "Chapter 5 · The 'Reform'",
    q: "After the disaster, what did the judge conclude about reforming Pap?",
    options: ["That Pap just needed more time", "That a body could maybe reform the old man with a shot-gun, but he knew no other way", "That Pap was already a changed man", "That the widow should try next"],
    answer: 1,
    why: "Disgusted, the judge said the only way to reform Pap might be with a shot-gun — he knew no other method."
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = pct >= 80;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know Chapter 5."; emoji = '🏆'; }
  else if (pct >= 80) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 5 and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 5 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (12 of 15)</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
