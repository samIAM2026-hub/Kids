<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 31–32 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 31–32</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read the chapters, then test what you remember! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 31 · Flying Through the Night", q:"The Ladybug noticed that the peach was now moving very — ?",
    options:["fast","slowly","low","backwards"], answer:0,
    why:"The Ladybug pointed out that the peach was zooming along very fast through the night sky." },
  { ch:"Chapter 31 · Flying Through the Night", q:"Why did James think the seagulls were flying so fast?",
    options:["They wanted to get away from the Cloud-Men too","They smelled food","They were racing each other","They were lost"], answer:0,
    why:"James guessed the seagulls didn't like the Cloud-Men any more than the travelers did, so they hurried to get away." },
  { ch:"Chapter 31 · The Cloud-Men's World", q:"What kind of machine did they pass that the Cloud-Men used?",
    options:["A snow machine","A candy machine","A time machine","A washing machine"], answer:0,
    why:"They flew past a snow machine — one of the strange machines the Cloud-Men use to make the weather." },
  { ch:"Chapter 31 · The Cloud-Men's World", q:"What did the Cloud-Men's big drums make?",
    options:["Thunder","Music","Rain","Wind"], answer:0,
    why:"The Cloud-Men banged huge drums to make the sound of thunder." },
  { ch:"Chapter 31 · The Cloud-Men's World", q:"The Cloud-Men had machines that made tornadoes and — ?",
    options:["cyclones","rainbows","stars","bubbles"], answer:0,
    why:"Their machines whipped up cyclones and tornadoes — that's where James learned storms 'came from.'" },
  { ch:"Chapter 31 · The Cloud-Men's World", q:"What did James spot high up where the Cloud-Men lived?",
    options:["Their whole city","A castle","A school","A zoo"], answer:0,
    why:"James saw the Cloud-Men's city, full of their homes, right up in the clouds." },
  { ch:"Chapter 31 · The Cloud-Men's World", q:"What were the Cloud-Men's wives cooking over their stoves?",
    options:["Snowballs","Pancakes","Soup","Fish"], answer:0,
    why:"The Cloud-Men's wives crouched over stoves frying snowballs while their children played." },
  { ch:"Chapter 31 · Just Before Dawn", q:"Just before dawn, what big creature whooshed above the peach?",
    options:["Something large and bat-like","A giant seagull","A dragon","An airplane"], answer:0,
    why:"They heard a whoosh and saw a huge, bat-like creature, which cried out and flew away." },
  { ch:"Chapter 31 · Just Before Dawn", q:"What did Miss Spider moan that she wanted?",
    options:["For morning to come soon","To go back home","Something to eat","To sing a song"], answer:0,
    why:"Tired and scared of the night, Miss Spider moaned that she wished morning would hurry up and come." },
  { ch:"Chapter 31 · Just Before Dawn", q:"What did James point to at the very end of the chapter?",
    options:["The sky just starting to get light","A shooting star","Another peach","The Cloud-Men's drums"], answer:0,
    why:"James pointed to the horizon, where the sky was just beginning to lighten — dawn was coming at last." },

  { ch:"Chapter 32 · Land at Last!", q:"When the sun came up, what did the Centipede suddenly spot far below?",
    options:["Land","A ship","A whale","Another cloud"], answer:0,
    why:"As the sun rose, the Centipede shouted that there was land down below them." },
  { ch:"Chapter 32 · Land at Last!", q:"What did the huge city below them have lots of?",
    options:["Tall buildings","Windmills","Castles","Farms"], answer:0,
    why:"They peered down at a vast city dotted with tall buildings." },
  { ch:"Chapter 32 · Land at Last!", q:"The Grasshopper didn't think it was England. What did James decide the land was?",
    options:["America","France","Africa","Australia"], answer:0,
    why:"James realized the tall city couldn't be England — it must be America!" },
  { ch:"Chapter 32 · Land at Last!", q:"How had the peach reached America so quickly?",
    options:["It crossed the whole Atlantic Ocean overnight","It took a boat","It flew for a week","It rolled there"], answer:0,
    why:"Pulled by the seagulls, the peach had flown clear across the Atlantic Ocean in a single night." },
  { ch:"Chapter 32 · Getting Down", q:"Which creature was thrilled and excited that they had arrived?",
    options:["The Centipede","The Earthworm","The Glow-worm","The Silkworm"], answer:0,
    why:"The Centipede was overjoyed at the exciting turn of events." },
  { ch:"Chapter 32 · Getting Down", q:"Which creature cut in, worried, saying they must figure out how to get DOWN?",
    options:["The Earthworm","Miss Spider","The Ladybug","The Grasshopper"], answer:0,
    why:"The Earthworm interrupted the celebrating to fret about how on earth they would get down to the ground." },
  { ch:"Chapter 32 · Getting Down", q:"Who suggested that they should ask James what to do?",
    options:["The Ladybug","The Centipede","Miss Spider","The Glow-worm"], answer:0,
    why:"The Ladybug — who now trusts James — suggested they ask him for a plan." },
  { ch:"Chapter 32 · Getting Down", q:"What was James's plan to bring the peach down to the ground?",
    options:["Cut loose a few seagulls at a time so they slowly sink","Pop the peach","Wait for it to rain","Jump off one by one"], answer:0,
    why:"James figured that letting a few seagulls go at a time would make the peach sink slowly and safely to the ground." },
  { ch:"Chapter 32 · Getting Down", q:"Why does the Earthworm still panic, even though James keeps saving everyone?",
    options:["It's just his nature to worry and expect the worst","He is angry at James","He is very hungry","He wants to be the leader"], answer:0,
    why:"The Earthworm still hasn't learned to stop jumping to gloomy conclusions — worrying is simply his nature." },
  { ch:"Chapter 32 · Getting Down", q:"How does the Ladybug now think of James?",
    options:["As a clever, capable young man they can rely on","As a silly little boy","As a stranger","As the funniest one aboard"], answer:0,
    why:"The Ladybug now sees James as a competent young man, ready and able to lead them out of danger." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read the chapters, then test what you remember! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know these chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
