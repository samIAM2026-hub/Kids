<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordly Wise Lessons 13 & 14 — Vocabulary (Choose the Word)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'Comic Sans MS','Trebuchet MS',system-ui,sans-serif; background:linear-gradient(160deg,#ffe29a 0%,#ffb37b 50%,#ff8a5c 100%); min-height:100vh; color:#4a2c0f; padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  header { background:#ff7043; border-radius:24px; padding:26px 24px; text-align:center; color:#fff; box-shadow:0 8px 0 #d84315; margin-bottom:18px; }
  header .ic { font-size:48px; line-height:1; }
  header h1 { font-size:24px; margin:8px 0 4px; }
  header p { font-size:15px; opacity:.95; }
  .bar { background:#fff3e0; border-radius:16px; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; margin-bottom:16px; box-shadow:0 4px 0 #ffccbc; }
  .progress-track { flex:1; height:14px; background:#ffccbc; border-radius:10px; margin:0 14px; overflow:hidden; }
  .progress-fill { height:100%; width:0; background:#43a047; border-radius:10px; transition:width .3s; }
  .card { background:#fff; border-radius:20px; padding:22px; box-shadow:0 6px 0 #e0a96d; margin-bottom:16px; }
  .qmeta { font-size:13px; color:#ef6c00; font-weight:bold; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:22px; margin:8px 0 16px; line-height:1.4; }
  .blank { color:#c1440e; font-weight:bold; letter-spacing:2px; }
  .opt { display:block; width:100%; text-align:left; background:#fff8f0; border:3px solid #ffd2a8; border-radius:14px; padding:13px 16px; font-size:17px; font-family:inherit; color:#4a2c0f; margin-bottom:10px; cursor:pointer; transition:transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform:translateX(4px); border-color:#ff9d57; }
  .opt:disabled { cursor:default; }
  .opt.correct { background:#d7f5d3; border-color:#43a047; }
  .opt.wrong { background:#ffd9d9; border-color:#e53935; }
  .feedback { margin-top:6px; padding:12px 14px; border-radius:12px; font-size:15px; line-height:1.4; display:none; }
  .feedback.show { display:block; }
  .feedback.good { background:#e8f7e6; color:#2e7d32; }
  .feedback.bad { background:#fdeaea; color:#c62828; }
  .btn { background:#43a047; color:#fff; border:none; border-radius:14px; padding:14px 28px; font-size:18px; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 #2e7d32; transition:transform .1s; }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #2e7d32; }
  .btn.next { background:#ff7043; box-shadow:0 5px 0 #d84315; display:none; margin-top:6px; }
  .center { text-align:center; }
  .result { background:#fff; border-radius:24px; padding:34px 24px; text-align:center; box-shadow:0 6px 0 #e0a96d; }
  .result .big { font-size:60px; }
  .result h2 { font-size:27px; margin:10px 0; color:#ef6c00; }
  .scoreline { font-size:22px; margin:14px 0; }
  .stars { font-size:32px; letter-spacing:4px; margin:10px 0; }
  .hidden { display:none; }
  footer { text-align:center; font-size:13px; color:#7a4a1f; margin-top:10px; opacity:.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ic">📚</div>
    <h1>Wordly Wise · Lessons 13 &amp; 14</h1>
    <p>Vocabulary · Choose the word that fits the blank</p>
  </header>
  <div class="bar">
    <span id="qcount">Question 1 of 30</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer">For Grace · Passing score: 85%</footer>
</div>
<script>
const PASS_PCT = 0.85;
const questions = [
  // ---- Lesson 13 ----
  { ch:"Lesson 13", q:"The sight of the cruel act would ______ anyone who saw it.",
    options:["appall","boast","invade","suspect"], answer:0,
    why:"To appall is to shock or dismay someone." },
  { ch:"Lesson 13", q:"After failing the big test, she felt ______ and very quiet.",
    options:["dejected","suspect","fringe","boast"], answer:0,
    why:"Dejected means discouraged and low in spirits." },
  { ch:"Lesson 13", q:"Young children ______ on adults to keep them safe.",
    options:["depend","plead","humble","isolate"], answer:0,
    why:"To depend on someone is to rely on them for support." },
  { ch:"Lesson 13", q:"The empty, grey waiting room felt cold and ______.",
    options:["dreary","chord","occupy","fanatic"], answer:0,
    why:"Dreary means dull, sad, and gloomy." },
  { ch:"Lesson 13", q:"My cousin is a comic-book ______ who owns thousands of them.",
    options:["fanatic","impact","plead","meadow"], answer:0,
    why:"A fanatic is a person whose enthusiasm is extreme." },
  { ch:"Lesson 13", q:"The ______ of the crash dented the car door.",
    options:["impact","boast","reveal","suspect"], answer:0,
    why:"An impact is the striking of one object against another." },
  { ch:"Lesson 13", q:"Weeds began to ______ the neat vegetable garden.",
    options:["invade","plead","afford","isolate"], answer:0,
    why:"To invade is to enter by force or crowd in in great numbers." },
  { ch:"Lesson 13", q:"Doctors sometimes ______ a sick patient to stop germs spreading.",
    options:["isolate","reveal","plunge","boast"], answer:0,
    why:"To isolate is to set apart or cut off from others." },
  { ch:"Lesson 13", q:"Two large sofas ______ most of the small living room.",
    options:["occupy","chord","reveal","fanatic"], answer:0,
    why:"To occupy a space is to take it up or fill it." },
  { ch:"Lesson 13", q:"Pull back the heavy curtain to ______ the stage.",
    options:["reveal","boast","invade","suspect"], answer:0,
    why:"To reveal is to bring into view or make known." },
  { ch:"Lesson 13", q:"The final score of 60 to 5 was a complete ______.",
    options:["rout","chord","boast","plead"], answer:0,
    why:"A rout is a total, crushing defeat." },
  { ch:"Lesson 13", q:"The detective began to ______ the quiet neighbour.",
    options:["suspect","invade","afford","chord"], answer:0,
    why:"To suspect is to think someone is probably guilty." },
  { ch:"Lesson 13", q:"The bridge was closed, so the workers built a ______ path.",
    options:["temporary","fanatic","humble","plead"], answer:0,
    why:"Temporary means made to last only a short time." },
  { ch:"Lesson 13", q:"The sudden scream in the dark filled us with ______.",
    options:["terror","plead","meadow","isolate"], answer:0,
    why:"Terror is very great fear." },
  { ch:"Lesson 13", q:"The ______ accident left the whole town in tears.",
    options:["tragic","boast","humble","fanatic"], answer:0,
    why:"Tragic means causing great sadness." },
  // ---- Lesson 14 ----
  { ch:"Lesson 14", q:"They saved for a whole year before they could ______ a car.",
    options:["afford","chord","submit","suspect"], answer:0,
    why:"To afford is to have enough money to pay for something." },
  { ch:"Lesson 14", q:"He loves to ______ about his high score to everyone.",
    options:["boast","rout","humble","fanatic"], answer:0,
    why:"To boast is to brag or talk with too much pride." },
  { ch:"Lesson 14", q:"She strummed a gentle ______ on her guitar.",
    options:["chord","rout","fringe","suspect"], answer:0,
    why:"A chord is three or more musical notes played together." },
  { ch:"Lesson 14", q:"Her science project was truly ______ and won the fair.",
    options:["exceptional","obstinate","fanatic","dreary"], answer:0,
    why:"Exceptional means unusually good." },
  { ch:"Lesson 14", q:"We were very ______ to catch the very last train home.",
    options:["fortunate","dejected","humble","plead"], answer:0,
    why:"Fortunate means lucky." },
  { ch:"Lesson 14", q:"The soft woven rug had a ______ along both of its ends.",
    options:["fringe","plead","meadow","isolate"], answer:0,
    why:"A fringe is a border of hanging threads, or an outer edge." },
  { ch:"Lesson 14", q:"Even as the champion, she stayed ______ and kind to all.",
    options:["humble","boast","dreary","fanatic"], answer:0,
    why:"Humble means modest and not proud." },
  { ch:"Lesson 14", q:"The cows grazed all day in the wide green ______.",
    options:["meadow","chord","fringe","suspect"], answer:0,
    why:"A meadow is a field of grass or wildflowers." },
  { ch:"Lesson 14", q:"A ______ mood settled over him as the cold rain fell.",
    options:["melancholy","obstinate","suspect","humble"], answer:0,
    why:"Melancholy means deep sadness or sorrow." },
  { ch:"Lesson 14", q:"The ______ toddler refused to put on his shoes.",
    options:["obstinate","dejected","fringe","plead"], answer:0,
    why:"Obstinate means stubborn — not willing to give in." },
  { ch:"Lesson 14", q:"The lawyer will ______ her case before the judge.",
    options:["plead","rout","meadow","isolate"], answer:0,
    why:"To plead is to beg, or to answer a charge in court." },
  { ch:"Lesson 14", q:"The diver took a deep ______ off the high board.",
    options:["plunge","boast","meadow","isolate"], answer:0,
    why:"A plunge is a sudden dive or fall into something." },
  { ch:"Lesson 14", q:"Mom would not ______ about bedtime, no matter how we begged.",
    options:["relent","chord","afford","fanatic"], answer:0,
    why:"To relent is to soften and become less strict." },
  { ch:"Lesson 14", q:"Please ______ your finished homework by Friday morning.",
    options:["submit","chord","humble","suspect"], answer:0,
    why:"To submit is to hand something in for someone to look over." },
  { ch:"Lesson 14", q:"The tired hikers had to ______ up the steep, muddy hill.",
    options:["trudge","boast","invade","isolate"], answer:0,
    why:"To trudge is to walk slowly and heavily, with great effort." }
];

questions.forEach(item => {
  const correct = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correct);
});

let current = 0, score = 0, answered = false;
const passNeeded = Math.ceil(questions.length * PASS_PCT);
const pctLabel = Math.round(PASS_PCT * 100);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent = `For Grace · Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  const qHtml = item.q.replace('______', '<span class="blank">______</span>');
  const opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${qHtml}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() { current++; if (current < questions.length) render(); else showResult(); }

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars='⭐⭐⭐⭐⭐'; msg="Perfect score! You really know these words."; emoji='🏆'; }
  else if (passed) { stars='⭐⭐⭐⭐'; msg=`Excellent! You passed the ${pctLabel}% mark.`; emoji='🎖️'; }
  else if (pct >= 65) { stars='⭐⭐⭐'; msg=`So close! You need ${pctLabel}% to pass — review the words and try again.`; emoji='📖'; }
  else if (pct >= 45) { stars='⭐⭐'; msg=`Good effort! You need ${pctLabel}% to pass. Study the list and go again.`; emoji='📚'; }
  else { stars='⭐'; msg="Let's go over the words again and try once more."; emoji='✏️'; }
  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need ${pctLabel}%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
