<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 15–22 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 15–22</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 40</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read the chapters, then test what you remember! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 15 · The Aunts", q:"What were Aunt Sponge and Aunt Spiker doing when the peach came rolling at them?",
    options:["Setting up to sell tickets to sightseers","Baking a cake","Sleeping in the garden","Chasing James"], answer:0,
    why:"They had set up to charge sightseers to come and look at the giant peach." },
  { ch:"Chapter 15 · The Aunts", q:"What did Aunt Sponge trip over as she tried to run away?",
    options:["A garden hose","Her moneybox","A tree root","The cat"], answer:1,
    why:"As she ran, Aunt Sponge tripped over her own moneybox and fell." },
  { ch:"Chapter 15 · The Aunts", q:"What did Aunt Spiker trip over?",
    options:["A rock","Her own umbrella","Her sister, Aunt Sponge","A bucket"], answer:2,
    why:"Aunt Spiker tripped over Aunt Sponge, who had already fallen." },
  { ch:"Chapter 15 · The Aunts", q:"What happened to the two aunts when the peach rolled over them?",
    options:["They ran away safely","They were squashed completely flat","They climbed on top of the peach","They caught James"], answer:1,
    why:"The peach rolled right over both aunts and squashed them completely flat." },
  { ch:"Chapter 15 · The Aunts", q:"How did the aunts feel when they saw the giant peach coming?",
    options:["Happy and excited","Bored","Terrified — they screamed and panicked","Curious"], answer:2,
    why:"They screamed and panicked when they saw the huge peach rolling straight at them." },

  { ch:"Chapter 16 · The Escape", q:"What did the peach knock over at the bottom of the hill?",
    options:["A telephone pole","A church","A lighthouse","A windmill"], answer:0,
    why:"At the bottom of the hill the peach knocked over a telephone pole." },
  { ch:"Chapter 16 · The Escape", q:"How many cars did the peach flatten?",
    options:["Ten","Two","None","Five"], answer:1,
    why:"It flattened two parked cars as it rolled through." },
  { ch:"Chapter 16 · The Escape", q:"What kind of factory did the peach smash right through?",
    options:["A toy factory","A shoe factory","A chocolate factory","A car factory"], answer:2,
    why:"The peach smashed straight through a famous chocolate factory." },
  { ch:"Chapter 16 · The Escape", q:"What poured out of the factory and flooded the whole village?",
    options:["Water","Chocolate","Milk","Oil"], answer:1,
    why:"Chocolate poured out of the peach-shaped holes and flooded the village." },
  { ch:"Chapter 16 · The Escape", q:"Where did the peach go after it leaped off the tall cliffs?",
    options:["Into a forest","Into the ocean","Into a lake","Onto a mountain"], answer:1,
    why:"The peach shot off the tall cliffs and splashed down into the sea." },

  { ch:"Chapter 17 · To the Top", q:"How did the creatures feel after the wild, bumpy trip to the sea?",
    options:["Rested and fresh","All shaken up and tangled together","Hungry for cake","Ready to swim"], answer:1,
    why:"The bumpy ride left everyone bruised, shaken, and tangled up together." },
  { ch:"Chapter 17 · To the Top", q:"What did Miss Spider make so everyone could climb up?",
    options:["A ladder out of silk","A rope out of grass","A staircase of wood","A slide"], answer:0,
    why:"Miss Spider spun a silk ladder so they could climb to the top." },
  { ch:"Chapter 17 · To the Top", q:"Which creature did the others help get ready by putting on his shoes?",
    options:["The Grasshopper","The Earthworm","The Centipede","The Ladybug"], answer:2,
    why:"They all helped the Centipede put on his many shoes." },
  { ch:"Chapter 17 · To the Top", q:"How many shoes did the Centipede need to put on?",
    options:["2","10","42","100"], answer:2,
    why:"The Centipede needed 42 shoes — one for each of his feet." },
  { ch:"Chapter 17 · To the Top", q:"Where did everyone climb to?",
    options:["The very top (roof) of the peach","Down into the sea","Back to the garden","Inside the stem"], answer:0,
    why:"Everyone climbed all the way up to the very top of the peach." },

  { ch:"Chapter 18 · Out at Sea", q:"When they reached the top of the peach, where did they discover they were?",
    options:["In a big city","In the middle of the sea","On top of a mountain","In their garden"], answer:1,
    why:"From the top they saw they were floating in the middle of the sea." },
  { ch:"Chapter 18 · Out at Sea", q:"Why did James and the creatures start eating the peach?",
    options:["It was a party","They were hungry and thirsty","To make it smaller","To find treasure inside"], answer:1,
    why:"They were hungry and thirsty, so they ate the delicious peach itself." },
  { ch:"Chapter 18 · Out at Sea", q:"What did they think of the taste of the peach?",
    options:["It was sour","It was the most delicious thing ever","It tasted like fish","It had no taste"], answer:1,
    why:"They agreed it was the most delicious thing they had ever tasted." },
  { ch:"Chapter 18 · Out at Sea", q:"Who burst into a song about how tasty the peach was?",
    options:["The Centipede","The Earthworm","James","Miss Spider"], answer:0,
    why:"The Centipede was so happy he burst into song." },
  { ch:"Chapter 18 · Out at Sea", q:"What was the giant peach floating on?",
    options:["A river","The sea","A cloud","A road"], answer:1,
    why:"The giant peach was floating on the surface of the sea." },

  { ch:"Chapter 19 · The Sharks", q:"Who first noticed a 'funny thin black thing' in the water?",
    options:["James","The Centipede","The Ladybug","The Glow-worm"], answer:1,
    why:"The Centipede was the first to spot the thin black thing in the water." },
  { ch:"Chapter 19 · The Sharks", q:"What did the thin black things in the water turn out to be?",
    options:["Boats","Sharks","Whales","Sticks"], answer:1,
    why:"The thin black fins belonged to a group of sharks." },
  { ch:"Chapter 19 · The Sharks", q:"Who cried out that they were sharks?",
    options:["The Earthworm","The Grasshopper","Miss Spider","James"], answer:0,
    why:"It was the Earthworm who cried out that they were sharks." },
  { ch:"Chapter 19 · The Sharks", q:"What did the creatures fear the sharks wanted to eat?",
    options:["Only the fish","The peach (and them!)","Seaweed","Nothing"], answer:1,
    why:"They were afraid the sharks would eat the peach — and everyone on it." },
  { ch:"Chapter 19 · The Sharks", q:"Was there just one shark, or many?",
    options:["Just one","Many of them","None, it was a mistake","Only two whales"], answer:1,
    why:"There wasn't just one shark; many of them came swimming up." },

  { ch:"Chapter 20 · James's Plan", q:"What did James say he needed to make his plan work?",
    options:["String (silk)","A boat","A map","A fishing rod"], answer:0,
    why:"James's plan needed lots of string — that is, silk." },
  { ch:"Chapter 20 · James's Plan", q:"Which creature could spin lots of silk that James hadn't even met yet?",
    options:["The Silkworm","The Ladybug","The Grasshopper","The Glow-worm"], answer:0,
    why:"The Silkworm, hidden below, could spin all the silk James needed." },
  { ch:"Chapter 20 · James's Plan", q:"Besides the Silkworm, who else could spin plenty of string?",
    options:["The Centipede","Miss Spider","The Earthworm","James"], answer:1,
    why:"Miss Spider could also spin lots of strong thread." },
  { ch:"Chapter 20 · James's Plan", q:"What animals did James plan to use to lift the peach up out of the sea?",
    options:["Fish","Dolphins","Seagulls","Bats"], answer:2,
    why:"James planned to hitch seagulls to the peach to lift it into the air." },
  { ch:"Chapter 20 · James's Plan", q:"Which creature would be used to lure the seagulls closer?",
    options:["The Earthworm","The Ladybug","The Centipede","Miss Spider"], answer:0,
    why:"The juicy Earthworm would be used as bait to lure the seagulls." },

  { ch:"Chapter 21 · Catching Gulls", q:"Which creature was used as bait to attract the seagulls?",
    options:["The Grasshopper","The Earthworm","The Centipede","The Silkworm"], answer:1,
    why:"The Earthworm was the bait that attracted the hungry seagulls." },
  { ch:"Chapter 21 · Catching Gulls", q:"Where did James wait, hidden, for the first seagull?",
    options:["Inside the stem","Just below the top of the peach","On a little boat","Underwater with the sharks"], answer:1,
    why:"James hid just below the top of the peach with a silk loop ready." },
  { ch:"Chapter 21 · Catching Gulls", q:"When the seagull dived down for the Earthworm, what did James shout to the others?",
    options:["\"Run away!\"","\"Pull the Earthworm down!\"","\"Jump in the sea!\"","\"Go to sleep!\""], answer:1,
    why:"He shouted for the others to pull the Earthworm down to safety." },
  { ch:"Chapter 21 · Catching Gulls", q:"What did James slip around each seagull's neck?",
    options:["A loop of silk","A rubber band","A chain","A ribbon of paper"], answer:0,
    why:"James slipped a loop of silk around each seagull's neck." },
  { ch:"Chapter 21 · Catching Gulls", q:"Why did they pull the Earthworm down so quickly each time?",
    options:["So the seagull wouldn't eat him","To make him laugh","To feed him","To hide him from James"], answer:0,
    why:"They yanked him down so the seagull couldn't actually eat him." },

  { ch:"Chapter 22 · Up and Away", q:"What finally happened to the peach after enough seagulls were roped?",
    options:["It sank","It lifted up out of the water","It burst","It turned into a boat"], answer:1,
    why:"With enough seagulls tied on, the peach lifted up out of the sea." },
  { ch:"Chapter 22 · Up and Away", q:"About how many seagulls did it take to lift the peach into the sky?",
    options:["About 10","About 50","About 500","About 5,000"], answer:2,
    why:"It took around 500 seagulls — the 501st and 502nd finished the job." },
  { ch:"Chapter 22 · Up and Away", q:"What did the flying peach rise up like?",
    options:["A balloon","A rocket","A kite that fell","A submarine"], answer:0,
    why:"The peach floated up into the sky like a giant balloon." },
  { ch:"Chapter 22 · Up and Away", q:"Which way did the peach go — down or up?",
    options:["Down into the sea","Up into the sky","Sideways to shore","Nowhere"], answer:1,
    why:"Carried by the gulls, the peach rose up into the sky." },
  { ch:"Chapter 22 · Up and Away", q:"What was tied to the peach's stem to hold all the seagulls?",
    options:["Ropes of silk string","Metal wires","Rubber bands","Vines"], answer:0,
    why:"All the seagull strings were made of silk and tied to the peach's stem." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read the chapters, then test what you remember! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know these chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
