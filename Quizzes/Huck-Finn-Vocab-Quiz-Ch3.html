<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huckleberry Finn — Chapter 3 Vocabulary Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #e8dcc0 0%, #cdbf99 50%, #a89a6f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .ico { font-size: 46px; line-height: 1; }
  header h1 { font-size: 24px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #b8a677;
  }
  .progress-track { flex: 1; height: 14px; background: #d3c193; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #7a5c2e; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #b8a677;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .word { font-size: 27px; font-weight: bold; color: #5b4636; margin: 6px 0 2px; }
  .context { font-size: 16px; font-style: italic; color: #6a5a40; margin-bottom: 16px; line-height: 1.45; }
  .ask { font-size: 17px; margin-bottom: 14px; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.45;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #7a5c2e;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #543e1d;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #543e1d; }
  .btn.next { display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #b8a677;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ico">📖✒️</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Vocabulary Quiz · Chapter 3 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Word 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer>For Warren · Every word comes straight from Chapter 3. Passing score: 80% (12 of 15)</footer>
</div>

<script>
const questions = [
  {
    word: "ornery",
    context: "“…seeing I was so ignorant and so kind of low-down and ornery.”",
    ask: "What does <strong>ornery</strong> mean?",
    options: ["Bad-tempered, mean, or stubborn", "Cheerful and friendly", "Wealthy and proud", "Tall and strong"],
    answer: 0,
    why: "Ornery means having a mean, grumpy, or stubborn nature. Huck is calling himself low and badly behaved."
  },
  {
    word: "resigned",
    context: "“We played robber now and then about a month, and then I resigned.”",
    ask: "In this sentence, <strong>resigned</strong> means Huck…",
    options: ["Quit / gave up being part of the gang", "Won the game", "Fell asleep", "Got into trouble"],
    answer: 0,
    why: "To resign is to quit or step down from something. Huck left the robber gang."
  },
  {
    word: "ambuscade",
    context: "“…so we would lay in ambuscade, as he called it, and kill the lot and scoop the things.”",
    ask: "An <strong>ambuscade</strong> is…",
    options: ["An ambush — a surprise attack from a hidden spot", "A large feast", "A type of sword", "A long journey"],
    answer: 0,
    why: "Ambuscade is an old-fashioned word for an ambush: hiding and then attacking by surprise."
  },
  {
    word: "tract",
    context: "“…Jo Harper got a hymn-book and a tract…”",
    ask: "A <strong>tract</strong> is…",
    options: ["A small pamphlet or booklet (often religious)", "A piece of candy", "A musical instrument", "A walking stick"],
    answer: 0,
    why: "A tract is a little printed booklet or leaflet, usually about religion — not much of a robbery prize!"
  },
  {
    word: "ragged",
    context: "“…said this drowned man was just his size, and was ragged…”",
    ask: "Something <strong>ragged</strong> is…",
    options: ["Torn, tattered, and worn out", "Brand new and shiny", "Soft and warm", "Bright and colorful"],
    answer: 0,
    why: "Ragged means full of rags — old, torn clothing. It matched how Pap usually dressed."
  },
  {
    word: "drovers",
    context: "“We used to hop out of the woods and go charging down on hog-drovers…”",
    ask: "<strong>Drovers</strong> (as in hog-drovers) are people who…",
    options: ["Drive farm animals to market", "Sail boats on the river", "Sell newspapers", "Repair wagons"],
    answer: 0,
    why: "A drover drives livestock (like hogs) along roads to market. Hog-drovers herd pigs."
  },
  {
    word: "ingots",
    context: "“Tom Sawyer called the hogs ‘ingots,’ and he called the turnips and stuff ‘julery.’”",
    ask: "An <strong>ingot</strong> is really…",
    options: ["A bar or block of metal, like gold or silver", "A baby pig", "A wooden box", "A kind of bird"],
    answer: 0,
    why: "An ingot is a molded bar of metal (think gold bars). Tom pretended ordinary hogs were treasure."
  },
  {
    word: "lath",
    context: "“…though they was only lath and broom-sticks…”",
    ask: "A <strong>lath</strong> is…",
    options: ["A thin, narrow strip of wood", "A sharp metal blade", "A heavy stone", "A coil of rope"],
    answer: 0,
    why: "A lath is a thin flat strip of wood. The gang's 'swords' were just flimsy wooden strips."
  },
  {
    word: "scoured",
    context: "“He never could go after even a turnip-cart but he must have the swords and guns all scoured up.”",
    ask: "To have something <strong>scoured</strong> means it was…",
    options: ["Scrubbed and polished clean", "Broken into pieces", "Painted black", "Hidden away"],
    answer: 0,
    why: "To scour is to scrub hard until clean and shiny. Tom wanted the play-swords polished up."
  },
  {
    word: "enchantment",
    context: "“He said it was all done by enchantment.”",
    ask: "<strong>Enchantment</strong> means…",
    options: ["Magic, or being under a magic spell", "A loud argument", "A long nap", "A school lesson"],
    answer: 0,
    why: "Enchantment is magic or a magical spell. Tom claimed magicians had enchanted the caravan."
  },
  {
    word: "spite",
    context: "“…they had turned the whole thing into an infant Sunday school, just out of spite.”",
    ask: "Doing something out of <strong>spite</strong> means doing it to…",
    options: ["Hurt, annoy, or get back at someone", "Help a friend", "Make money", "Win a prize"],
    answer: 0,
    why: "Spite is a mean wish to annoy or hurt someone. Tom says the magicians did it just to be nasty."
  },
  {
    word: "by-and-by",
    context: "“I judged the old man would turn up again by-and-by…”",
    ask: "<strong>By-and-by</strong> means…",
    options: ["After a while / soon enough", "Never", "Right this second", "Far away"],
    answer: 0,
    why: "By-and-by is an old phrase meaning 'before long' or 'eventually.' Huck expects Pap back sometime soon."
  },
  {
    word: "whale (verb)",
    context: "“He used to always whale me when he was sober and could get his hands on me…”",
    ask: "To <strong>whale</strong> someone means to…",
    options: ["Beat or thrash them", "Swim with them", "Praise them", "Feed them"],
    answer: 0,
    why: "Used as a verb, to whale on someone means to hit or beat them hard. Pap used to beat Huck."
  },
  {
    word: "numskull",
    context: "“Tom Sawyer said I was a numskull.”",
    ask: "A <strong>numskull</strong> is…",
    options: ["A foolish or stupid person", "A brave hero", "A fast runner", "A wealthy man"],
    answer: 0,
    why: "Numskull (numbskull) is a playful insult meaning a dummy or fool — Tom is calling Huck silly."
  },
  {
    word: "Providence",
    context: "“…the widow would take me one side and talk about Providence… there was two Providences.”",
    ask: "Here, <strong>Providence</strong> refers to…",
    options: ["God, or God's care and guidance", "A city in another state", "A kind of food", "A sailing ship"],
    answer: 0,
    why: "Providence means God or divine care. Huck imagines two different versions — a kind one and a harsh one."
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Word ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">Chapter 3 Vocabulary</div>
      <div class="word">${item.word}</div>
      <div class="context">${item.context}</div>
      <div class="ask">${item.ask}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = pct >= 80;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect! Your Chapter 3 word power is outstanding."; emoji = '🏆'; }
  else if (pct >= 80) { stars = '⭐⭐⭐⭐'; msg = "Excellent vocabulary! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review the words and try again."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Study the words and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's go over these Chapter 3 words together and try once more."; emoji = '✏️'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (12 of 15)</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
