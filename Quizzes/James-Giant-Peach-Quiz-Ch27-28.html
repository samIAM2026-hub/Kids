<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 27–28 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑☁️</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 27–28 · The Cloud-Men</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · This one is a tough one — read carefully! Passing score: 80%</footer>
</div>

<script>
const questions = [
  // ---------- CHAPTER 27 ----------
  { ch:"Chapter 27 · Into the Clouds",
    q:"The book says an airplane could never have seen the Cloud-Men, but the peach could. Why?",
    options:[
      "A plane is noisy and scares things hiding in the clouds, but the peach is a soft, silent traveler",
      "A plane flies too low to reach the clouds",
      "The Cloud-Men only come out when it rains",
      "Airplanes have windows that are too small"],
    answer:0,
    why:"Dahl explains that noisy airplanes frighten away whatever hides in the 'cloud-mountains,' but the peach drifts by quietly — so James and his friends saw wonders nobody had ever seen before." },

  { ch:"Chapter 27 · The Strange Creatures",
    q:"When the Cloud-Men first came into view, how big were they compared to an ordinary person?",
    options:[
      "About twice the height of a normal man",
      "Exactly the same size as James",
      "As tiny as the Ladybug",
      "As huge as the whole peach"],
    answer:0,
    why:"The Cloud-Men were wispy, ghostly creatures roughly twice as tall as a normal man — strange and a little frightening to see." },

  { ch:"Chapter 27 · The Centipede's Mouth",
    q:"To tease the frightened Earthworm, the Centipede said the Cloud-Men would love to eat him — like what food?",
    options:[
      "Like a salami",
      "Like a chocolate bar",
      "Like a slice of pie",
      "Like a stick of butter"],
    answer:0,
    why:"The Centipede cruelly joked that the Cloud-Men would gobble up an earthworm like a salami — one of his many unkind teases." },

  { ch:"Chapter 27 · Making the Weather",
    q:"How did the Cloud-Men actually make hailstones?",
    options:[
      "They grabbed handfuls of cloud, rolled them into marbles, then shoveled them over the edge",
      "They squeezed water out of the sky with giant sponges",
      "They froze raindrops in silver buckets",
      "They carved them out of blocks of ice"],
    answer:0,
    why:"The Cloud-Men scooped up cloud, rolled it into little marbles, piled them up, and then shoveled them off the edge to fall as hail — a wonderfully absurd idea from Dahl." },

  { ch:"Chapter 27 · The Chant",
    q:"As the Cloud-Men shoveled the marbles over the side, what were they chanting about?",
    options:[
      "Sending hail and snow down to the Earth below",
      "Building a staircase to the moon",
      "Catching the giant peach in a net",
      "Painting the whole sky blue"],
    answer:0,
    why:"They chanted about hurling hail and snow down onto the world below — showing that the Cloud-Men believe THEY are the ones who make the weather." },

  { ch:"Chapter 27 · The Centipede Doubts",
    q:"When James said the Cloud-Men were making hailstones, why did the Centipede refuse to believe him?",
    options:[
      "Because it was summer, and he thought hail in summer was ridiculous",
      "Because he could not see the Cloud-Men at all",
      "Because James had been wrong many times before",
      "Because the Grasshopper told him it was snow"],
    answer:0,
    why:"The Centipede scoffed that you can't have hail in summertime — so he laughed at James instead of staying quiet, which led to big trouble." },

  { ch:"Chapter 27 · A Big Mistake",
    q:"What did the Centipede do that turned the Cloud-Men's anger onto the peach?",
    options:[
      "He danced about, made rude gestures, and shouted that they were idiots",
      "He threw a hailstone back at them",
      "He climbed onto a cloud to fight them",
      "He sang a loud, cheerful song"],
    answer:0,
    why:"Instead of hiding quietly, the Centipede insulted the Cloud-Men — dancing, making rude gestures, and calling them idiots — so they attacked the peach in a fury." },

  { ch:"Chapter 27 · Under Attack",
    q:"When the first hailstones came flying, where did one of them hit the Centipede?",
    options:[
      "Right on the nose",
      "On the tip of his tail",
      "On one of his 42 boots",
      "On the back of his head"],
    answer:0,
    why:"A hailstone smacked the Centipede square on the nose — a painful little punishment for all his rude behavior." },

  { ch:"Chapter 27 · Real Danger",
    q:"What did the flying hailstones do to the peach itself?",
    options:[
      "They punched holes right into it",
      "They bounced off without a mark",
      "They turned it to solid ice",
      "They knocked it upside down"],
    answer:0,
    why:"The Cloud-Men threw so hard that the hailstones actually made holes in the peach — which is why it later started leaking." },

  { ch:"Chapter 27 · Take Cover!",
    q:"How large did the hailstones grow, so that James ordered everyone to run down into the peach?",
    options:[
      "As big as cannonballs",
      "As small as peas",
      "As flat as pancakes",
      "As big as houses"],
    answer:0,
    why:"The Cloud-Men made bigger and bigger hailstones until they were as big as cannonballs, and James rushed everyone down the tunnel to safety inside the peach." },

  { ch:"Chapter 27 · Hiding Inside",
    q:"Down inside the peach, the Ladybug wanted someone to check her shell — why couldn't the Glow-worm help?",
    options:[
      "The Glow-worm's bulb was cracked, so it gave no light",
      "The Glow-worm had run away",
      "The Glow-worm was fast asleep",
      "The Glow-worm was too busy crying"],
    answer:0,
    why:"A hailstone had cracked the Glow-worm's bulb, so there was no light to inspect the Ladybug's shell in the dark tunnel — a clever little detail." },

  { ch:"Chapter 27 · All Clear",
    q:"How did James finally figure out that the hailstone attack was over?",
    options:[
      "He noticed he could no longer hear the hailstones, so he peeked out and saw the coast was clear",
      "The Grasshopper flew up to check for him",
      "The peach suddenly stopped moving",
      "The Cloud-Men shouted that they were done"],
    answer:0,
    why:"When the banging of the hailstones went silent, James carefully peeked outside, found it safe, and let everyone come back up." },

  // ---------- CHAPTER 28 ----------
  { ch:"Chapter 28 · Back on Top",
    q:"When the friends climbed back onto the peach after the attack, what worrying thing did they notice?",
    options:[
      "The peach was leaking",
      "The seagulls had all flown away",
      "The Centipede had vanished",
      "It had started to snow"],
    answer:0,
    why:"The hailstone holes had done damage — the peach was now leaking, a reminder that the Centipede's rudeness had real consequences." },

  { ch:"Chapter 28 · The Mysterious Arch",
    q:"Before anyone realized what the huge arch ahead really was, what did the bugs guess it might be?",
    options:[
      "A bridge or a giant upside-down horseshoe",
      "A rainbow-colored snake",
      "A doorway into the moon",
      "A row of sleeping Cloud-Men"],
    answer:0,
    why:"Both ends of the arch rested on clouds, so the puzzled bugs wondered if it was a bridge or a giant upside-down horseshoe before they understood the truth." },

  { ch:"Chapter 28 · What It Really Was",
    q:"What was the great arch that the Cloud-Men were busily working on?",
    options:[
      "A rainbow they were painting",
      "A ladder made of ice",
      "A nest for the seagulls",
      "A wall to trap the peach"],
    answer:0,
    why:"The Cloud-Men were painting a rainbow — and once James's friends realized it, they even called the Centipede back up to see something so beautiful." },

  { ch:"Chapter 28 · James's Plan",
    q:"There were millions of Cloud-Men on the rainbow. What was James's plan for getting past them?",
    options:[
      "Stay completely silent and quietly sneak past",
      "Shout loudly to scare them away",
      "Throw the leftover hailstones at them",
      "Ask the Cloud-Men politely for help"],
    answer:0,
    why:"James knew their only hope was to slip by unnoticed, so he begged his panicking friends to keep quiet — the opposite of what the Centipede had done." },

  { ch:"Chapter 28 · Crash!",
    q:"Why did the peach end up smashing right through the rainbow?",
    options:[
      "The peach was drifting straight toward the rainbow, which now hung by ropes in its path",
      "The Centipede steered the peach into it on purpose",
      "A Cloud-Man threw the peach at the rainbow",
      "The seagulls dived down to grab it"],
    answer:0,
    why:"The Cloud-Men had pushed the rainbow off the clouds so it dangled by ropes — right where the peach was heading. James yelled to hold on, and the peach crashed through and splintered it." },

  { ch:"Chapter 28 · The Angry Cloud-Man",
    q:"After the crash, the rainbow's ropes tangled in the peach's silk strings. What did one furious Cloud-Man do next?",
    options:[
      "He climbed down a string toward the peach",
      "He blew the peach away with a giant fan",
      "He froze the seagulls in place",
      "He gave up and floated off"],
    answer:0,
    why:"An enraged Cloud-Man started climbing down one of the silk strings toward the peach — a scary moment that James had to think fast to escape." },

  { ch:"Chapter 28 · James Thinks Fast",
    q:"The Centipede yelled to feed the Cloud-Man the Earthworm, but what did James order instead — and what happened?",
    options:[
      "He told the Centipede to bite through the string, and a seagull flew off carrying the Cloud-Man away",
      "He told everyone to hide, and the Cloud-Man got lost",
      "He told the Spider to spin a net, and the Cloud-Man was trapped",
      "He told the Grasshopper to sing, and the Cloud-Man fell asleep"],
    answer:0,
    why:"James had the Centipede bite through the tangled string. That set one seagull free, and it flew off with the Cloud-Man dangling and cursing beneath it." },

  { ch:"Chapter 28 · Sweet and Sticky Revenge",
    q:"What freed the peach in the end, and how did the Cloud-Men get their revenge on the Centipede?",
    options:[
      "The shocked Cloud-Men let go of their ropes, freeing the peach; then they chased it and tipped purple paint all over the Centipede",
      "The peach melted the ropes; then the Cloud-Men gave up quietly",
      "James cut every rope; then the Cloud-Men threw snowballs at James",
      "The seagulls pulled harder; then the Cloud-Men painted the peach green"],
    answer:0,
    why:"Seeing their friend carried off, the other Cloud-Men let go of their ropes in shock, which freed the peach. Furious, they chased it — hurling dead rats and saucepans, and pouring a whole gallon of purple paint onto the Centipede." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · This one is a tough one — read carefully! Passing score: 80% (${passNeeded} of ${questions.length})`;

function shuffle(a) {
  for (let k = a.length - 1; k > 0; k--) {
    const j = Math.floor(Math.random() * (k + 1));
    [a[k], a[j]] = [a[j], a[k]];
  }
  return a;
}

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  // Shuffle the option order so the correct answer isn't always in the same spot
  const order = shuffle(item.options.map((_, i) => i));

  let opts = order.map(origIdx =>
    `<button class="opt" data-orig="${origIdx}" onclick="choose(${origIdx})">${item.options[origIdx]}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(origIdx) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  const chosenBtn = [...buttons].find(b => +b.dataset.orig === origIdx);
  const correctBtn = [...buttons].find(b => +b.dataset.orig === item.answer);

  if (origIdx === item.answer) {
    score++;
    chosenBtn.classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    chosenBtn.classList.add('wrong');
    correctBtn.classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really know these chapters inside and out."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent work! You passed this tough quiz."; emoji = '🎖️'; }
  else if (pct >= 65) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread the Cloud-Men chapters and try again."; emoji = '📖'; }
  else if (pct >= 45) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapters 27 & 28 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read the Cloud-Men chapters again carefully and try once more."; emoji = '☁️'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#ffd9d9;color:#c62828;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#a06a30;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
