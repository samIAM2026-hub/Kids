<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 16 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Chapter 16 · Fill-in-the-Blank &amp; Comprehension · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 13</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80%</footer>
</div>

<script>
const questions = [
  // ---------- PART 1: FILL IN THE BLANK ----------
  { ch:"Part 1 · Fill in the Blank",
    q:"As the raft drew close to ______, Jim shook with excitement at being so near to his freedom.",
    options:["Memphis","Cairo","Chicago","Atlanta"],
    answer:1,
    why:"Cairo was the gateway to the free states. Being that close made Jim tremble with hope — and made Huck tremble with guilt." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Jim said that once he was free, he would work and save money to buy his ______ out of slavery.",
    options:["boat and gun","wife and children","farm and horse","house and land"],
    answer:1,
    why:"Jim's dream isn't riches — it's rescuing his wife and two children from slavery, showing how much his family means to him." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Two armed men in a small boat told Huck they were hunting five runaway ______.",
    options:["thieves","horses","slaves","soldiers"],
    answer:2,
    why:"The men were slave-catchers looking for escaped slaves — exactly the danger that could send Jim back into bondage." },

  { ch:"Part 1 · Fill in the Blank",
    q:"To keep the men away from the raft, Huck lied that his family aboard had a dangerous, catching illness: ______.",
    options:["a broken leg","the measles","a bad cold","smallpox"],
    answer:3,
    why:"The word 'smallpox' terrified the men — it was deadly and highly contagious, so they fled rather than search the raft." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Jim blamed all of their bad luck on the time they had touched a ______ skin.",
    options:["rattlesnake","bearskin","rabbit","beaver"],
    answer:0,
    why:"True to his superstitions, Jim was sure that handling a rattlesnake skin had cursed them with rotten luck — like missing Cairo." },

  // ---------- PART 2: COMPREHENSION ----------
  { ch:"Part 2 · Comprehension",
    q:"Why does Huck feel sick and miserable as the raft gets near Cairo?",
    options:[
      "He is afraid of catching an illness from a passing boat",
      "His conscience tells him helping Jim escape is like stealing",
      "He is worried the raft is about to sink in the current",
      "He is annoyed that Jim keeps talking on and on about his beloved family"],
    answer:1,
    why:"Huck's 'conscience' — really the racist rules of his society — nags that by helping Jim he is robbing Miss Watson of her 'property.' The guilt makes him physically ill." },

  { ch:"Part 2 · Comprehension",
    q:"Twain shows Huck's conscience as a sick feeling instead of a real argument. What does this suggest?",
    options:[
      "Huck is truly coming down with a bad fever",
      "Huck simply cannot think clearly at all whenever he happens to be hungry",
      "Huck has secretly hated Jim all along",
      "His guilt is society's racism drilled into him, not real wrongdoing"],
    answer:3,
    why:"His 'conscience' isn't true morality — it's what his slave-owning society trained him to feel. Twain shows it as a sickness Huck can't reason with, only slowly outgrow." },

  { ch:"Part 2 · Comprehension",
    q:"Huck is shocked to hear Jim plan to 'steal' his own children from their owner. Why is that reaction ironic?",
    options:[
      "Jim was only joking about freeing his children",
      "The real wrong is owning Jim's family, not Jim freeing them",
      "Huck is secretly planning to go and steal some children of his own",
      "Jim's children were never actually enslaved"],
    answer:1,
    why:"Huck calls it 'stealing,' but the true crime is that people can own Jim's wife and kids at all. The irony exposes how twisted his society's idea of right and wrong really is." },

  { ch:"Part 2 · Comprehension",
    q:"When the slave-hunters ask if anyone Black is aboard, why can't Huck turn Jim in?",
    options:[
      "He is simply far too frightened of the two armed men in the boat",
      "He honestly forgets that Jim is on the raft",
      "Deep down he cares for Jim, so the words won't come",
      "He has lost his voice from the cold river"],
    answer:2,
    why:"Huck fully means to betray Jim — but when the moment comes, his real feelings win and he just can't say the words. His heart overrules the lesson society taught him." },

  { ch:"Part 2 · Comprehension",
    q:"How does Huck actually scare the slave-hunters away from searching the raft?",
    options:[
      "He warns the two men that a huge, dangerous storm is rolling in fast",
      "He points a loaded gun straight at the two men",
      "He offers the men a big pile of gold coins",
      "He hints his sick 'family' on board has smallpox"],
    answer:3,
    why:"Huck cleverly makes them believe his 'father' aboard has deadly, catching smallpox. The men bolt in fear — and even give Huck money out of pity." },

  { ch:"Part 2 · Comprehension",
    q:"Afterward Huck decides he'll just 'do whichever come handiest.' What does this reveal about him?",
    options:[
      "He has chosen to always tell the truth from now on",
      "He honestly no longer cares one bit whether Jim gets to stay free",
      "He can't yet see that saving Jim was the right thing",
      "He has finally learned to trust his school lessons"],
    answer:2,
    why:"Huck did a genuinely good deed but feels no better than if he'd done 'wrong,' so he gives up trying to tell them apart. He isn't ready yet to trust that his kind heart is right." },

  { ch:"Part 2 · Comprehension",
    q:"Drifting past Cairo in the fog is far worse than simple bad luck. Why?",
    options:[
      "It means that they have now wasted all of their food and their money",
      "It proves the rattlesnake skin truly was magic",
      "Every mile past it carries Jim deeper into slave country",
      "It means Huck can never go home to the widow again"],
    answer:2,
    why:"Cairo was the turn toward freedom. Missing it means the river now carries Jim farther south, deeper into slavery — a quietly tragic turn in their journey." },

  { ch:"Part 2 · Comprehension",
    q:"At the end, a speeding steamboat smashes the raft. What does this sudden disaster do to the story?",
    options:[
      "It carries the two of them safely to Cairo",
      "It splits Huck and Jim apart and turns the plot a new way",
      "It proves the armed men had circled back for them",
      "It finally gives Huck the very canoe that he had been wanting to buy"],
    answer:1,
    why:"The crash throws Huck and Jim overboard and separates them, launching the next stretch of the story — Huck's time with the Grangerfords — away from the raft." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position or length).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 16 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 16 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
