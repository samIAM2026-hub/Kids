<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 23–24 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 23–24</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 16</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read the chapters, then test what you remember! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 23 · On Top of the Peach", q:"While the others celebrated on top, which two shy creatures quietly watched?",
    options:["The Glow-worm and the Silkworm","The Ladybug and Miss Spider","The Centipede and James","The Earthworm and the Grasshopper"], answer:0,
    why:"Even the shy Glow-worm and the quiet Silkworm watched everyone else celebrate on top of the peach." },
  { ch:"Chapter 23 · On Top of the Peach", q:"How did the others react when Miss Spider came back and said the peach was fine?",
    options:["They cheered for her","They didn't believe her","They fell asleep","They jumped into the sea"], answer:1,
    why:"No one believed her — they were sure the sharks must have done damage." },
  { ch:"Chapter 23 · On Top of the Peach", q:"What did the Centipede point out that made everyone doubt the peach was safe?",
    options:["That it was getting dark","That they had felt the peach sinking","That the seagulls looked tired","That it was starting to rain"], answer:1,
    why:"The Centipede reminded them that they had felt the peach sinking in the water." },
  { ch:"Chapter 23 · On Top of the Peach", q:"What did the Old-Green-Grasshopper suggest about that 'sinking' feeling?",
    options:["The peach really did sink","They were so frightened they only imagined it","A whale had pushed them down","The seagulls dropped them"], answer:1,
    why:"He suggested they were so scared that they only thought they were sinking." },
  { ch:"Chapter 23 · The Ship", q:"What was the name of the great ship James saw down below?",
    options:["The Titanic","The Queen Mary","The Mayflower","The Peach Express"], answer:1,
    why:"The ship was the Queen Mary, steaming along far below the peach." },
  { ch:"Chapter 23 · The Ship", q:"Where was that ship heading?",
    options:["To America","To England","To Africa","Back to the garden"], answer:0,
    why:"The Queen Mary was on her way across the ocean to America." },
  { ch:"Chapter 23 · The Ship", q:"When the Captain looked through his telescope, what did he see on the peach?",
    options:["Only some clouds","A small boy and giant insects","Pirates","Nothing at all"], answer:1,
    why:"Through the telescope the Captain could make out a small boy, a huge grasshopper, a big spider and an enormous centipede." },
  { ch:"Chapter 23 · The Ship", q:"What did the peach do at the very end of the chapter?",
    options:["It landed on the ship","It disappeared into a cloud","It fell into the sea","It popped"], answer:1,
    why:"The peach floated on and disappeared right into a cloud." },

  { ch:"Chapter 24 · Up in the Sky", q:"Why weren't the others worried about where they would land?",
    options:["They had a map","They knew the seagulls would reach land eventually","James was steering","They didn't want to land"], answer:1,
    why:"They figured the seagulls were sure to hit land at some point, so there was no need to worry." },
  { ch:"Chapter 24 · The Grasshopper's Music", q:"How did James feel about the Old-Green-Grasshopper's music?",
    options:["He thought it was too loud","He had never heard anything so beautiful","He didn't like it","He fell asleep"], answer:1,
    why:"James had never in his life heard music so beautiful." },
  { ch:"Chapter 24 · The Grasshopper's Music", q:"What did everyone do when the first part of the concert finished?",
    options:["They applauded","They booed","They went to sleep","They dived into the sea"], answer:0,
    why:"When the first part of the concert was done, everyone applauded." },
  { ch:"Chapter 24 · The Grasshopper's Music", q:"A LONG-horned grasshopper makes music a different way. How?",
    options:["By rubbing its wings together","By stamping its feet","By singing","By tapping its head"], answer:0,
    why:"Long-horned grasshoppers make their noise by rubbing their wings together." },
  { ch:"Chapter 24 · The Grasshopper's Music", q:"The long-horned grasshopper's wing music sounds more like which instrument?",
    options:["A banjo","A violin","A flute","A trumpet"], answer:0,
    why:"The Old-Green-Grasshopper said that inferior wing-rubbing sounds like a banjo, not a violin." },
  { ch:"Chapter 24 · Insect Facts", q:"James was surprised that he had never wondered about what?",
    options:["How a grasshopper makes its sound","How high the peach could fly","Where the seagulls came from","What sharks eat"], answer:0,
    why:"James marveled that he had never once thought about how a grasshopper makes its noise." },
  { ch:"Chapter 24 · Insect Facts", q:"At first, James guessed that grasshoppers must have their ears where?",
    options:["On their heads","On their legs","On their wings","On their tails"], answer:0,
    why:"James insisted grasshoppers must have ears on their heads — but he was wrong!" },
  { ch:"Chapter 24 · Insect Facts", q:"To tease James, what did the Centipede tell him to do?",
    options:["Look in a mirror","Jump off the peach","Be quiet","Count the seagulls"], answer:0,
    why:"The Centipede said it's silly to have ears on your head and told James to look in a mirror sometime." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read the chapters, then test what you remember! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know these chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
