<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 13–14 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 13–14</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer>For Grace · Read the chapters, then test what you remember! Passing score: 80% (12 of 15) 🕷️🐞🐛</footer>
</div>

<script>
const questions = [
  {
    ch: "Chapter 13",
    q: "What did Miss Spider make so that everyone would have somewhere to sleep?",
    options: ["Soft beds (hammocks) spun out of her silk", "Wooden bunk beds", "Piles of peach leaves", "Sleeping bags from cloth"],
    answer: 0,
    why: "Miss Spider spun beautiful beds out of her own silk thread, like cozy hammocks for each of her friends."
  },
  {
    ch: "Chapter 13",
    q: "What material did Miss Spider use to make the beds?",
    options: ["Her own silk thread", "Cotton wool", "Dried grass", "Peach skin"],
    answer: 0,
    why: "She used the fine silk thread that spiders spin to create the soft beds."
  },
  {
    ch: "Chapter 13",
    q: "What job was James busy doing for a long time that night?",
    options: ["Helping take off and put away the Centipede's many boots", "Cooking dinner for everyone", "Cleaning the peach tunnel", "Spinning silk with Miss Spider"],
    answer: 0,
    why: "James spent about two hours working on the Centipede's many boots — the Centipede has a LOT of feet!"
  },
  {
    ch: "Chapter 13",
    q: "About how long did James spend working on the Centipede's boots?",
    options: ["About two hours", "Five minutes", "All night long", "Half a day"],
    answer: 0,
    why: "It took James roughly two hours to deal with all of the Centipede's boots."
  },
  {
    ch: "Chapter 13",
    q: "What had the Centipede done by the time James finally finished the boots?",
    options: ["He had fallen fast asleep", "He had run away", "He had eaten all the peach", "He had put the boots back on"],
    answer: 0,
    why: "By the time James was done, the tired Centipede had already fallen asleep."
  },
  {
    ch: "Chapter 13",
    q: "How did Miss Spider surprise James with the way she behaved?",
    options: ["She was gentle and kind, almost motherly, tucking everyone in", "She was cruel and bossy", "She ignored everyone", "She tried to eat James"],
    answer: 0,
    why: "Even though James first thought she was scary, Miss Spider turned out to be thoughtful and gentle, caring for everyone."
  },
  {
    ch: "Chapter 13",
    q: "What had James wrongly believed about Miss Spider when he first met her?",
    options: ["That she was frightening and might want to eat him", "That she could not talk", "That she was the leader of the group", "That she was James's aunt"],
    answer: 0,
    why: "At first James feared Miss Spider, but he learned she was actually one of the kindest creatures in the peach."
  },
  {
    ch: "Chapter 14",
    q: "What woke James up the next morning?",
    options: ["The creatures shouting excitedly that they were leaving", "A loud alarm clock", "Rain falling on the peach", "His aunts calling him"],
    answer: 0,
    why: "James was jolted awake by the insects shouting happily — the great journey was about to begin!"
  },
  {
    ch: "Chapter 14",
    q: "What did the movement of the peach feel like to James?",
    options: ["Like an earthquake was happening", "Like floating gently on a cloud", "Like nothing at all", "Like swinging in a hammock"],
    answer: 0,
    why: "Everything was shaking and moving so much that it felt almost like an earthquake."
  },
  {
    ch: "Chapter 14",
    q: "Which kind, gentle creature explained to James what was happening?",
    options: ["The Ladybug", "The Earthworm", "Aunt Spiker", "The Glow-worm"],
    answer: 0,
    why: "The gentle Ladybug calmly explained to James that they were about to leave the hilltop forever."
  },
  {
    ch: "Chapter 14",
    q: "What were James and the creatures finally leaving behind forever?",
    options: ["The lonely hilltop and Aunt Sponge and Aunt Spiker", "The seaside", "A big city", "Their school"],
    answer: 0,
    why: "They were escaping the desolate hilltop and James's two horrible aunts at last."
  },
  {
    ch: "Chapter 14",
    q: "What was the Centipede doing up on top of the peach?",
    options: ["Cutting through the stem with his sharp jaws", "Taking a nap", "Painting the peach", "Looking for food"],
    answer: 0,
    why: "The Centipede used his strong, sharp jaws to gnaw through the stem holding the peach to the tree."
  },
  {
    ch: "Chapter 14",
    q: "Why did the Centipede cut through the stem?",
    options: ["So the peach would break free and roll away on its journey", "To make the peach grow bigger", "To get a snack", "To scare the aunts"],
    answer: 0,
    why: "Once the stem was cut, the peach could roll free and carry everyone away from the hilltop."
  },
  {
    ch: "Chapter 14",
    q: "Did the creatures know where the peach would take them?",
    options: ["No — nobody knew where they would end up", "Yes, they were going to the zoo", "Yes, straight to London", "Yes, to Aunt Spiker's sister's house"],
    answer: 0,
    why: "It was a true adventure — none of them had any idea where the rolling peach would go!"
  },
  {
    ch: "Chapter 14",
    q: "What happened the moment the stem was cut and the peach was free?",
    options: ["It began to roll down the hill, slamming everyone against the walls", "It floated quietly into the sky", "It stayed perfectly still", "It sank into the ground"],
    answer: 0,
    why: "The peach broke loose and went rolling down the hill so fast that James and the creatures were thrown against the walls."
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = pct >= 80;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect! You're a James and the Giant Peach expert!"; emoji = '🏆'; }
  else if (pct >= 80) { stars = '⭐⭐⭐⭐'; msg = "Amazing reading! You really know these chapters."; emoji = '🍑'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — peek back at a few pages and try again."; emoji = '😊'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Nice try! You need 80% to pass. Let's re-read and try again."; emoji = '📖'; }
  else { stars = '⭐'; msg = "Let's read the chapters together and give it another go!"; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#ffd9d9;color:#c62828;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (12 of 15)</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
