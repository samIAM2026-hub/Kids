<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapters 6–7 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.45;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Reading Quiz · Chapters 6 &amp; 7 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Read the chapters, then show what you know! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 6 · Pap Returns", q:"Why does Pap keep going after Judge Thatcher in court?",
    options:["To get a job in town","To try to get Huck's money","To become a judge himself","To sell the cabin"], answer:1,
    why:"Pap kept suing Judge Thatcher to try to get his hands on Huck's money." },
  { ch:"Chapter 6 · Pap Returns", q:"How does Pap feel about Huck going to school?",
    options:["He is proud and encourages it","He is angry and wants him to stop","He doesn't care at all","He goes to school with him"], answer:1,
    why:"Pap was furious that Huck was learning, and ordered him to quit school." },
  { ch:"Chapter 6 · Pap Returns", q:"What does Huck do about school once Pap tells him to quit?",
    options:["He quits immediately","He keeps going, partly to spite Pap","He switches schools","He teaches Pap to read"], answer:1,
    why:"Huck kept attending — partly just to spite his father." },
  { ch:"Chapter 6 · The Cabin", q:"How does Pap finally take Huck away from the widow?",
    options:["He asks the widow politely","He kidnaps him and takes him across the river","He wins him in court","He pays the widow"], answer:1,
    why:"Pap grabbed Huck and carried him by skiff across the river to a hidden cabin." },
  { ch:"Chapter 6 · The Cabin", q:"Where does Pap keep Huck locked up?",
    options:["In the widow's attic","In a remote log cabin in the woods","On a steamboat","In the town jail"], answer:1,
    why:"Pap kept Huck locked inside an old log cabin deep in the woods." },
  { ch:"Chapter 6 · The Cabin", q:"How does Pap make sure Huck can't sneak out at night?",
    options:["He ties Huck's hands","He sleeps with the door key under his head","He hires a guard","He nails the windows shut"], answer:1,
    why:"Pap slept every night with the door key tucked under his head." },
  { ch:"Chapter 6 · The Cabin", q:"At first, how does Huck feel about life at the cabin?",
    options:["He hates every minute","He finds it lazy and rather pleasant","He is terrified constantly","He misses school badly"], answer:1,
    why:"At first Huck rather enjoyed the lazy, easy life — no school, no washing, no rules." },
  { ch:"Chapter 6 · The Cabin", q:"What makes cabin life turn bad for Huck over time?",
    options:["Pap's beatings get worse and he's locked up for days","The cabin floods","He runs out of books","The widow visits too often"], answer:0,
    why:"Pap's beatings grew worse, and he would lock Huck up alone for days at a time." },
  { ch:"Chapter 6 · Delirium", q:"What happens to Pap when he gets very drunk one night?",
    options:["He falls asleep peacefully","He has the delirium tremens and chases Huck with a knife","He sets the cabin on fire","He lets Huck go free"], answer:1,
    why:"In his drunken 'delirium tremens,' Pap raved about snakes and chased Huck with a knife." },
  { ch:"Chapter 6 · The Escape", q:"What tool does Huck find and start using to plan his escape?",
    options:["A rope","A rusty old saw","A ladder","A set of keys"], answer:1,
    why:"Huck found a rusty old saw and secretly began cutting through a bottom log of the cabin." },

  { ch:"Chapter 7 · The Canoe", q:"What does Huck find drifting on the rising river that helps his escape?",
    options:["A raft","A canoe","A rowboat","A steamboat"], answer:1,
    why:"On the rising river Huck spotted an empty canoe drifting by and grabbed it." },
  { ch:"Chapter 7 · The Canoe", q:"What does Huck do with the canoe at first?",
    options:["Sells it in town","Hides it from Pap","Gives it to a neighbor","Sinks it"], answer:1,
    why:"He hid the canoe so Pap wouldn't know he had it." },
  { ch:"Chapter 7 · The Escape", q:"How does Huck get out of the locked cabin?",
    options:["Through a hole he sawed in the wall","Pap unlocks the door","He picks the lock","He climbs down the chimney"], answer:0,
    why:"Huck slipped out through the hole he had secretly sawed in the cabin wall." },
  { ch:"Chapter 7 · Faking Death", q:"To fake his own death, what animal does Huck kill for its blood?",
    options:["A chicken","A wild pig","A deer","A fish"], answer:1,
    why:"Huck killed a wild pig and spread its blood to make it look like he'd been murdered." },
  { ch:"Chapter 7 · Faking Death", q:"What does Huck smash to make it look like robbers broke in?",
    options:["The window","The cabin door with an axe","The furniture","The canoe"], answer:1,
    why:"He hacked at the cabin door with an axe so it looked like a break-in." },
  { ch:"Chapter 7 · Faking Death", q:"How does Huck make it look like a body was dragged to the river?",
    options:["He drags a sack filled with rocks","He leaves footprints","He drags a log","He pours water on the ground"], answer:0,
    why:"He dragged a sack full of rocks to the river to leave a trail like a body being hauled off." },
  { ch:"Chapter 7 · Faking Death", q:"What does Huck pull out and stick on the bloody axe to fool searchers?",
    options:["Some of his own hair","Pieces of cloth","Feathers","Fish scales"], answer:0,
    why:"Huck pulled out some of his own hair and pressed it onto the bloody axe." },
  { ch:"Chapter 7 · The Getaway", q:"What does Huck load into the canoe before leaving?",
    options:["Only the gun","Food and supplies like meal, bacon, coffee, and ammunition","Just his clothes","Nothing at all"], answer:1,
    why:"He loaded the canoe with meal, bacon, coffee, sugar, ammunition, blankets and more." },
  { ch:"Chapter 7 · The Getaway", q:"During his escape on the river, what nearly happens with Pap?",
    options:["Pap catches him","Pap passes by in a skiff but doesn't notice him","Pap calls the police","Pap jumps in the canoe"], answer:1,
    why:"Pap floated right past in a skiff but never noticed Huck hiding in the canoe." },
  { ch:"Chapter 7 · Jackson's Island", q:"Where does Huck finally go to hide?",
    options:["Jackson's Island","The widow's house","A cave in town","Judge Thatcher's farm"], answer:0,
    why:"Huck paddled to Jackson's Island and hid his canoe in a deep bank." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Read the chapters, then show what you know! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know these chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
