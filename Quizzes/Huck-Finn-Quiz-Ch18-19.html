<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huckleberry Finn — Reading Quiz · Chapters 18–19</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --font:'Comic Sans MS','Trebuchet MS',system-ui,sans-serif;
    --bg:linear-gradient(160deg,#ffe29a 0%,#ffb37b 50%,#ff8a5c 100%);
    --ink:#4a2c0f;
    --header-bg:#ff7043; --header-shadow:#d84315; --header-radius:24px;
    --bar-bg:#fff3e0; --bar-shadow:#ffccbc; --track:#ffccbc; --fill:#43a047;
    --card-bg:#fff; --card-shadow:#e0a96d; --card-radius:20px; --meta:#ef6c00;
    --opt-bg:#fff8f0; --opt-border:#ffd2a8; --opt-hover:#ff9d57; --opt-radius:14px;
    --correct-bg:#d7f5d3; --correct-border:#43a047; --wrong-bg:#ffd9d9; --wrong-border:#e53935;
    --good-bg:#e8f7e6; --good-fg:#2e7d32; --bad-bg:#fdeaea; --bad-fg:#c62828;
    --btn:#43a047; --btn-shadow:#2e7d32; --next:#ff7043; --next-shadow:#d84315;
    --result-title:#ef6c00; --footer:#7a4a1f;
  }
  body.theme-river{
    --font:'Georgia','Times New Roman',serif;
    --bg:linear-gradient(160deg,#cfe8f0 0%,#a9d3c2 45%,#8bb98f 100%);
    --ink:#2c2418;
    --header-bg:#5b4636; --header-shadow:#3a2c20; --header-radius:18px;
    --bar-bg:#f5ecd9; --bar-shadow:#c9b890; --track:#d9c9a3; --fill:#3a7d44;
    --card-bg:#fffdf7; --card-shadow:#c9b890; --card-radius:16px; --meta:#8a6d3b;
    --opt-bg:#f7f1e3; --opt-border:#ddcaa3; --opt-hover:#b89968; --opt-radius:12px;
    --correct-bg:#d7f0d3; --correct-border:#3a7d44; --wrong-bg:#f6d6d6; --wrong-border:#c0392b;
    --good-bg:#e8f5e6; --good-fg:#2e6b34; --bad-bg:#fbeaea; --bad-fg:#a5352a;
    --btn:#3a7d44; --btn-shadow:#285a30; --next:#8a6d3b; --next-shadow:#5b4636;
    --result-title:#5b4636; --footer:#4c4030;
  }
  body { font-family:var(--font); background:var(--bg); min-height:100vh; color:var(--ink); padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  header { background:var(--header-bg); border-radius:var(--header-radius); padding:26px 24px; text-align:center; color:#fff; box-shadow:0 8px 0 var(--header-shadow); margin-bottom:18px; }
  header .ic { font-size:50px; line-height:1; }
  header h1 { font-size:25px; margin:8px 0 4px; }
  header p { font-size:16px; opacity:.95; }
  .bar { background:var(--bar-bg); border-radius:14px; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; margin-bottom:16px; box-shadow:0 4px 0 var(--bar-shadow); }
  .progress-track { flex:1; height:14px; background:var(--track); border-radius:10px; margin:0 14px; overflow:hidden; }
  .progress-fill { height:100%; width:0; background:var(--fill); border-radius:10px; transition:width .3s; }
  .card { background:var(--card-bg); border-radius:var(--card-radius); padding:22px; box-shadow:0 6px 0 var(--card-shadow); margin-bottom:16px; }
  .qmeta { font-size:13px; color:var(--meta); font-weight:bold; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:20px; margin:8px 0 16px; line-height:1.45; }
  .opt { display:block; width:100%; text-align:left; background:var(--opt-bg); border:3px solid var(--opt-border); border-radius:var(--opt-radius); padding:13px 16px; font-size:17px; font-family:inherit; color:var(--ink); margin-bottom:10px; cursor:pointer; transition:transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform:translateX(4px); border-color:var(--opt-hover); }
  .opt:disabled { cursor:default; }
  .opt.correct { background:var(--correct-bg); border-color:var(--correct-border); }
  .opt.wrong { background:var(--wrong-bg); border-color:var(--wrong-border); }
  .feedback { margin-top:6px; padding:12px 14px; border-radius:12px; font-size:15px; line-height:1.45; display:none; }
  .feedback.show { display:block; }
  .feedback.good { background:var(--good-bg); color:var(--good-fg); }
  .feedback.bad { background:var(--bad-bg); color:var(--bad-fg); }
  .btn { background:var(--btn); color:#fff; border:none; border-radius:14px; padding:14px 28px; font-size:18px; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 var(--btn-shadow); transition:transform .1s; }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 var(--btn-shadow); }
  .btn.next { background:var(--next); box-shadow:0 5px 0 var(--next-shadow); display:none; margin-top:6px; }
  .center { text-align:center; }
  .result { background:var(--card-bg); border-radius:var(--card-radius); padding:34px 24px; text-align:center; box-shadow:0 6px 0 var(--card-shadow); }
  .result .big { font-size:62px; }
  .result h2 { font-size:27px; margin:10px 0; color:var(--result-title); }
  .scoreline { font-size:22px; margin:14px 0; }
  .stars { font-size:33px; letter-spacing:4px; margin:10px 0; }
  .hidden { display:none; }
  footer { text-align:center; font-size:13px; color:var(--footer); margin-top:10px; opacity:.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ic" id="icon">🍑</div>
    <h1 id="title">Book Title</h1>
    <p id="subtitle">Reading Quiz · Chapter N</p>
  </header>
  <div class="bar">
    <span id="qcount">Question 1</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer"></footer>
</div>

<script>
/* ======================= EDIT THIS ======================= */
const CONFIG = {
  title:    "Adventures of Huckleberry Finn",
  subtitle: "Reading Quiz · Chapters 18–19",
  child:    "Warren",
  theme:    "river",
  icon:     "🛶🌊",
  passPct:  0.80
};

const questions = [
  // ---------- CHAPTER 18 ----------
  { ch:"Chapter 18 · The Grangerfords", q:"Where does Huck end up living at the start of the chapter?",
    options:["With the wealthy Grangerford family","Back in town with the Widow Douglas","On a steamboat bound down the river","Alone in a cave out on the island"],
    answer:0,
    why:"After the raft crash, Huck is taken in by the rich Grangerford family on their plantation." },

  { ch:"Chapter 18 · The Grangerfords", q:"How does Huck describe Colonel Grangerford?",
    options:["A dignified gentleman with fine manners","A loud, careless man who drinks hard","A poor farmer who is barely scraping by","A cruel and stingy old skinflint at heart"],
    answer:0,
    why:"Huck admires the Colonel as a calm, well-mannered gentleman — 'a gentleman all over.'" },

  { ch:"Chapter 18 · The Feud", q:"What is going on between the Grangerfords and the Shepherdsons?",
    options:["A long-running family feud with killings","A friendly rivalry over the best crops","A quarrel about who owns the river landing","A broken business deal between two farms"],
    answer:0,
    why:"The two families have been killing each other for about thirty years in a bitter feud." },

  { ch:"Chapter 18 · The Feud", q:"When Buck is asked how the feud started, what does he say?",
    options:["Nobody remembers what first started it","It began when some cattle were stolen","It started long ago over a broken engagement","It grew out of an old church quarrel"],
    answer:0,
    why:"Buck admits no one can remember the original cause — the killing just keeps going anyway." },

  { ch:"Chapter 18 · Think About It", q:"The men carry guns into a church sermon about brotherly love. What point is Twain most likely making?",
    options:["Their faith does not change their violent ways","The church is the safest place around town","The sermon inspires them to finally make peace","They bring guns to hunt right after the service"],
    answer:0,
    why:"Twain shows the families praising brotherly love while armed to kill — their religion doesn't soften them." },

  { ch:"Chapter 18 · The Note", q:"What does Sophia Grangerford ask Huck to do?",
    options:["Go back to church to fetch her Testament","Carry a spoken message straight to her father","Hide a love letter beneath her pillow","Saddle a fast horse for her escape"],
    answer:0,
    why:"Sophia sends Huck back to the church to bring the Testament she 'left' in the pew." },

  { ch:"Chapter 18 · The Note", q:"What is hidden inside the Testament?",
    options:["A small note that reads 'Half-past two'","A pressed flower sent by Harney himself","A folded map showing the river road","A few dollars tucked in folded bills"],
    answer:0,
    why:"Tucked in the book is a note saying 'Half-past two' — the secret time for Sophia's plan." },

  { ch:"Chapter 18 · The Note", q:"What does Sophia do because of that note?",
    options:["She runs off to marry Harney Shepherdson","She warns her father about a coming attack","She leaves home to join a distant convent","She sends Huck far away to keep him safe"],
    answer:0,
    why:"Sophia elopes with Harney Shepherdson — a member of the rival family — which sets off the disaster." },

  { ch:"Chapter 18 · The Shootout", q:"What happens to Buck in the chapter?",
    options:["He is killed during the family shootout","He escapes upriver to a safer town","He is only wounded and slowly recovers","He is sent off to live with distant cousins"],
    answer:0,
    why:"When the feud explodes after the elopement, Buck is shot and killed — which horrifies Huck." },

  { ch:"Chapter 18 · Think About It", q:"After the shootout Huck wishes he had never come ashore. What does this reveal about him?",
    options:["He is sickened by all the senseless killing","He is furious at Jim for leaving him behind","He feels proud of how brave he had been","He is eager to jump into the next fight"],
    answer:0,
    why:"Huck is so upset by the pointless deaths that he can hardly bear to talk about them." },

  // ---------- CHAPTER 19 ----------
  { ch:"Chapter 19 · Back on the River", q:"What is life on the raft like for Huck and Jim at the start of Chapter 19?",
    options:["Calm and peaceful as they drift downriver","Cold and hungry with very little food to eat","Crowded with many other river travelers","Full of constant arguments between them"],
    answer:0,
    why:"Huck describes lovely, lazy days floating free — some of the most peaceful moments in the book." },

  { ch:"Chapter 19 · Back on the River", q:"When do Huck and Jim travel, and when do they hide?",
    options:["They float at night and hide during the day","They float through the day and rest at night","They travel only when the storms grow bad","They move on whenever they please to go"],
    answer:0,
    why:"To keep Jim safe and stay unseen, they drift at night and hide the raft in daylight." },

  { ch:"Chapter 19 · Two Strangers", q:"How do the two strangers first come to be on the raft?",
    options:["They flee a mob and beg Huck for help","They buy passage from Jim for cash","They swim out planning to steal the raft","They claim to be old friends of Huck's pa"],
    answer:0,
    why:"Both men are running from an angry crowd and beg Huck to let them aboard to escape." },

  { ch:"Chapter 19 · Two Strangers", q:"What does the younger man claim to be?",
    options:["A duke robbed of his rightful title","A famous captain of a riverboat","A traveling doctor and skilled healer","A well-known preacher from the city"],
    answer:0,
    why:"The younger con man declares he is really a duke who has been cheated out of his title." },

  { ch:"Chapter 19 · Two Strangers", q:"What does the older man claim to be?",
    options:["The lost king, or dauphin, of France","A wealthy plantation owner down south","A proud retired army general","A traveling judge from back east"],
    answer:0,
    why:"Not to be outdone, the older man says he is the long-lost dauphin — the true king of France." },

  { ch:"Chapter 19 · Two Strangers", q:"How do Huck and Jim treat the two men after they make these claims?",
    options:["They wait on them and use their grand titles","They laugh out loud and refuse to believe them","They quickly toss both men off the raft","They ignore the two men almost completely"],
    answer:0,
    why:"To keep the peace, Huck and Jim serve the men and address them by their royal titles." },

  { ch:"Chapter 19 · Think About It", q:"Huck decides not to argue with the two men's claims. Why?",
    options:["He wants to keep the peace on the raft","He truly believes they are royalty","He is afraid Jim will tell on him","He hopes they will make him rich and famous"],
    answer:0,
    why:"Huck plays along because he has learned that avoiding a fight keeps life on the raft calm." },

  { ch:"Chapter 19 · Think About It", q:"What does Huck privately figure out about the two men?",
    options:["They are common frauds, not real nobles","They are dangerous escaped convicts","They are truly lost and wealthy travelers","They are lawmen traveling in disguise"],
    answer:0,
    why:"Huck quickly decides they are 'low-down humbugs and frauds' — just liars, not kings or dukes." },

  { ch:"Chapter 19 · Think About It", q:"What does Huck's choice to stay quiet show about how he handles people?",
    options:["He keeps the peace by avoiding needless fights","He speaks up right away whenever he spots a lie","He enjoys stirring up arguments for fun","He is quick to trust almost any stranger"],
    answer:0,
    why:"Huck's habit is to get along by not making trouble, even when he knows he's being fooled." },

  { ch:"Chapter 19 · The Raft Now", q:"By the end of the chapter, what is the situation on the raft?",
    options:["Huck and Jim must share it with two con men","Huck and Jim once again have the raft to themselves","The two men have robbed them and left","They have reached the free states at last"],
    answer:0,
    why:"The 'duke' and 'king' settle in, so Huck and Jim are now stuck sharing the raft with two frauds." }
];
/* ===================== END EDIT AREA ===================== */

document.body.className = 'theme-' + CONFIG.theme;
const MARK = CONFIG.theme === 'river' ? '✓' : '⭐';
document.getElementById('icon').textContent = CONFIG.icon;
document.getElementById('title').textContent = CONFIG.title;
document.getElementById('subtitle').textContent = CONFIG.subtitle;

questions.forEach(item => {
  const correct = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correct);
});

let current = 0, score = 0, answered = false;
const passNeeded = Math.ceil(questions.length * CONFIG.passPct);
const pctLabel = Math.round(CONFIG.passPct * 100);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For ${CONFIG.child} · Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `${MARK} ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  const opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `${MARK} ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() { current++; if (current < questions.length) render(); else showResult(); }

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars='⭐⭐⭐⭐⭐'; msg="Perfect score! You really know it."; emoji='🏆'; }
  else if (passed) { stars='⭐⭐⭐⭐'; msg="Excellent! You passed with room to spare."; emoji='🎖️'; }
  else if (pct >= 60) { stars='⭐⭐⭐'; msg=`So close! You need ${pctLabel}% to pass — review and try again.`; emoji='📖'; }
  else if (pct >= 40) { stars='⭐⭐'; msg=`Good effort! You need ${pctLabel}% to pass. Re-read and give it another go.`; emoji='📚'; }
  else { stars='⭐'; msg="Let's read it again carefully and try once more."; emoji='📗'; }
  const banner = passed
    ? `<div style="background:var(--correct-bg);color:var(--good-fg);border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:var(--bad-bg);color:var(--bad-fg);border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need ${pctLabel}%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:var(--footer);margin:-4px 0 8px;">Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
