<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 37–38 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 37–38 · Challenge Level</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read carefully and think hard! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 37 · On the Skyscraper", q:"Once the peach stuck on the building, what did the people below finally realize?",
    options:["That it was not really a bomb","That it was a new kind of plane","That it was a weather balloon","That it was a chunk of the moon"], answer:0,
    why:"After a few minutes, the crowd saw the object was not a bomb at all, and they came out to stare up at it." },
  { ch:"Chapter 37 · On the Skyscraper", q:"Some people guessed the strange thing on the building was a — ?",
    options:["Flying saucer full of aliens","A shiny statue made of solid gold","Runaway hot-air balloon","Nest of enormous birds"], answer:0,
    why:"A few people were sure it was a flying saucer carrying aliens — another wrong guess made out of fear." },
  { ch:"Chapter 37 · On the Skyscraper", q:"How did the police and firemen reach the top of the building?",
    options:["They rode the elevators up","They climbed the outside wall","They flew up in a plane","They used a rope ladder"], answer:0,
    why:"The armed police and firemen took the elevators up and gathered on the observation deck below the spike." },
  { ch:"Chapter 37 · On the Skyscraper", q:"Who was the first of the travelers to peek over the edge?",
    options:["The Centipede","The Earthworm","Miss Spider","The Ladybug"], answer:0,
    why:"When the Chief of Police shouted, the Centipede stuck his head over the edge and grinned at the crowd." },
  { ch:"Chapter 37 · On the Skyscraper", q:"What did the frightened men call the strange creatures they saw?",
    options:["Made-up beasts like a Snozzwanger","Ordinary bugs from a garden","Escaped animals from a travelling circus","Wind-up toys from a shop"], answer:0,
    why:"Instead of asking who they were, the men shouted silly made-up names like a Wampus, a Snozzwanger, or a Prock." },
  { ch:"Chapter 37 · On the Skyscraper", q:"How did the Centipede seem to feel about all the confusion?",
    options:["He was enjoying the fun","He was shaking with fear","He was falling asleep","He was bored and tired"], answer:0,
    why:"The Centipede grinned and enjoyed himself, which shows the reader how silly the grown-ups' panic really was." },
  { ch:"Chapter 37 · On the Skyscraper", q:"When Miss Spider politely asked for help getting down, how did the men react?",
    options:["They were still afraid of her","They cheered and clapped for her","They offered her some tea","They rushed forward to shake her hand"], answer:0,
    why:"Even after she asked kindly, the men were scared she had 'space guns' — they assumed the worst about a spider." },
  { ch:"Chapter 37 · On the Skyscraper", q:"What made the panic and shouting stop all at once?",
    options:["James appeared beside the bugs","The peach rolled away","A sudden, heavy rainstorm began to fall","The Mayor drove up"], answer:0,
    why:"The moment James, a boy, appeared next to his insect friends, the crowd's panic suddenly died down." },
  { ch:"Chapter 37 · On the Skyscraper", q:"As James introduced his friends, what did he tell the crowd about each one?",
    options:["That each one does something good","That they came to cause trouble","That they were made of candy","That they wanted to be left alone in peace"], answer:0,
    why:"James sang about each bug and the good it does — like the Earthworm helping farmers — to calm everyone's fears." },
  { ch:"Chapter 37 · Think About It", q:"The grown-ups guessed the bugs were monsters instead of asking who they were. What does the book want us to notice?",
    options:["It is silly to judge before understanding","Bugs are a danger to people","Firemen are braver than police","Some big cities can be frightening, busy places"], answer:0,
    why:"By making the adults look foolish, Dahl shows that guessing the worst about something new, before learning about it, is a silly mistake." },

  { ch:"Chapter 38 · The Parade", q:"After they came down safely, how were James and the bugs treated?",
    options:["Like heroes and special guests","Like dangerous prisoners","Like ordinary sightseers","Like lost, helpless little children"], answer:0,
    why:"Once James told his story, the shocked first responders treated him and the bugs like heroes." },
  { ch:"Chapter 38 · The Parade", q:"Who welcomed the newcomers to the city of New York?",
    options:["The Mayor of the city","The Chief of Police","A famous scientist","The peach's old farmer"], answer:0,
    why:"The Mayor himself welcomed James and the bugs to New York while the peach was lifted down." },
  { ch:"Chapter 38 · The Parade", q:"How did the workers lift the peach off the Empire State Building?",
    options:["With large cranes","With a giant net","With ropes and horses","With a helicopter"], answer:0,
    why:"Huge cranes were used to pull the giant peach off the skyscraper's spike." },
  { ch:"Chapter 38 · The Parade", q:"What did the Mayor plan to celebrate the peach's arrival?",
    options:["A grand parade","A quiet dinner","A school lesson","A long boat race"], answer:0,
    why:"The Mayor called for a huge parade to celebrate the amazing new arrivals." },
  { ch:"Chapter 38 · The Parade", q:"Where did James and the bugs ride during the parade?",
    options:["In an open limousine","On top of the peach","On a police horse","Inside the hollow peach"], answer:0,
    why:"James and the bugs rode in a big open limousine, with the peach following behind on a truck." },
  { ch:"Chapter 38 · The Parade", q:"What dripped into the street from the hole the spike had made?",
    options:["Sweet peach juice","Sticky brown glue","Cold grey rainwater","Thick golden honey"], answer:0,
    why:"Nobody minded the hole from the spike, even though sweet peach juice dripped out onto the street." },
  { ch:"Chapter 38 · The Parade", q:"What did a little girl in the crowd ask James for?",
    options:["A taste of the peach","A ride in the car","A photo with the bugs","A piece of the stone"], answer:0,
    why:"A little girl ran out and asked to taste the peach, and James happily said yes." },
  { ch:"Chapter 38 · The Parade", q:"What happened after James let the little girl taste the peach?",
    options:["Hundreds of children came to eat it","The girl kept it for herself","The parade came to a stop for a lunch break","The peach was locked away"], answer:0,
    why:"Hundreds of other children rushed over to eat the peach too, forming a line about a mile long." },
  { ch:"Chapter 38 · The Parade", q:"By the very end of the parade, what was left of the giant peach?",
    options:["Only the big peach stone","About half of the peach","A heap of peach skins","The whole peach, untouched"], answer:0,
    why:"The children ate the whole peach, so that by the end only the big stone (the pit) was left." },
  { ch:"Chapter 38 · Think About It", q:"Why did watching the children eat the peach feel like the best thing James had ever seen?",
    options:["He had been lonely and now felt happy","He wanted the peach gone quickly","He was still hungry for peach","He was hoping to sell the peach for money"], answer:0,
    why:"James had spent years lonely and unloved, so being surrounded by happy children felt wonderful to him." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read carefully and think hard! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly mastered these tricky chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed a harder quiz with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
