<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapter 39 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif; background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%); min-height: 100vh; color: #4a2c0f; padding: 20px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { background: #ff7043; border-radius: 24px; padding: 26px 24px; text-align: center; color: #fff; box-shadow: 0 8px 0 #d84315; margin-bottom: 18px; }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar { background: #fff3e0; border-radius: 16px; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 16px; box-shadow: 0 4px 0 #ffccbc; }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card { background: #fff; border-radius: 20px; padding: 22px; box-shadow: 0 6px 0 #e0a96d; margin-bottom: 16px; }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt { display: block; width: 100%; text-align: left; background: #fff8f0; border: 3px solid #ffd2a8; border-radius: 14px; padding: 13px 16px; font-size: 17px; font-family: inherit; color: #4a2c0f; margin-bottom: 10px; cursor: pointer; transition: transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback { margin-top: 6px; padding: 12px 14px; border-radius: 12px; font-size: 15px; line-height: 1.4; display: none; }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn { background: #43a047; color: #fff; border: none; border-radius: 14px; padding: 14px 28px; font-size: 18px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #2e7d32; transition: transform .1s; }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result { background: #fff; border-radius: 24px; padding: 34px 24px; text-align: center; box-shadow: 0 6px 0 #e0a96d; }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapter 39 · The Happy Ending · Challenge Level</p>
  </header>
  <div class="bar">
    <span id="qcount">Question 1 of 10</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer">For Grace · Read carefully and think hard! Passing score: 80%</footer>
</div>
<script>
const questions = [
  { ch:"Chapter 39 · New Jobs", q:"What important job did the Centipede get in America?",
    options:["Vice president of a boot company","A cook in a fancy downtown restaurant","A driver of a yellow taxi","A guard at the museum"], answer:0,
    why:"The boot-loving Centipede became vice president of a boot company — the perfect job for someone with so many feet!" },
  { ch:"Chapter 39 · New Jobs", q:"The Earthworm got a job helping a company that makes what?",
    options:["Face creams for ladies","Bread for the bakeries","Paint for the houses","Toys for the children"], answer:0,
    why:"The Earthworm worked for a face-cream company and even appeared in the adverts, showing off his lovely smooth pink skin." },
  { ch:"Chapter 39 · New Jobs", q:"The Silkworm and Miss Spider learned to spin nylon thread to make ropes for whom?",
    options:["Tightrope walkers","Sailors at sea","Cowboys out west","Deep-sea fishermen"], answer:0,
    why:"The two spinners made strong nylon ropes for tightrope walkers, using the very skill they were born with." },
  { ch:"Chapter 39 · New Jobs", q:"Where did the Glow-worm go to work, lighting the way?",
    options:["The Statue of Liberty's torch","A tall city street lamp","A lighthouse on the rocky sea coast","A big cinema screen"], answer:0,
    why:"The Glow-worm became the light inside the Statue of Liberty's torch, saving the city a giant electricity bill." },
  { ch:"Chapter 39 · New Jobs", q:"With his beautiful violin, the Old-Green-Grasshopper joined what?",
    options:["The New York Symphony Orchestra","A famous rock-and-roll band on tour","A marching band for parades","A jazz group in a club"], answer:0,
    why:"The Old-Green-Grasshopper, whose body works like a violin, joined the New York Symphony Orchestra." },
  { ch:"Chapter 39 · New Jobs", q:"The Ladybug got married to the head of what?",
    options:["The fire department","A big shipping line","The city zoo","A candy factory"], answer:0,
    why:"The Ladybug married the head of the fire department — which makes clever sense given her biggest worry." },
  { ch:"Chapter 39 · Think About It", q:"Why does it make good sense that the Ladybug married the fire chief?",
    options:["She had long been afraid of fires","She wanted to drive the fire trucks","She hoped to fight fires herself","She liked the bright red trucks"], answer:0,
    why:"The Ladybug had spent her life fearing a fire would destroy her home, so marrying the fire chief means she never has to worry again." },
  { ch:"Chapter 39 · A New Home", q:"Where in the city was the giant peach stone placed?",
    options:["In Central Park","In Times Square","At the busy harbour","On a tall rooftop"], answer:0,
    why:"The city set the peach stone up in Central Park, where it became both a famous monument and a home." },
  { ch:"Chapter 39 · A New Home", q:"Who came to visit James every week and became his very best friends?",
    options:["The city's children","Famous movie stars","Rich business owners","Busy news reporters"], answer:0,
    why:"Children visited the peach stone every week and became James's best friends, making him the happiest boy in the world." },
  { ch:"Chapter 39 · The Big Surprise", q:"How did James make sure everyone could know his whole adventure?",
    options:["He wrote it down in a book","He drew it as a comic strip","He told it on the radio","He kept the story hidden"], answer:0,
    why:"Because his friends begged to hear it again and again, James wrote the story into a book — the very book you just read!" }
];

questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read carefully and think hard! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  let opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) render(); else showResult();
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You finished the whole book like a champion."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed the final quiz with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapter and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read this chapter again carefully and try once more."; emoji = '🐛'; }
  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
