<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlie and the Chocolate Factory — Chapters 1–4 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'Comic Sans MS','Trebuchet MS',system-ui,sans-serif; background:linear-gradient(160deg,#e8d3b5 0%,#d7b98f 50%,#c69c6d 100%); min-height:100vh; color:#3a241d; padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  header { background:#4e342e; border-radius:24px; padding:26px 24px; text-align:center; color:#fff4e6; box-shadow:0 8px 0 #2e1a14; margin-bottom:18px; }
  header .ic { font-size:50px; line-height:1; }
  header h1 { font-size:24px; margin:8px 0 4px; }
  header p { font-size:15px; opacity:.95; }
  .bar { background:#fff3e0; border-radius:16px; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; margin-bottom:16px; box-shadow:0 4px 0 #e0c39a; }
  .progress-track { flex:1; height:14px; background:#e0c39a; border-radius:10px; margin:0 14px; overflow:hidden; }
  .progress-fill { height:100%; width:0; background:#6d4c33; border-radius:10px; transition:width .3s; }
  .card { background:#fffaf2; border-radius:20px; padding:22px; box-shadow:0 6px 0 #d3b184; margin-bottom:16px; }
  .qmeta { font-size:13px; color:#8a5a2b; font-weight:bold; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:20px; margin:8px 0 16px; line-height:1.45; }
  .opt { display:block; width:100%; text-align:left; background:#fff7ec; border:3px solid #e3c9a3; border-radius:14px; padding:13px 16px; font-size:17px; font-family:inherit; color:#3a241d; margin-bottom:10px; cursor:pointer; transition:transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform:translateX(4px); border-color:#b98a4e; }
  .opt:disabled { cursor:default; }
  .opt.correct { background:#d7f0d3; border-color:#3a7d44; }
  .opt.wrong { background:#f6d6d6; border-color:#c0392b; }
  .feedback { margin-top:6px; padding:12px 14px; border-radius:12px; font-size:15px; line-height:1.45; display:none; }
  .feedback.show { display:block; }
  .feedback.good { background:#e8f5e6; color:#2e6b34; }
  .feedback.bad { background:#fbeaea; color:#a5352a; }
  .btn { background:#6d4c33; color:#fff; border:none; border-radius:14px; padding:14px 28px; font-size:18px; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 #4e342e; transition:transform .1s; }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #4e342e; }
  .btn.next { background:#b07d3c; box-shadow:0 5px 0 #7a5424; display:none; margin-top:6px; }
  .center { text-align:center; }
  .result { background:#fffaf2; border-radius:24px; padding:34px 24px; text-align:center; box-shadow:0 6px 0 #d3b184; }
  .result .big { font-size:62px; }
  .result h2 { font-size:27px; margin:10px 0; color:#4e342e; }
  .scoreline { font-size:22px; margin:14px 0; }
  .stars { font-size:33px; letter-spacing:4px; margin:10px 0; }
  .hidden { display:none; }
  footer { text-align:center; font-size:13px; color:#5b3a24; margin-top:10px; opacity:.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ic">🍫</div>
    <h1>Charlie and the Chocolate Factory</h1>
    <p>Reading Quiz · Chapters 1–4 · by Roald Dahl</p>
  </header>
  <div class="bar">
    <span id="qcount">Question 1 of 40</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">🍫 0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer">For Grace · Read carefully! Passing score: 80%</footer>
</div>
<script>
const PASS_PCT = 0.80;
const questions = [
  // ---------- Chapter 1 · Here Comes Charlie ----------
  { ch:"Chapter 1 · Here Comes Charlie", q:"Who is the young hero of the story?",
    options:["Charlie Bucket","Grandpa Joe","Prince Pondicherry","Willy Wonka"], answer:0,
    why:"The story's hero is a kind, poor boy named Charlie Bucket." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"How many grandparents live with Charlie, all sharing one bed?",
    options:["Four of them","Two of them","Six of them","Three of them"], answer:0,
    why:"All four grandparents are so old that they stay in one bed together all day." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"Where does Charlie's father, Mr. Bucket, work?",
    options:["A toothpaste factory","A big chocolate factory","A corner bakery","A deep coal mine"], answer:0,
    why:"Mr. Bucket screws caps onto tubes of toothpaste, earning very little money." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"Why is the Bucket family often hungry?",
    options:["They are very poor","They are on a diet","The shops are shut","They hate cooking"], answer:0,
    why:"The family is very poor, so there is rarely enough food to go round." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"What plain food does the family eat over and over because it is cheap?",
    options:["Cabbage soup","Roast chicken","Sponge cake","Grilled fish"], answer:0,
    why:"They live mostly on bread and thin cabbage soup, which costs very little." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"How often does Charlie get to eat a bar of chocolate?",
    options:["Once a year","Once a week","Twice a day","On Sundays"], answer:0,
    why:"Chocolate is a rare treat — Charlie gets a single bar a year, on his birthday." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"What enormous building does Charlie pass on his way to school?",
    options:["The chocolate factory","A brand-new toy shop","The busy train station","A small corner bakery"], answer:0,
    why:"Charlie walks past Mr. Wonka's famous chocolate factory every day." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"What makes walking past the factory such torture for Charlie?",
    options:["The lovely smell","The loud machines","The strict guards","The locked gates"], answer:0,
    why:"The rich smell of melting chocolate drifts out and makes hungry Charlie long for a taste." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"Which two grandparents are Charlie's father's parents?",
    options:["Joe and Josephine","George and Georgina","Joe and Georgina","George and Josephine"], answer:0,
    why:"Grandpa Joe and Grandma Josephine are Mr. Bucket's parents; George and Georgina are Mrs. Bucket's." },
  { ch:"Chapter 1 · Here Comes Charlie", q:"Roughly how old are all four of the grandparents?",
    options:["Over ninety","About fifty","Near seventy","A bit past sixty"], answer:0,
    why:"Every one of the grandparents is over ninety, far too old to leave their bed." },

  // ---------- Chapter 2 · Mr Willy Wonka's Factory ----------
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"Which grandparent loves telling Charlie stories about the factory?",
    options:["Old Grandpa Joe","Grandpa George","Grandma Josephine","Grandma Georgina"], answer:0,
    why:"Grandpa Joe is the liveliest grandparent, and he adores telling Charlie about Mr. Wonka." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"Willy Wonka is the most amazing maker of what in the whole world?",
    options:["Chocolate and sweets","Clocks and fine watches","Toys and games","Shoes and boots"], answer:0,
    why:"Grandpa Joe says Willy Wonka is the cleverest maker of chocolate and sweets ever known." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"How does Grandpa Joe say Wonka's factory compares with the others?",
    options:["The biggest anywhere","Small but rather tidy","Old, dusty and dark","Newly built this year"], answer:0,
    why:"Grandpa Joe calls it the biggest and most famous chocolate factory anywhere on earth." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"Wonka invented an ice cream with a strange power. What can it do?",
    options:["Cold in hot sun","Glows in the dark","Floats in the air","Changes its colour"], answer:0,
    why:"One of Wonka's wonders is ice cream that stays cold for hours in the blazing sun." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"What is special about Willy Wonka's chewing gum?",
    options:["Keeps its flavour","Turns to a balloon","Squeaks when chewed","Eaten at breakfast"], answer:0,
    why:"Wonka's chewing gum keeps its lovely flavour for hours and hours, long after other gum fades." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"Wonka makes marshmallows that taste of what?",
    options:["Violet flowers","Sour lemons","Crispy bacon","Fresh green mint"], answer:0,
    why:"Among his inventions are soft marshmallows that taste of violets — sweet-smelling flowers." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"Who does Grandpa Joe say eats Wonka's famous chocolate bars?",
    options:["Kings and presidents","Children in the town","The tired factory workers","Few folk these days"], answer:0,
    why:"Grandpa Joe says even kings and presidents around the world enjoy Wonka's chocolate." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"How does Charlie feel while listening to Grandpa Joe's stories?",
    options:["Full of wonder","Rather sleepy","Rather scared","Rather grumpy"], answer:0,
    why:"Charlie is spellbound — the tales of Wonka fill him with wonder and delight." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"About how many kinds of chocolate bar has Wonka invented?",
    options:["Over two hundred","About ten of them","Around fifty kinds","A dozen or so"], answer:0,
    why:"Grandpa Joe boasts that Wonka has invented more than two hundred kinds of chocolate bar." },
  { ch:"Chapter 2 · Mr Willy Wonka's Factory", q:"When does Charlie usually hear these wonderful stories?",
    options:["In the evening","In the morning","During lessons","On the way home"], answer:0,
    why:"Each evening, Charlie sits by the grandparents' bed and listens before going to sleep." },

  // ---------- Chapter 3 · Mr Wonka and the Indian Prince ----------
  { ch:"Chapter 3 · The Indian Prince", q:"Who asked Willy Wonka to build him a very special palace?",
    options:["Prince Pondicherry","A rich sea captain","The town mayor","Grandpa's cousin"], answer:0,
    why:"An Indian prince named Pondicherry begged Mr. Wonka to build him an amazing palace." },
  { ch:"Chapter 3 · The Indian Prince", q:"What did the prince want his whole palace made of?",
    options:["Chocolate","Bright gold","Hard ice","Clear glass"], answer:0,
    why:"The prince wanted an enormous palace made entirely of chocolate." },
  { ch:"Chapter 3 · The Indian Prince", q:"Which parts of the palace did Wonka make out of chocolate?",
    options:["Walls and furniture","The heavy front door","A few roof tiles","The low garden wall"], answer:0,
    why:"Wonka made the whole thing from chocolate — walls, furniture, and even the beds." },
  { ch:"Chapter 3 · The Indian Prince", q:"What flowed from the palace taps instead of water?",
    options:["Hot chocolate","Cool lemonade","Clean spring water","Melted gold"], answer:0,
    why:"Even the taps ran with hot chocolate, ready to drink." },
  { ch:"Chapter 3 · The Indian Prince", q:"What warning did Wonka give the prince about the palace?",
    options:["Eat it quickly","Watch for mice","Lock the doors","Paint it weekly"], answer:0,
    why:"Wonka warned that the palace would melt, and told the prince to eat it before the hot sun ruined it." },
  { ch:"Chapter 3 · The Indian Prince", q:"Did the prince follow Wonka's sensible advice?",
    options:["No, he moved in","Yes, he ate it","Yes, he sold it","No, he gave it away"], answer:0,
    why:"The prince ignored the warning and decided to live inside his beautiful chocolate palace." },
  { ch:"Chapter 3 · The Indian Prince", q:"What finally happened to the chocolate palace?",
    options:["The sun melted it","Robbers stole it away","A storm hit it","It lasted for years"], answer:0,
    why:"Just as Wonka predicted, the blazing sun melted the whole palace into a sticky mess." },
  { ch:"Chapter 3 · The Indian Prince", q:"Where did the prince wake up when the palace melted?",
    options:["In a chocolate pool","Inside a fine new house","Up in a tall tree","Far out at sea"], answer:0,
    why:"The prince woke to find himself lying in a warm, sticky lake of melted chocolate." },
  { ch:"Chapter 3 · The Indian Prince", q:"Who is telling Charlie the story of the prince?",
    options:["Grandpa Joe","His mother","Mr Wonka","His teacher"], answer:0,
    why:"It is Grandpa Joe, sitting up in bed, who tells Charlie all about Prince Pondicherry." },
  { ch:"Chapter 3 · The Indian Prince", q:"What does this story show about Willy Wonka?",
    options:["A true chocolate genius","He is unkind to children","He is a grumpy man","He hates the hot sun"], answer:0,
    why:"Building a whole palace shows that Wonka can create almost anything out of chocolate." },

  // ---------- Chapter 4 · The Secret Workers ----------
  { ch:"Chapter 4 · The Secret Workers", q:"Why did Willy Wonka have to close his factory for a while?",
    options:["Spies stole his recipes","He ran out of cocoa","The factory caught fire","He fancied a holiday"], answer:0,
    why:"Spies sneaked in and stole Wonka's secret recipes, so he was forced to shut the factory." },
  { ch:"Chapter 4 · The Secret Workers", q:"Who sent the spies into Wonka's factory?",
    options:["Rival sweet makers","The town police force","Hungry schoolchildren","Nosy news reporters"], answer:0,
    why:"Jealous rival chocolate makers sent spies disguised as workers to learn Wonka's secrets." },
  { ch:"Chapter 4 · The Secret Workers", q:"Which of these is one of Wonka's rival chocolate makers?",
    options:["Mr Fickelgruber","Mr Bucket","Prince Pondicherry","Grandpa Joe"], answer:0,
    why:"Fickelgruber, Prodnose, and Slugworth are the greedy rivals who copied Wonka's ideas." },
  { ch:"Chapter 4 · The Secret Workers", q:"What did Wonka do with his workers after he found the spies?",
    options:["Sent them home at once","Gave them a raise","Moved them upstairs","Told them to hurry up"], answer:0,
    why:"To keep his secrets safe, Wonka sent every worker away and locked the great iron gates." },
  { ch:"Chapter 4 · The Secret Workers", q:"After the factory was silent for a long time, what surprising thing happened?",
    options:["It started up again","It was knocked down","It was sold off","It became a museum"], answer:0,
    why:"To everyone's shock, the deserted factory roared back to life all on its own." },
  { ch:"Chapter 4 · The Secret Workers", q:"What could people see once the factory started up again?",
    options:["Smoke and smells","Floods of water","Bright flashing lights","Crowds of tourists"], answer:0,
    why:"Smoke poured from the chimneys and wonderful chocolate smells drifted over the town again." },
  { ch:"Chapter 4 · The Secret Workers", q:"What was so strange about the workers after the factory reopened?",
    options:["No one came or went","They marched in daily","They waved from the roof","They lived in town"], answer:0,
    why:"The gates stayed locked — yet somehow the factory was busy, with nobody coming or going." },
  { ch:"Chapter 4 · The Secret Workers", q:"What did people glimpse moving behind the factory windows?",
    options:["Tiny shadowy figures","Huge roaring machines","Ordinary workers","Flocks of birds"], answer:0,
    why:"Now and then, tiny dark shadows could be seen darting about behind the windows." },
  { ch:"Chapter 4 · The Secret Workers", q:"Does anyone in the town know who works in the factory now?",
    options:["No, it's a mystery","Yes, Wonka's cousins","Yes, local men","Yes, the old workers"], answer:0,
    why:"It is one of the story's great mysteries — nobody has any idea who the tiny workers are." },
  { ch:"Chapter 4 · The Secret Workers", q:"How does the mystery of the workers make Charlie feel?",
    options:["Curious and keen","Frightened and sad","Bored and tired","Cross with Wonka"], answer:0,
    why:"The mystery only makes Charlie more curious and eager to learn about the wonderful factory." }
];

questions.forEach(item => {
  const correct = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correct);
});

let current = 0, score = 0, answered = false;
const passNeeded = Math.ceil(questions.length * PASS_PCT);
const pctLabel = Math.round(PASS_PCT * 100);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent = `For Grace · Read carefully! Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `🍫 ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  const opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `🍫 ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() { current++; if (current < questions.length) render(); else showResult(); }

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars='⭐⭐⭐⭐⭐'; msg="Perfect score! A golden-ticket performance!"; emoji='🏆'; }
  else if (passed) { stars='⭐⭐⭐⭐'; msg="Excellent reading! You passed with room to spare."; emoji='🎖️'; }
  else if (pct >= 60) { stars='⭐⭐⭐'; msg=`So close! You need ${pctLabel}% to pass — review a few pages and try again.`; emoji='🍫'; }
  else if (pct >= 40) { stars='⭐⭐'; msg=`Good effort! You need ${pctLabel}% to pass. Re-read the chapters and go again.`; emoji='📚'; }
  else { stars='⭐'; msg="Let's read these chapters again carefully and try once more."; emoji='📗'; }
  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need ${pctLabel}%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#5b3a24;margin:-4px 0 8px;">Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
