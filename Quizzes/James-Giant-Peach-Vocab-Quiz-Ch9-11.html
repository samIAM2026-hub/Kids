<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 9–11 Vocabulary Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 50px; line-height: 1; }
  header h1 { font-size: 24px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .word { font-size: 28px; font-weight: bold; color: #d84315; margin: 6px 0 2px; }
  .context { font-size: 16px; font-style: italic; color: #8a5a2a; margin-bottom: 14px; line-height: 1.45; }
  .ask { font-size: 17px; margin-bottom: 14px; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.45;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑📖</div>
    <h1>James and the Giant Peach</h1>
    <p>Vocabulary Quiz · Chapters 9–11</p>
  </header>

  <div class="bar">
    <span id="qcount">Word 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer>For Grace · Words from Chapters 9–11. Passing score: 80% (12 of 15) 🐛🕷️🐞</footer>
</div>

<script>
const questions = [
  {
    word: "murky",
    context: "Example: The tunnel inside the peach was dark and murky, so James could barely see ahead.",
    ask: "What does <strong>murky</strong> mean?",
    options: ["Dark, dim, and hard to see through", "Bright and sunny", "Warm and cozy", "Loud and noisy"],
    answer: 0,
    why: "Murky means gloomy and hard to see through — perfect for the dim tunnel inside the peach."
  },
  {
    word: "scramble",
    context: "Example: James had to scramble on his hands and knees to get through the narrow tunnel.",
    ask: "To <strong>scramble</strong> means to…",
    options: ["Move or climb quickly using your hands and feet", "Sit very still", "Float gently", "Shout loudly"],
    answer: 0,
    why: "To scramble is to clamber along quickly, using hands and feet — like James crawling through the peach."
  },
  {
    word: "famished",
    context: "Example: The giant creatures said they were famished and longed for something to eat.",
    ask: "Someone who is <strong>famished</strong> is…",
    options: ["Extremely hungry", "A little sleepy", "Very happy", "Slightly bored"],
    answer: 0,
    why: "Famished means very, very hungry. At first this made James nervous they might eat him!"
  },
  {
    word: "colossal",
    context: "Example: The peach had grown into a colossal ball, far bigger than the house.",
    ask: "<strong>Colossal</strong> means…",
    options: ["Enormous — extremely large", "Tiny and delicate", "Smooth and shiny", "Round and red"],
    answer: 0,
    why: "Colossal means gigantic. The peach and the creatures inside were all colossal in size."
  },
  {
    word: "intently",
    context: "Example: The creatures stared intently at James as he stepped into the room.",
    ask: "To look at something <strong>intently</strong> is to look…",
    options: ["With careful, focused attention", "Quickly and carelessly", "Sleepily, half-asleep", "From far away"],
    answer: 0,
    why: "Intently means with great focus and concentration. The bugs watched James very closely."
  },
  {
    word: "gossamer",
    context: "Example: The Spider spun threads as fine and light as gossamer.",
    ask: "<strong>Gossamer</strong> describes something that is…",
    options: ["Extremely light, thin, and delicate", "Heavy and solid", "Sharp and dangerous", "Cold and wet"],
    answer: 0,
    why: "Gossamer means very fine and delicate, like a spider's silky web threads."
  },
  {
    word: "repulsive",
    context: "Example: At first the huge bugs looked repulsive to James, and he wanted to back away.",
    ask: "Something <strong>repulsive</strong> is…",
    options: ["Disgusting — it makes you want to pull away", "Beautiful and lovely", "Funny and silly", "Quiet and calm"],
    answer: 0,
    why: "Repulsive means so unpleasant it pushes you away. The giant insects seemed repulsive at first sight."
  },
  {
    word: "venomous",
    context: "Example: James worried the Centipede might be venomous and give a poisonous bite.",
    ask: "<strong>Venomous</strong> means…",
    options: ["Full of poison (venom)", "Soft and gentle", "Brightly colored", "Fast-moving"],
    answer: 0,
    why: "Venomous means containing venom, or poison. It can also describe spiteful, nasty words."
  },
  {
    word: "insidious",
    context: "Example: A slow, insidious worry crept into James's mind as the creatures whispered.",
    ask: "Something <strong>insidious</strong> is…",
    options: ["Harmful in a slow, sneaky, hidden way", "Loud and obvious", "Kind and helpful", "Bright and cheerful"],
    answer: 0,
    why: "Insidious means sneaky and harmful — trouble that creeps up quietly without being noticed at first."
  },
  {
    word: "gape",
    context: "Example: James could only gape at the enormous insects, his mouth hanging open in shock.",
    ask: "To <strong>gape</strong> means to…",
    options: ["Stare with your mouth wide open in surprise", "Whisper a secret", "Run away fast", "Laugh out loud"],
    answer: 0,
    why: "To gape is to stare open-mouthed, usually in amazement — exactly how James reacted."
  },
  {
    word: "scornful",
    context: "Example: The Centipede gave a scornful laugh, as if James's fears were foolish.",
    ask: "A <strong>scornful</strong> look or laugh shows…",
    options: ["Contempt — that you think someone or something is beneath you", "Deep love and care", "Total confusion", "Great fear"],
    answer: 0,
    why: "Scornful means full of scorn — looking down on someone as silly or worthless."
  },
  {
    word: "prim",
    context: "Example: The Ladybug spoke in a prim, proper voice, very neat and polite.",
    ask: "Someone who is <strong>prim</strong> is…",
    options: ["Stiffly formal, neat, and proper", "Wild and messy", "Mean and rude", "Lazy and sleepy"],
    answer: 0,
    why: "Prim means very proper and precise in manner — like the well-mannered Ladybug."
  },
  {
    word: "dread",
    context: "Example: A cold feeling of dread filled James as the dark shapes moved toward him.",
    ask: "<strong>Dread</strong> is a feeling of…",
    options: ["Great fear about something that may happen", "Warm happiness", "Mild curiosity", "Sleepy boredom"],
    answer: 0,
    why: "Dread is strong fear or worry about something ahead — James felt it before the creatures spoke kindly."
  },
  {
    word: "tremor",
    context: "Example: A tremor of fear ran through James as he heard the creatures stir.",
    ask: "A <strong>tremor</strong> is…",
    options: ["A shaking or trembling movement", "A loud shout", "A bright light", "A sweet smell"],
    answer: 0,
    why: "A tremor is a shiver or shaking — like the trembling James felt when he was scared."
  },
  {
    word: "crafty",
    context: "Example: Aunt Sponge and Aunt Spiker were crafty about charging money to see the peach.",
    ask: "A <strong>crafty</strong> person is…",
    options: ["Clever in a sneaky, scheming way", "Honest and open", "Kind and generous", "Shy and quiet"],
    answer: 0,
    why: "Crafty means cunning or sly — using clever tricks, the way the greedy aunts did."
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Word ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">Chapters 9–11 Vocabulary</div>
      <div class="word">${item.word}</div>
      <div class="context">${item.context}</div>
      <div class="ask">${item.ask}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = pct >= 80;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect! Your Chapters 9–11 word power is amazing!"; emoji = '🏆'; }
  else if (pct >= 80) { stars = '⭐⭐⭐⭐'; msg = "Wonderful vocabulary! You passed with room to spare."; emoji = '🍑'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review the words and try again."; emoji = '😊'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good try! You need 80% to pass. Study the words and give it another go."; emoji = '📖'; }
  else { stars = '⭐'; msg = "Let's go over these words together and try once more!"; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#ffd9d9;color:#c62828;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (12 of 15)</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
