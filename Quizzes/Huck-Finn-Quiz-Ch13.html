<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 13 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Chapter 13 · Fill-in-the-Blank &amp; Comprehension · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 10</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80%</footer>
</div>

<script>
const questions = [
  // ---------- PART 1: FILL IN THE BLANK ----------
  { ch:"Part 1 · Fill in the Blank",
    q:"Huck and Jim were desperate to find the ______ that the robbers had used to reach the wrecked steamboat, so they could escape.",
    options:["raft","skiff","barge","canoe"],
    answer:1,
    why:"They needed the robbers' little skiff to get off the sinking wreck. They found it, jumped in, and cut it loose." },

  { ch:"Part 1 · Fill in the Blank",
    q:"Thinking about the trapped criminals, Huck imagined that he himself might one day become a ______, and wondered how he would feel in their place.",
    options:["sailor","preacher","murderer","farmer"],
    answer:2,
    why:"Huck put himself in the robbers' shoes — 'how would I like it?' — imagining he might be a murderer someday. That's his deep sense of empathy." },

  { ch:"Part 1 · Fill in the Blank",
    q:"To get help for the men on the wreck, Huck ______ to the watchman, making up a story about his family being in danger.",
    options:["waved","lied","prayed","sang"],
    answer:1,
    why:"Huck invented a tale about 'pap, mam, sis, and Miss Hooker' being stranded — a lie told for a good reason, to get the men rescued." },

  { ch:"Part 1 · Fill in the Blank",
    q:"The watchman refused to go at first, and only set out after Huck promised that he would be ______ for the rescue.",
    options:["thanked","pardoned","praised","paid"],
    answer:3,
    why:"Money did the trick — the watchman went only once Huck made him believe he'd be paid for saving the people on the wreck." },

  { ch:"Part 1 · Fill in the Blank",
    q:"When Huck finally met up with Jim again on an island, the two were so worn out that they 'turned in and ______ like dead people.'",
    options:["slept","argued","fished","cried"],
    answer:0,
    why:"After a long, scary night, they were exhausted and 'slept like dead people' — Twain's vivid way of showing how drained they were." },

  // ---------- PART 2: COMPREHENSION ----------
  { ch:"Part 2 · Comprehension",
    q:"Why does Huck feel sorry for the robber-murderers stranded on the sinking wreck, even though they are dangerous criminals?",
    options:[
      "He is secretly hoping that they will let him join their robber gang",
      "He imagines being trapped like them and pities anyone in danger",
      "He is hoping to be given a share of all the money that they stole",
      "He is much too frightened of the storm to think about them at all"],
    answer:1,
    why:"Huck pictures himself in their place and can't help feeling for them. His kindness reaches even to 'bad' people — that's what makes him unusual." },

  { ch:"Part 2 · Comprehension",
    q:"What does Huck's wish to rescue the criminals show about his sense of right and wrong, compared to strict people like Miss Watson?",
    options:[
      "He always obeys the town's strict rules about crime and punishment",
      "He believes dangerous criminals should never ever be given any help at all",
      "His morals come from his own empathy, not society's harsh rules",
      "He truly cares about no one else in the whole world except himself"],
    answer:2,
    why:"While 'respectable' people would only condemn the robbers, Huck judges with his heart. His right-and-wrong is based on empathy, not on what society tells him." },

  { ch:"Part 2 · Comprehension",
    q:"The narrator notes it was 'bad luck' a robber nearly spotted Huck, but 'good luck' that he didn't. What idea about superstition does this hint at?",
    options:[
      "Luck goes both ways, so only fearing 'bad luck' signs is silly",
      "Superstitions in this book always turn out to be completely and totally true",
      "The three robbers on the wreck secretly had real magical lucky powers",
      "Luck has no effect at all on anything that happens in the whole story"],
    answer:0,
    why:"Good and bad luck keep trading places all through the book. That quietly pokes fun at Huck and Jim's habit of blaming everything on 'bad luck' signs." },

  { ch:"Part 2 · Comprehension",
    q:"Why does Huck tell the watchman that his 'pap, mam, and sis' are on the wreck instead of just saying robbers are stuck there?",
    options:[
      "What he told the watchman happened to be the honest, complete truth",
      "He had truly forgotten who it really was that was stuck on the wreck",
      "He was honestly trying to frighten the poor watchman into leaving town",
      "A sad story about his family will make the man help faster"],
    answer:3,
    why:"Huck understands people. A rescuer will rush to save a helpless family, but not a band of criminals — so he tells the story most likely to work." },

  { ch:"Part 2 · Comprehension",
    q:"At the end, Huck thinks the Widow Douglas would be 'proud' of him for trying to help the 'rapscallions.' What does this reveal about Huck?",
    options:[
      "He only decided to help because he was hoping for a big reward",
      "He honestly wants to do good and be a person others admire",
      "He secretly cannot stand the Widow Douglas or any of her fussy ways",
      "He is quietly making fun of the whole rescue and everyone in it"],
    answer:1,
    why:"Even far from home, Huck measures himself by kindness and imagines the Widow's approval. It shows his growing conscience and his real wish to do right." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position or length).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 13 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 13 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
