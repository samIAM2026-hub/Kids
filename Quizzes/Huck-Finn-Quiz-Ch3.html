<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 3 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.45;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🪵🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Reading Quiz · Chapter 3 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer>For Warren · Read Chapter 3, then show what you know! Passing score: 80% (12 of 15)</footer>
</div>

<script>
const questions = [
  {
    ch: "Chapter 3 · Prayer",
    q: "Who scolded Huck for his dirty clothes and then took him into the closet to pray?",
    options: ["The Widow Douglas", "Miss Watson", "Tom Sawyer", "Aunt Polly"],
    answer: 1,
    why: "Miss Watson — the stricter of the two sisters — scolds Huck and teaches him about prayer."
  },
  {
    ch: "Chapter 3 · Prayer",
    q: "What did Miss Watson tell Huck would happen if he prayed every day?",
    options: ["He would become rich and famous", "He would get whatever he asked for", "He would never have to do chores again", "He would learn to read instantly"],
    answer: 1,
    why: "She told him that if he prayed, he could get anything he asked for — so Huck decided to test it."
  },
  {
    ch: "Chapter 3 · Prayer",
    q: "What did Huck pray for that he never managed to get?",
    options: ["Fish-hooks", "A new fishing boat", "Money", "A dog"],
    answer: 0,
    why: "Huck prayed for fish-hooks. He even got a fish-line once, but never any hooks — so the praying seemed useless to him."
  },
  {
    ch: "Chapter 3 · Prayer",
    q: "When Huck asked the Widow Douglas about prayer, what did she say a person really gets from it?",
    options: ["Gold and treasure", "'Spiritual gifts' — like helping other people", "Good luck in games", "Protection from his enemies"],
    answer: 1,
    why: "The Widow explained prayer brings 'spiritual gifts' — you should help others and put them before yourself."
  },
  {
    ch: "Chapter 3 · Prayer",
    q: "Why did Huck decide that praying wasn't worth the trouble for him?",
    options: ["It took too much time", "The benefits were only for OTHER people, not himself", "Miss Watson said he was too young", "He kept forgetting the words"],
    answer: 1,
    why: "Since the 'gifts' only seemed to help other people and gave Huck no advantage, he figured he'd just let it go."
  },
  {
    ch: "Chapter 3 · Two Gods",
    q: "Huck imagined two different 'Providences' (ideas of God). Which one did he decide he'd rather belong to?",
    options: ["Miss Watson's strict, harsh one", "The Widow Douglas's kind, gentle one", "Neither one at all", "Tom Sawyer's"],
    answer: 1,
    why: "Huck preferred the Widow's loving idea of God over Miss Watson's harsh one — if a body could belong to it."
  },
  {
    ch: "Chapter 3 · Pap",
    q: "What troubling news spread through the town about Huck's Pap (his father)?",
    options: ["He had been arrested in another town", "A drowned body was found in the river, believed to be him", "He had run away out West", "He was coming back to take Huck's money"],
    answer: 1,
    why: "A drowned man's body was found floating in the river, and the townspeople believed it was Pap."
  },
  {
    ch: "Chapter 3 · Pap",
    q: "How did the townspeople try to identify the drowned body as Pap?",
    options: ["By its size, ragged clothes, and long hair", "By a letter in its pocket", "By a tattoo on its arm", "By asking Huck to look at it"],
    answer: 0,
    why: "They judged it was Pap from the body's size, raggedy clothing, and unusually long hair."
  },
  {
    ch: "Chapter 3 · Pap",
    q: "Why did Huck NOT believe the drowned body was really his Pap?",
    options: ["Pap had told Huck he was leaving town", "The body was floating on its back, but Huck believed a drowned man floats face-down", "The body was too tall to be Pap", "Pap had written him a letter that week"],
    answer: 1,
    why: "From folk knowledge, Huck believed a drowned MAN floats face-down. Since this body floated on its back, he figured it wasn't Pap."
  },
  {
    ch: "Chapter 3 · Pap",
    q: "What did Huck conclude the drowned body actually was?",
    options: ["A stranger from another town", "A woman dressed in men's clothes", "One of Tom's tricks", "A scarecrow that fell in the river"],
    answer: 1,
    why: "Huck decided the body was really a woman dressed in a man's clothing — meaning Pap was probably still alive."
  },
  {
    ch: "Chapter 3 · Pap",
    q: "How did Huck feel once he figured his Pap was probably still alive?",
    options: ["Excited and happy", "Uneasy, expecting Pap to turn up again", "Relieved and calm", "He didn't care at all"],
    answer: 1,
    why: "The thought made Huck uncomfortable — he expected the troublesome old man to show up again."
  },
  {
    ch: "Chapter 3 · Tom's Gang",
    q: "About how long did Huck play robbers with Tom Sawyer's gang before he quit?",
    options: ["A single day", "About a month", "A whole year", "An entire summer"],
    answer: 1,
    why: "Huck stuck with the gang for about a month, then resigned because it was all pretend and no real robbing."
  },
  {
    ch: "Chapter 3 · Tom's Gang",
    q: "Tom promised the gang would ambush rich 'A-rabs' and Spaniards with camels and elephants. Who did they REALLY attack?",
    options: ["A real caravan of merchants", "A Sunday-school picnic of little children", "A group of soldiers", "A circus passing through town"],
    answer: 1,
    why: "It turned out to be a Sunday-school picnic of small children — no elephants, camels, or treasure at all."
  },
  {
    ch: "Chapter 3 · Tom's Gang",
    q: "How did Tom explain that there were no elephants, camels, or riches?",
    options: ["He admitted he made it all up", "He said magicians had enchanted them into a Sunday-school picnic", "He blamed Huck for scaring them off", "He said they arrived too late"],
    answer: 1,
    why: "Tom claimed (using ideas from Don Quixote) that enchanters/magicians had turned the rich caravan into a picnic to spite the gang."
  },
  {
    ch: "Chapter 3 · Tom's Gang",
    q: "Huck took an old tin lamp and an iron ring into the woods and rubbed them hard. What happened?",
    options: ["A genie appeared and granted his wish", "Nothing happened, so Huck decided it was just one of Tom's lies", "The lamp caught fire", "He found money hidden inside"],
    answer: 1,
    why: "No genie ever came. Huck rubbed until he sweated, then judged the whole genie story was just one of Tom Sawyer's lies."
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = pct >= 80;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know Chapter 3."; emoji = '🏆'; }
  else if (pct >= 80) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 3 and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 3 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (12 of 15)</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
