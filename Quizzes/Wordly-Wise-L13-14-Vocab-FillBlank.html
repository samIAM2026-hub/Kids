<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordly Wise Lessons 13 & 14 — Fill in the Blank</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Trebuchet MS',system-ui,sans-serif; background:linear-gradient(160deg,#e8dcc0 0%,#d8c9a4 50%,#c3b184 100%); min-height:100vh; color:#33291c; padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  header { background:#6b5a34; border-radius:18px; padding:26px 24px; text-align:center; color:#f7f0df; box-shadow:0 8px 0 #4a3f22; margin-bottom:16px; }
  header .ic { font-size:44px; }
  header h1 { font-size:23px; margin:8px 0 4px; }
  header p { font-size:15px; opacity:.92; }
  .bank { background:#fffdf5; border:3px dashed #b89f66; border-radius:14px; padding:12px 16px; margin-bottom:16px; }
  .bank h3 { font-size:14px; color:#6b5a34; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
  .bank .words { display:flex; flex-wrap:wrap; gap:8px; }
  .bank .w { background:#efe4c7; border-radius:999px; padding:5px 12px; font-size:15px; font-weight:bold; color:#5b4a22; }
  .bar { background:#fffdf5; border-radius:14px; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; margin-bottom:16px; box-shadow:0 4px 0 #cbb789; }
  .progress-track { flex:1; height:14px; background:#ddcba0; border-radius:10px; margin:0 14px; overflow:hidden; }
  .progress-fill { height:100%; width:0; background:#8a6d3b; border-radius:10px; transition:width .3s; }
  .card { background:#fffdf7; border-radius:16px; padding:22px; box-shadow:0 6px 0 #cbb789; margin-bottom:16px; }
  .qmeta { font-size:13px; color:#8a6d3b; font-weight:bold; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:21px; margin:8px 0 16px; line-height:1.5; }
  .blank { color:#8a6d3b; font-weight:bold; letter-spacing:2px; }
  .answerRow { display:flex; gap:10px; flex-wrap:wrap; }
  input.ans { flex:1; min-width:200px; font-size:19px; font-family:inherit; padding:12px 14px; border:3px solid #ddcaa3; border-radius:12px; background:#fbf6ea; color:#33291c; }
  input.ans:focus { outline:none; border-color:#8a6d3b; }
  input.ans.correct { background:#e2f3de; border-color:#3a7d44; }
  input.ans.wrong { background:#f7dede; border-color:#c0392b; }
  .feedback { margin-top:10px; padding:12px 14px; border-radius:10px; font-size:15px; line-height:1.45; display:none; }
  .feedback.show { display:block; }
  .feedback.good { background:#e8f5e6; color:#2e6b34; }
  .feedback.bad { background:#fbeaea; color:#a5352a; }
  .btn { background:#8a6d3b; color:#fff; border:none; border-radius:12px; padding:12px 24px; font-size:17px; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 #5b4636; transition:transform .1s; }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #5b4636; }
  .btn.next { background:#3a7d44; box-shadow:0 5px 0 #285a30; display:none; margin-top:12px; }
  .center { text-align:center; }
  .result { background:#fffdf7; border-radius:18px; padding:34px 24px; text-align:center; box-shadow:0 6px 0 #cbb789; }
  .result .big { font-size:60px; }
  .result h2 { font-size:27px; margin:10px 0; color:#6b5a34; }
  .scoreline { font-size:22px; margin:14px 0; }
  .stars { font-size:32px; letter-spacing:4px; margin:10px 0; }
  .hidden { display:none; }
  footer { text-align:center; font-size:13px; color:#6b5a34; margin-top:10px; opacity:.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ic">✍️</div>
    <h1>Wordly Wise · Lessons 13 &amp; 14</h1>
    <p>Type the word that fits the sentence</p>
  </header>
  <div class="bank"><h3>Word Bank</h3><div class="words" id="bank"></div></div>
  <div class="bar">
    <span id="qcount">Question 1 of 30</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer">For Grace · Spelling counts! Passing score: 85%</footer>
</div>
<script>
const PASS_PCT = 0.85;
const items = [
  // ---- Lesson 13 ----
  { word:"appall", sentence:"The huge, muddy mess in the kitchen would ______ Mom the moment she walked in.", why:"to appall is to shock or dismay someone." },
  { word:"dejected", sentence:"When his team lost the final game, Leo felt ______ and hung his head.", why:"dejected = discouraged and low in spirits." },
  { word:"depend", sentence:"Newly hatched baby birds ______ on their parents to bring them food.", why:"to depend on is to rely on for support." },
  { word:"dreary", sentence:"I pulled back the curtains to cheer up the dark and ______ room.", why:"dreary = dull, sad, and gloomy." },
  { word:"fanatic", sentence:"My uncle is such a football ______ that he never misses a single match.", why:"a fanatic has extreme enthusiasm for something." },
  { word:"impact", sentence:"The ______ of the bat sent the ball flying over the fence.", why:"an impact is the striking of one object by another." },
  { word:"invade", sentence:"A long line of ants began to ______ our picnic and crawl over the sandwiches.", why:"to invade is to enter by force or in great numbers." },
  { word:"isolate", sentence:"When Sam caught the flu, the nurse had to ______ him from the other children.", why:"to isolate is to cut off from others." },
  { word:"occupy", sentence:"A family of owls came to ______ the old, empty barn.", why:"to occupy is to live in or take up a space." },
  { word:"reveal", sentence:"She lifted the silver cover to ______ a beautiful birthday cake.", why:"to reveal is to make known or bring into view." },
  { word:"rout", sentence:"The battle ended in a ______ as the losing army dropped their swords and ran.", why:"a rout is a total defeat and a disorganized retreat." },
  { word:"suspect", sentence:"The teacher began to ______ that someone had copied the answers.", why:"to suspect is to think something is probably true." },
  { word:"temporary", sentence:"The storm damaged our house, so we stayed in a ______ shelter for a week.", why:"temporary = lasting only for a short time." },
  { word:"terror", sentence:"The loud crash of thunder filled the little puppy with ______.", why:"terror is great fear." },
  { word:"tragic", sentence:"The ______ news of the flood made the whole town weep.", why:"tragic = causing great sadness." },
  // ---- Lesson 14 ----
  { word:"afford", sentence:"After saving her coins for months, Mia could finally ______ the new bike.", why:"to afford is to be able to pay for something." },
  { word:"boast", sentence:"He likes to ______ about how fast he can run, even to people he just met.", why:"to boast is to brag or talk with too much pride." },
  { word:"chord", sentence:"She pressed three piano keys at once to play a lovely ______.", why:"a chord is three or more musical notes played together (not a rope 'cord')." },
  { word:"exceptional", sentence:"Her painting was so ______ that it won first prize at the fair.", why:"exceptional = unusually good." },
  { word:"fortunate", sentence:"We were very ______ that the rain stopped just in time for the parade.", why:"fortunate = lucky." },
  { word:"fringe", sentence:"The cowboy's leather jacket had a row of dangling ______ along each sleeve.", why:"fringe is a border of hanging threads or an outer edge." },
  { word:"humble", sentence:"Even after winning the gold medal, the ______ runner thanked everyone but herself.", why:"humble = modest and not proud." },
  { word:"meadow", sentence:"The horses grazed happily in the green ______ dotted with wildflowers.", why:"a meadow is a field of grass or wildflowers." },
  { word:"melancholy", sentence:"The slow, mournful violin song left me in a deep ______.", why:"melancholy = a state of deep sadness." },
  { word:"obstinate", sentence:"The ______ mule refused to move, no matter how hard we pulled the rope.", why:"obstinate = stubborn and unwilling to give in." },
  { word:"plead", sentence:"The children began to ______ with their dad to let them stay up just a little later.", why:"to plead is to beg for something you feel is important." },
  { word:"plunge", sentence:"On the boiling hot day, we ran to the dock and took a big ______ into the lake.", why:"a plunge is a sudden dive or fall into something." },
  { word:"relent", sentence:"At first Dad said no, but he began to ______ once he saw how much we wanted to go.", why:"to relent is to become less strict and give in." },
  { word:"submit", sentence:"Each student must ______ one drawing to the judges for the school art show.", why:"to submit is to hand something in for someone to look over." },
  { word:"trudge", sentence:"We had to ______ slowly through the deep, sticky mud to reach the cabin.", why:"to trudge is to walk slowly and heavily, with great effort." }
];

const bankEl = document.getElementById('bank');
[...items.map(q => q.word)].sort(() => Math.random() - 0.5).forEach(w => {
  const s = document.createElement('span'); s.className = 'w'; s.textContent = w; bankEl.appendChild(s);
});

let current = 0, score = 0, answered = false;
const passNeeded = Math.ceil(items.length * PASS_PCT);
const pctLabel = Math.round(PASS_PCT * 100);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent = `For Grace · Spelling counts! Passing score: ${pctLabel}% (${passNeeded} of ${items.length})`;

function normalize(s){ return s.toLowerCase().trim().replace(/[.,!?;:'"]/g,''); }

function render() {
  answered = false;
  const item = items[current];
  qcount.textContent = `Question ${current + 1} of ${items.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / items.length) * 100}%`;
  const sentenceHtml = item.sentence.replace('______', '<span class="blank">______</span>');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">Sentence ${current + 1}</div>
      <div class="qtext">${sentenceHtml}</div>
      <div class="answerRow">
        <input class="ans" id="ans" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type the word here..." />
        <button class="btn" id="checkBtn" onclick="check()">Check</button>
      </div>
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
  const input = document.getElementById('ans');
  input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { answered ? next() : check(); } });
}

function check() {
  if (answered) return;
  const item = items[current];
  const input = document.getElementById('ans');
  const val = normalize(input.value);
  if (val === '') { input.focus(); return; }
  answered = true;
  input.disabled = true;
  document.getElementById('checkBtn').disabled = true;
  const fb = document.getElementById('fb');
  if (val === item.word) {
    score++;
    input.classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    input.classList.add('wrong');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> The word is <strong>${item.word}</strong>. ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  const nb = document.getElementById('nextBtn'); nb.style.display = 'inline-block'; nb.focus();
}

function next() { current++; if (current < items.length) render(); else showResult(); }

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / items.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars='⭐⭐⭐⭐⭐'; msg="Perfect score! Every word right."; emoji='🏆'; }
  else if (passed) { stars='⭐⭐⭐⭐'; msg=`Excellent! You passed the ${pctLabel}% mark.`; emoji='🎖️'; }
  else if (pct >= 65) { stars='⭐⭐⭐'; msg=`So close! You need ${pctLabel}% to pass — review the words and spelling, then try again.`; emoji='📖'; }
  else if (pct >= 45) { stars='⭐⭐'; msg=`Good effort! You need ${pctLabel}% to pass. Study the list and go again.`; emoji='📚'; }
  else { stars='⭐'; msg="Let's go over the words again and try once more."; emoji='✏️'; }
  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need ${pctLabel}%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Test Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${items.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#6b5a34;margin:-4px 0 8px;">Passing score: ${pctLabel}% (${passNeeded} of ${items.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
