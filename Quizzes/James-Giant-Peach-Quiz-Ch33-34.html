<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 33–34 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 33–34 · Challenge Level</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read carefully and think hard! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 33 · Panic in New York", q:"When people in New York first saw the giant peach high in the sky, what did they think it was?",
    options:["A bomb about to blow up the city","A brand-new balloon","A funny cloud","A shooting star"], answer:0,
    why:"Seeing a huge ball over Manhattan, the frightened people jumped to the worst idea — that it was an enormous bomb sent to destroy the city." },
  { ch:"Chapter 33 · Panic in New York", q:"What does the New Yorkers' mistake tell us about the grown-ups in this story?",
    options:["They stay calm in an emergency","They panic and expect the very worst","They never notice anything unusual","They love giant fruit"], answer:1,
    why:"Instead of wondering what the peach really was, the adults panicked and assumed danger — the book keeps showing grown-ups jumping to fearful conclusions." },
  { ch:"Chapter 33 · Panic in New York", q:"What loud warning sound told the people to take cover?",
    options:["Church bells","Air-raid sirens","A fire alarm","A foghorn"], answer:1,
    why:"Air-raid sirens wailed across the city, warning everyone that danger was coming and they should hide." },
  { ch:"Chapter 33 · Panic in New York", q:"Where did the frightened people rush to hide?",
    options:["Into subways and cellars","Up onto the rooftops","Into the harbor","Inside the tall towers"], answer:0,
    why:"People dashed down into the subways and cellars, hoping to shelter underground from the 'bomb.'" },
  { ch:"Chapter 33 · Panic in New York", q:"Who did the mayor of New York telephone for help?",
    options:["The president","The fire chief","A famous scientist","The queen"], answer:0,
    why:"The mayor was so alarmed that he rang up the president of the United States himself." },
  { ch:"Chapter 33 · Panic in New York", q:"What was the president doing when the worried phone call came in?",
    options:["Eating his breakfast cereal","Taking a nap","Playing golf","Reading the newspaper"], answer:0,
    why:"Dahl adds a funny touch — the president had to abandon his bowl of breakfast cereal to deal with the emergency." },
  { ch:"Chapter 33 · Panic in New York", q:"Who did the president call on to handle the 'giant bomb'?",
    options:["The military","The zookeepers","The bakers","The police band"], answer:0,
    why:"The president got the military involved, sure that the strange floating object was a terrible weapon." },
  { ch:"Chapter 33 · Panic in New York", q:"How far did the news about the 'biggest bomb ever' spread?",
    options:["Across the whole United States","Only to one street","No further than the mayor","Just to the airport"], answer:0,
    why:"Before long the entire country had heard that the biggest bomb ever was about to explode over New York." },
  { ch:"Chapter 33 · Panic in New York", q:"Which famous city was the peach floating above?",
    options:["New York","London","Paris","Sydney"], answer:0,
    why:"The peach drifted right over New York City and its tall Manhattan buildings." },
  { ch:"Chapter 33 · Panic in New York", q:"Was the peach really a bomb — and what does the whole mix-up teach us?",
    options:["No — fear can make people believe silly, untrue things","Yes — it truly was a dangerous bomb","No — but nobody was ever fooled","Yes — James had built a bomb"], answer:0,
    why:"Of course it was only a peach! The chapter gently shows how fear can make even grown-ups believe something completely wrong." },

  { ch:"Chapter 34 · The Great Fall", q:"James first told the Centipede to cut one string. Did that bring the peach down straight away?",
    options:["No — cutting one string did nothing at first","Yes — the peach dropped at once","No — it made the peach rise higher","Yes — but very, very slowly"], answer:0,
    why:"Cutting a single string didn't work — James had to think about why, and realized the peach was now lighter than before." },
  { ch:"Chapter 34 · The Great Fall", q:"Why was the peach now lighter and easier to bring down?",
    options:["It had lost lots of juice from the Cloud-Men's hailstones","It had been eaten almost to the stone","The sun had dried it out","The seagulls had shrunk it"], answer:0,
    why:"The Cloud-Men's hailstones had knocked away much of the peach's juice, so it weighed far less than before." },
  { ch:"Chapter 34 · The Great Fall", q:"How did James plan to make the peach sink down slowly and safely?",
    options:["Let a few seagulls fly off at a time","Pop the whole peach","Flap everyone's arms","Pour out water"], answer:0,
    why:"By releasing just a few gulls at a time, James could let the peach drift downward gently instead of dropping." },
  { ch:"Chapter 34 · The Great Fall", q:"As the peach floated down slowly, what did the Ladybug wonder about?",
    options:["Whether they would be in the newspapers","Whether it would rain","Where they would sleep","If the aunts were alive"], answer:0,
    why:"The excited Ladybug wondered if they might all end up famous, printed in the newspapers." },
  { ch:"Chapter 34 · The Great Fall", q:"What silly thing did the Centipede want help with while they came down?",
    options:["Polishing his boots","Combing his hair","Writing a letter","Finding a snack"], answer:0,
    why:"Even in the middle of the descent, the vain Centipede asked for help polishing all his boots!" },
  { ch:"Chapter 34 · The Great Fall", q:"What suddenly appeared and wrecked James's careful plan?",
    options:["A huge airplane","A thunderstorm","Another giant peach","A flock of eagles"], answer:0,
    why:"A great big airplane came roaring along, right across the peach's path." },
  { ch:"Chapter 34 · The Great Fall", q:"What did the airplane do as it flew across the peach?",
    options:["Sliced through all the strings and freed the seagulls","Dropped a rope to help them","Blew them gently to shore","Scooped up the peach"], answer:0,
    why:"The plane cut clean through every silk string at once, setting all the seagulls loose in a single moment." },
  { ch:"Chapter 34 · The Great Fall", q:"What happened to the peach once all the strings were cut?",
    options:["It plummeted straight down toward the ground","It floated up into space","It stayed hanging in the air","It turned into a balloon"], answer:0,
    why:"With no seagulls left to hold it up, the peach dropped like a stone toward the city far below." },
  { ch:"Chapter 34 · The Great Fall", q:"Which creature — the one who usually doubts James — begged James to save them?",
    options:["The Earthworm","The Grasshopper","Miss Spider","The Ladybug"], answer:0,
    why:"The Earthworm, who had grumbled and doubted all along, suddenly cried out for James to save them." },
  { ch:"Chapter 34 · The Great Fall", q:"Why is it surprising and important that the Earthworm asked James for help?",
    options:["It shows he finally trusts that James is clever and brave","It shows he has given up hope","It proves he wants to be the leader","It means he is only joking"], answer:0,
    why:"The doubting Earthworm turning to James shows that, deep down, he now believes James is capable — it just took a scary moment to admit it." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read carefully and think hard! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly mastered these tricky chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed a harder quiz with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
