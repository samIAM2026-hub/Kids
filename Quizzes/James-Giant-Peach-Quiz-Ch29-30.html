<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 29–30 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 29–30</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read the chapters, then test what you remember! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 29 · The Painted Centipede", q:"What finally pulls the peach up and out of the Cloud-Men's reach?",
    options:["The seagulls","A big wind","The Earthworm","A rainbow"], answer:0,
    why:"The seagulls tied to the peach pull it up and away, out of the reach of the angry Cloud-Men." },
  { ch:"Chapter 29 · The Painted Centipede", q:"What happens to the Centipede as the paint on him dries?",
    options:["He goes stiff and can't move or speak","He turns invisible","He shrinks","He falls asleep"], answer:0,
    why:"The paint dries hard, so the Centipede sits rigid with his legs sticking straight out and can't even talk." },
  { ch:"Chapter 29 · The Painted Centipede", q:"What special kind of paint did the Cloud-Men splash on the Centipede?",
    options:["Rainbow-paint","House paint","Face paint","Gold paint"], answer:0,
    why:"It was 'rainbow-paint,' and James points out that rainbow-paint dries very, very fast." },
  { ch:"Chapter 29 · The Painted Centipede", q:"Who was shocked that the paint dried so quickly?",
    options:["The Old-Green-Grasshopper","James","Miss Spider","The Ladybug"], answer:0,
    why:"The Old-Green-Grasshopper was aghast at how fast the paint had dried on the Centipede." },
  { ch:"Chapter 29 · The Painted Centipede", q:"Why couldn't the Centipede talk?",
    options:["The paint had dried over his lips","He lost his voice","He was too shy","He was asleep"], answer:0,
    why:"The paint had already dried on the Centipede's lips, so he couldn't get a single word out." },
  { ch:"Chapter 29 · Miss Spider's Story", q:"Which creature announced that she hates paint?",
    options:["Miss Spider","The Ladybug","The Glow-worm","The Silkworm"], answer:0,
    why:"Miss Spider said she hates paint — and then told a sad story about her family and paint." },
  { ch:"Chapter 29 · Miss Spider's Story", q:"In Miss Spider's story, who got stuck in Aunt Spiker's wet kitchen paint?",
    options:["Miss Spider's grandmother","Miss Spider's brother","The Centipede","James"], answer:0,
    why:"Miss Spider's grandmother got trapped in the wet paint when Aunt Spiker painted her kitchen." },
  { ch:"Chapter 29 · Miss Spider's Story", q:"How did Miss Spider and her friends help the trapped grandmother?",
    options:["They brought her food for six months","They pulled her out","They painted over her","They called the fire brigade"], answer:0,
    why:"No one could rescue the grandmother, so Miss Spider and her friends brought her food for six whole months." },
  { ch:"Chapter 29 · Miss Spider's Story", q:"What sad thing finally happened to the grandmother spider?",
    options:["Aunt Sponge killed her with a mop","She flew away","She got better","She moved to the garden"], answer:0,
    why:"Last April, Aunt Sponge spotted the spider on the ceiling and killed her with a mop." },
  { ch:"Chapter 29 · Miss Spider's Story", q:"How does Chapter 29 end?",
    options:["James hears someone shouting","The peach lands","Everyone falls asleep","The Centipede sings"], answer:0,
    why:"Right at the end of the chapter, James suddenly hears someone shouting — leading into the next chapter." },

  { ch:"Chapter 30 · The Great Flood", q:"Where did the mysterious shouting voice seem to be coming from?",
    options:["From above, up in the sky","From inside the peach","From the sea below","From a passing ship"], answer:0,
    why:"The Earthworm cried, 'It came from above!' — the voice was coming from high up in the sky." },
  { ch:"Chapter 30 · The Great Flood", q:"Who did Miss Spider think was coming to get them?",
    options:["A Cloud-Man","A shark","A giant bird","Aunt Sponge"], answer:0,
    why:"Miss Spider cried out that it was a Cloud-Man coming to get them." },
  { ch:"Chapter 30 · The Great Flood", q:"What did everyone see when they looked up?",
    options:["A huge, dark cloud","A rainbow","The moon","A flock of seagulls"], answer:0,
    why:"When they looked up, they saw an enormous, dark cloud looming right above them." },
  { ch:"Chapter 30 · The Great Flood", q:"What did the faraway voice shout to do?",
    options:["Turn on the faucets","Run away","Go to sleep","Sing a song"], answer:0,
    why:"They faintly heard someone shout to 'turn on the faucets' — and then the cloud burst open." },
  { ch:"Chapter 30 · The Great Flood", q:"When the cloud burst, was it ordinary raindrops that came out?",
    options:["No — it was like the whole ocean falling out of the sky","Yes, gentle rain","No, it was snow","No, it was hailstones"], answer:0,
    why:"It wasn't raindrops at all — it was as if the entire ocean came crashing down out of the sky." },
  { ch:"Chapter 30 · The Great Flood", q:"What did James and his friends do to keep from being washed away?",
    options:["They grabbed onto whatever they could","They jumped into the sea","They hid in the stem","They opened umbrellas"], answer:0,
    why:"They held on tight to anything they could grab so the rushing water wouldn't sweep them off the peach." },
  { ch:"Chapter 30 · The Great Flood", q:"What did James think while all that water crashed down?",
    options:["That this was the end for them","That it was fun","That they should sing","That they were nearly home"], answer:0,
    why:"The flood was so terrifying that James thought this was surely the end — until, suddenly, it stopped." },
  { ch:"Chapter 30 · A Happy Surprise", q:"What surprising GOOD thing did the giant flood of water do?",
    options:["It washed all the paint off the Centipede","It filled the peach with water","It scared away the seagulls","It made a rainbow"], answer:0,
    why:"All that water washed the dried paint clean off the Centipede, setting him free from being stuck." },
  { ch:"Chapter 30 · A Happy Surprise", q:"How did the Centipede react once the paint was washed away?",
    options:["He danced and sang happily about being a pest again","He cried","He fell asleep","He hid"], answer:0,
    why:"The Centipede was overjoyed — he danced and sang a happy song about being a pest once more." },
  { ch:"Chapter 30 · A Happy Surprise", q:"The scary flood came because the Centipede had been rude to the Cloud-Men. What lesson can he learn from it?",
    options:["It's better not to insult or be mean to others","Always carry an umbrella","Never fly in a peach","Paint dries fast"], answer:0,
    why:"The Cloud-Men flooded the peach to get back at the Centipede for insulting them — a reminder that being rude to others can lead to trouble." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read the chapters, then test what you remember! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know these chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
