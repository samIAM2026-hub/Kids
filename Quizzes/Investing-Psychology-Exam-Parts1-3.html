      { diff:"medium", ch:"Ch 2 · Self-Image", q:"Loss aversion is the finding that…",

      { diff:"medium", ch:"Ch 3 · Situational", q:"'Noise traders' are investors who…",

      { essay:true, ch:"Essay · Part 1", diff:"essay",
        q:"Two of the book's biggest ideas are loss aversion and the disposition effect. In your own words, explain what loss aversion means, and then explain how it leads to the disposition effect — the habit of selling winners too soon and holding losers too long. Give ONE example of an investor doing this.",
        note:"Write 4–7 sentences. Explain loss aversion, connect it to the disposition effect, and give an example.",
        model:"Loss aversion means a loss hurts us about twice as much as a gain of the same size feels good, so we are wired to avoid losses far more than we chase gains. Because booking a loss is so painful, investors hold onto stocks that have dropped, hoping they will bounce back, rather than admit a mistake. At the same time they quickly sell stocks that have risen, so they can lock in a sure 'win' and enjoy that good feeling. That combination — clinging to losers and dumping winners — is the disposition effect, and it usually gets things backwards, since losers often keep losing. For example, someone might sell a stock that rose 10% but refuse to sell one that fell 40%, waiting years for it to 'get back to even.'",

  {

      { essay:true, ch:"Essay · Part 2", diff:"essay",
        q:"Richards says you can never truly cure your biases — you can only manage them. Explain what he means by 'debiasing,' describe why he prefers a simple 'good enough' method over a perfect one, and name TWO things an investor could put in that method to keep their biases in check.",

        checks:[

          { concept:"It means avoiding big losses / focusing on the numbers", keys:["avoid","big loss","losses","numbers","facts","disaster","protect","downside"], hint:"Mention avoiding big losses or focusing on the numbers, not feelings." },

      { essay:true, ch:"Essay · Part 3", diff:"essay",
        q:"Richards ends the book with a humbling idea: you can never fully beat your own biases, and a whole industry is built to use them against you. Explain what the 'bias blind spot' means and why it makes simply knowing about biases not enough. Then explain why, for an ordinary investor, Richards thinks 'defense' (avoiding big mistakes) beats 'offense' (trying to get rich fast).",

PARTS.forEach((p, pi) => {
  items.push({ type:"banner", part:pi });
  p.questions.forEach(q => items.push(Object.assign({ type: q.essay ? "essay" : "mcq", part:pi }, q)));
});
const totalQuestions = PARTS.reduce((n,p)=>n+p.questions.length,0); // 33

// Shuffle MCQ options so the correct answer isn't always first
items.forEach(item => {
  if (item.type !== "mcq") return;
  const correct = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correct);
});

/* ================= STATE ================= */
let idx = 0;
let mcqScore = 0;
const partMcq = [0,0,0], partMcqTotal = [0,0,0];
const partEssay = [0,0,0];        // 0..3 each
let answered = false;

const MCQ_TOTAL = items.filter(i=>i.type==="mcq").length;   // 30
const PASS = Math.ceil(MCQ_TOTAL * 0.75);                   // 23 (multiple-choice only)
items.forEach(i => { if (i.type==="mcq") partMcqTotal[i.part]++; });

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function currentQn() { return items.slice(0, idx+1).filter(i => i.type !== "banner").length; }
function updateBar() {
  const qn = currentQn();
  qcount.textContent = `Question ${qn} of ${totalQuestions}`;
  scoreboard.textContent = `🏅 ${mcqScore}`;
  progress.style.width = `${(qn / totalQuestions) * 100}%`;
}

function render() {
  answered = false;
  const item = items[idx];

  if (item.type === "banner") {
    const p = PARTS[item.part];
    quizArea.innerHTML = `
      <div class="partbanner">
        <div class="k">${p.k}</div>
        <h2>${p.title}</h2>
        <p>${p.blurb}</p>
      </div>
      <div class="center"><button class="btn" onclick="next()">Start ${p.k} →</button></div>`;
    return;
  }

  updateBar();

  if (item.type === "mcq") {
    const opts = item.options.map((o,i)=>`<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
    quizArea.innerHTML = `
      <div class="card">
        <div class="qhead"><span class="qmeta">${item.ch}</span><span class="diff ${item.diff}">${item.diff}</span></div>
        <div class="qtext">${item.q}</div>
        ${opts}
        <div class="feedback" id="fb"></div>
        <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
      </div>`;
  } else { // essay — no auto-grading; the answer is saved for a parent/teacher to grade later
    quizArea.innerHTML = `
      <div class="card">
        <div class="qhead"><span class="qmeta">${item.ch}</span><span class="diff hard">essay</span></div>
        <div class="qtext">${item.q}</div>
        <div class="essay-note">${item.note} <em>This one is saved for your teacher to grade — it is not marked automatically.</em></div>
        <textarea id="essayInput" placeholder="Type your answer here...">${escapeHtml(item.savedAnswer||'')}</textarea>
        <div class="center" style="margin-top:12px;"><button class="btn grade" id="saveBtn" onclick="saveEssay()">Save my answer</button></div>
        <div class="rubric" id="savedMsg"></div>
        <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
      </div>`;
    if (item.savedAnswer) document.getElementById('nextBtn').style.display = 'inline-block';
  }
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = items[idx];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    mcqScore++; partMcq[item.part]++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  updateBar();
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function escapeHtml(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ===== Essays are NOT auto-graded. The typed answer is stored on the question
   object so it can be shown on the results screen for a parent/teacher to grade. ===== */
function saveEssay() {
  const item = items[idx];
  const raw = (document.getElementById('essayInput').value || '').trim();
  item.savedAnswer = raw;
  const m = document.getElementById('savedMsg');
  m.className = "rubric show";
  if (raw.length) {
    m.innerHTML = `
      <h4 style="color:#2f5a3c;">Saved ✓ — your answer is stored</h4>
      <div style="font-size:14px;color:#5b6b62;">Your teacher will read and grade this later. You can keep editing and save again, or press Next.</div>`;
  } else {
    m.innerHTML = `
      <h4 style="color:#8f2f28;">Nothing to save yet</h4>
      <div style="font-size:14px;color:#8f2f28;">Write your answer above, then tap Save.</div>`;
  }
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  // Auto-capture whatever is typed in an essay before moving on
  const cur = items[idx];
  if (cur && cur.type === "essay") {
    const ta = document.getElementById('essayInput');
    if (ta) cur.savedAnswer = (ta.value || '').trim();
  }
  idx++;
  if (idx < items.length) render();
  else showResult();
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((mcqScore / MCQ_TOTAL) * 100);
  const passed = mcqScore >= PASS;

  let stars, msg, emoji;
  if (pct === 100)      { stars="⭐⭐⭐⭐⭐"; emoji="🏆"; msg="Perfect on the multiple-choice! You truly understand these ideas."; }
  else if (pct >= 90)   { stars="⭐⭐⭐⭐⭐"; emoji="🎖️"; msg="Outstanding grasp of the concepts."; }
  else if (passed)      { stars="⭐⭐⭐⭐"; emoji="✅"; msg="Well done — you passed the multiple-choice and clearly get the big ideas."; }
  else if (pct >= 60)   { stars="⭐⭐⭐"; emoji="📈"; msg="Close! Review the parts you missed and try again — passing is 75%."; }
  else if (pct >= 40)   { stars="⭐⭐"; emoji="📚"; msg="Good effort. Re-read the chapters and give it another go."; }
  else                  { stars="⭐"; emoji="🌱"; msg="Let's revisit the ideas together and try once more."; }

  const rows = PARTS.map((p,i)=>`
    <div class="row"><span>${p.k} · ${p.title}</span>
      <b>${partMcq[i]}/${partMcqTotal[i]} multiple-choice</b></div>`).join('');

  const banner = passed
    ? `<div style="background:#d7ecdc;color:#2f5a3c;border-radius:12px;padding:14px;font-size:22px;font-weight:bold;margin:14px 0;">🎉 PASSED the multiple-choice! 🎉</div>`
    : `<div style="background:#f6e5e2;color:#8f2f28;border-radius:12px;padding:14px;font-size:22px;font-weight:bold;margin:14px 0;">Multiple-choice not passed yet — need 75%</div>`;

  // ----- Essays: show what Warren wrote, for a parent/teacher to grade by hand -----
  const essayReview = PARTS.map(p => {
    const e = p.questions.find(q => q.essay);
    if (!e) return '';
    const ans = (e.savedAnswer && e.savedAnswer.length) ? escapeHtml(e.savedAnswer) : '<em style="color:#8f2f28;">(no answer written)</em>';
    return `
      <div style="text-align:left;background:#fbf3df;border:1px solid #d9cdae;border-left:4px solid #b3892f;border-radius:10px;padding:13px 15px;margin-bottom:10px;">
        <div style="font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#99711d;font-weight:bold;">${e.ch}</div>
        <div style="font-size:14px;color:#3a3320;margin:4px 0 8px;">${e.q}</div>
        <div style="font-size:11px;font-weight:bold;color:#6b6350;text-transform:uppercase;letter-spacing:.5px;">Warren's answer</div>
        <div style="font-size:14.5px;line-height:1.5;white-space:pre-wrap;background:#fff;border:1px solid #d9cdae;border-radius:8px;padding:10px 12px;margin:3px 0 8px;">${ans}</div>
        <details><summary style="cursor:pointer;font-size:13px;color:#1f3352;font-weight:bold;">Show a model answer (for the grader)</summary><div style="font-size:14px;color:#3a3320;margin-top:6px;line-height:1.5;">${e.model}</div></details>
      </div>`;
  }).join('');

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Exam Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">Multiple-choice: <strong>${mcqScore}</strong> / ${MCQ_TOTAL} &nbsp;(${pct}%)</div>
    <div style="font-size:14px;color:#6b6350;margin:-2px 0 6px;">Passing: 75% (${PASS}/${MCQ_TOTAL}) · The 3 essays below are saved for a parent/teacher to grade.</div>
    <div class="partscores">${rows}</div>
    <p style="margin:8px 0 12px;font-size:16px;">${msg}</p>
    <h3 style="color:#1f3352;font-size:19px;margin:18px 0 10px;text-align:left;">✍️ Essays to grade by hand</h3>
    ${essayReview}
    <div style="margin-top:14px;">
      <button class="btn" onclick="window.print()" style="margin-right:8px;">🖨️ Print / Save answers</button>
      <button class="btn" onclick="restart()">Try Again 🔄</button>
    </div>`;
}

function restart() {
  idx = 0; mcqScore = 0; answered = false;
  for (let i=0;i<3;i++){ partMcq[i]=0; }
  PARTS.forEach(p => p.questions.forEach(q => { if (q.essay) q.savedAnswer = ''; }));
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
