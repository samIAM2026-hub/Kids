<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 35–36 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 35–36 · Challenge Level</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Grace · Read carefully and think hard! Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 35 · The Peach Plunges", q:"As the peach dropped toward the city, did it get slower or faster?",
    options:["Faster and faster","Slower and slower","It floated gently","It stopped in mid-air"], answer:0,
    why:"With no seagulls to hold it up, the peach fell faster and faster toward the ground." },
  { ch:"Chapter 35 · The Peach Plunges", q:"What did the narrator feel sure would happen when the peach hit the ground?",
    options:["It would smash into a million pieces","It would bounce back up","It would roll away safely","It would sink into the earth"], answer:0,
    why:"The narrator was certain the falling peach would 'smash into a million pieces' when it landed." },
  { ch:"Chapter 35 · The Peach Plunges", q:"The watching people STILL believed the falling peach was a — ?",
    options:["Bomb","Balloon","Giant bird","Spaceship"], answer:0,
    why:"Even now the terrified New Yorkers were sure the huge object was a bomb about to explode." },
  { ch:"Chapter 35 · The Peach Plunges", q:"How did some of the women in the crowd react?",
    options:["They screamed","They cheered","They ran to catch it","They fell asleep"], answer:0,
    why:"Several women screamed in fear as the peach came plunging down." },
  { ch:"Chapter 35 · The Peach Plunges", q:"What did the men do as they waited for the end?",
    options:["Said goodbye to one another","Threw their hats in the air","Climbed the buildings","Laughed out loud"], answer:0,
    why:"Believing they were doomed, the men sadly said goodbye to each other." },
  { ch:"Chapter 35 · The Peach Plunges", q:"Which people were NOT up above watching the peach fall?",
    options:["The ones already hiding underground","The children of the city","The police officers","The newspaper reporters"], answer:0,
    why:"Everyone except those already hidden underground (in subways and cellars) looked up to watch." },
  { ch:"Chapter 35 · The Peach Plunges", q:"Did the people up ON the peach also think they were about to die?",
    options:["Yes, they believed they were doomed too","No, they felt perfectly safe","No, they were fast asleep","Yes, but only the Earthworm"], answer:0,
    why:"Everyone — the crowd below AND James's friends on the peach — believed the fall would kill them." },
  { ch:"Chapter 35 · The Peach Plunges", q:"The whole city was doing what as the peach fell?",
    options:["Waiting for the end in dread","Having a big party","Trying to shoot the peach down","Going to sleep for the night"], answer:0,
    why:"The frightened city simply held its breath and waited for the terrible end it was sure was coming." },
  { ch:"Chapter 35 · Think About It", q:"All book long, people have 'jumped to conclusions' and been wrong. Why does that make us doubt everyone will really die here?",
    options:[
      "Because their fearful guesses keep turning out to be mistaken",
      "Because peaches can never fall very fast",
      "Because James has a parachute hidden away",
      "Because the Cloud-Men promised to help"],
    answer:0,
    why:"The story keeps showing that people panic and guess wrong. So when everyone is 'sure' they'll die, we suspect they're mistaken once again." },
  { ch:"Chapter 35 · Think About It", q:"Why does the writer make this moment feel so scary and hopeless right before the ending?",
    options:[
      "To build suspense so the rescue is a big surprise",
      "To make the reader stop reading the book",
      "To show that the aunts were right all along",
      "To prove that the peach was a real bomb"],
    answer:0,
    why:"By making everything look hopeless, Dahl builds suspense — so the sudden, lucky rescue in the next chapter feels like a wonderful surprise." },

  { ch:"Chapter 36 · Saved!", q:"Believing the end had come, what did James do?",
    options:["Said goodbye to all his friends","Jumped off the peach","Fell fast asleep","Hid inside the stone"], answer:0,
    why:"Thinking they were all about to die, James bravely said goodbye to each of his friends." },
  { ch:"Chapter 36 · Saved!", q:"What was the peach heading straight toward?",
    options:["The tallest skyscrapers","The wide ocean","A green forest","A quiet farm"], answer:0,
    why:"The peach was aimed right at the city's tallest buildings, the towering skyscrapers." },
  { ch:"Chapter 36 · Saved!", q:"How did the skyscrapers seem to come at James?",
    options:["Too close, too fast","Slowly and gently","One tiny step at a time","Drifting sideways"], answer:0,
    why:"James watched in terror as the giant skyscrapers rushed up at him far too close and too fast." },
  { ch:"Chapter 36 · Saved!", q:"What was sticking up from the very tallest skyscraper?",
    options:["A huge needle-like spike","A giant flag","A round dome","A big clock"], answer:0,
    why:"The tallest skyscraper had an enormous needle (a spire) pointing straight up into the sky." },
  { ch:"Chapter 36 · Saved!", q:"What happened when the peach struck that needle?",
    options:["It got skewered and finally stopped","It bounced off unharmed","It split perfectly in half","It knocked the needle down"], answer:0,
    why:"The peach hit the needle dead-on and was skewered on it, which finally stopped its terrible fall." },
  { ch:"Chapter 36 · Saved!", q:"On top of which famous building did the peach come to rest?",
    options:["The Empire State Building","The Eiffel Tower","Big Ben","The Statue of Liberty"], answer:0,
    why:"The peach ended up stuck right on the very top of the Empire State Building." },
  { ch:"Chapter 36 · Saved!", q:"Did the peach smash to pieces the way the narrator feared?",
    options:["No — it was saved just in time","Yes — it broke into crumbs","Yes — but everyone survived","No — it floated back up"], answer:0,
    why:"Despite the narrator being 'certain' it would smash, the peach and everyone on it were saved at the last second." },
  { ch:"Chapter 36 · Think About It", q:"What actually saved the peach and everyone aboard?",
    options:[
      "The skyscraper's tall needle caught it and stopped the fall",
      "A giant net that the city put up",
      "The seagulls flying back to grab it",
      "A soft, deep pile of snow below"],
    answer:0,
    why:"Instead of smashing on the ground, the peach was caught and held by the sharp needle on top of the skyscraper." },
  { ch:"Chapter 36 · Think About It", q:"The story treats the skyscraper as part of the grown-up world. Landing safely on it hints what about James?",
    options:[
      "He is now ready to be part of a bigger, grown-up world",
      "He wishes he could go back inside the peach",
      "He will never leave the top of the building",
      "He has forgotten all of his insect friends"],
    answer:0,
    why:"After all he learned on his journey, James landing safely on the skyscraper hints that he is ready to join the wider, grown-up world." },
  { ch:"Chapter 36 · Think About It", q:"The narrator was 'certain' the peach would smash. Why did that turn out to be wrong?",
    options:[
      "In this story, things often end better than everyone fears",
      "The narrator was fibbing on purpose",
      "The peach was actually made of rubber",
      "Time suddenly ran backwards"],
    answer:0,
    why:"Just like the panicking crowd, the narrator jumped to a gloomy conclusion — but the book keeps showing that things turn out far better than expected." }
];

// Shuffle the answer choices for every question so the correct one is never
// stuck in the same spot (and can't be guessed by position).
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Grace · Read carefully and think hard! Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly mastered these tricky chapters."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed a harder quiz with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '🍑'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read the chapters and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read these chapters again carefully and try once more."; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
