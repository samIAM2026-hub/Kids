<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSAT Vocabulary Quiz — Words 13–24 (Definitions)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #e6e9f5 0%, #c9cfe8 50%, #a9b2dd 100%);
    min-height: 100vh; color: #23233a; padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { background: #3b3f7a; border-radius: 18px; padding: 26px 24px; text-align: center; color: #f2f3fb; box-shadow: 0 8px 0 #262953; margin-bottom: 18px; }
  header .ic { font-size: 46px; line-height: 1; }
  header h1 { font-size: 24px; margin: 8px 0 4px; }
  header p { font-size: 15px; opacity: 0.92; }
  .bar { background: #f2f3fb; border-radius: 14px; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 16px; box-shadow: 0 4px 0 #c4c9e6; }
  .progress-track { flex: 1; height: 14px; background: #d5d9ef; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #5a63c4; border-radius: 10px; transition: width .3s; }
  .card { background: #fff; border-radius: 16px; padding: 22px; box-shadow: 0 6px 0 #c4c9e6; margin-bottom: 16px; }
  .qmeta { font-size: 13px; color: #5a63c4; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 22px; margin: 8px 0 16px; line-height: 1.4; }
  .word { color: #3b3f7a; font-weight: bold; letter-spacing: .5px; }
  .opt { display: block; width: 100%; text-align: left; background: #f4f5fc; border: 3px solid #cfd4ee; border-radius: 12px; padding: 13px 16px; font-size: 17px; font-family: inherit; color: #23233a; margin-bottom: 10px; cursor: pointer; transition: transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #8b93d6; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback { margin-top: 6px; padding: 12px 14px; border-radius: 10px; font-size: 15px; line-height: 1.45; display: none; }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn { background: #5a63c4; color: #fff; border: none; border-radius: 12px; padding: 14px 28px; font-size: 18px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #3f479a; transition: transform .1s; }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #3f479a; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result { background: #fff; border-radius: 18px; padding: 34px 24px; text-align: center; box-shadow: 0 6px 0 #c4c9e6; }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #3b3f7a; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #40406a; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ic">📚</div>
    <h1>SSAT Vocabulary · Definitions</h1>
    <p>Words 13–24 · Choose the best meaning</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 12</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Passing score: 85%</footer>
</div>

<script>
const PASS_PCT = 0.85;
const questions = [
  { ch:"Word 13", q:"<span class='word'>PALTRY</span> most nearly means —",
    options:["meager (very small)","thick","abundant","brightly colored"], answer:0,
    why:"Paltry = meager — so small or few that it is almost worthless (a paltry sum of money)." },
  { ch:"Word 14", q:"<span class='word'>AUSPICIOUS</span> most nearly means —",
    options:["doubtful","favorable (promising)","ominous","unimportant"], answer:1,
    why:"Auspicious = favorable — a good sign that success is likely (an auspicious beginning)." },
  { ch:"Word 15", q:"<span class='word'>PRODIGAL</span> most nearly means —",
    options:["virtuous","amusing","wasteful (with money)","lazy"], answer:2,
    why:"Prodigal = wasteful — spending money or resources recklessly (the prodigal son)." },
  { ch:"Word 16", q:"<span class='word'>BELLIGERENT</span> most nearly means —",
    options:["friendly","persuasive","messy","antagonistic (hostile)"], answer:3,
    why:"Belligerent = antagonistic — eager to fight or argue, aggressive and hostile." },
  { ch:"Word 17", q:"<span class='word'>ZENITH</span> most nearly means —",
    options:["failure","the high point (peak)","a complaint","distance"], answer:1,
    why:"Zenith = the high point — the very top or peak of something (the zenith of her career)." },
  { ch:"Word 18", q:"<span class='word'>DISMAL</span> most nearly means —",
    options:["bleak (gloomy)","crowded","comfortable","typical"], answer:0,
    why:"Dismal = bleak — dark, dreary, and depressing (a dismal, rainy day)." },
  { ch:"Word 19", q:"<span class='word'>TERMINATE</span> most nearly means —",
    options:["to extend","to renew","to end (finish)","to begin"], answer:2,
    why:"Terminate = to end — to bring something to a stop or a close (terminate a contract)." },
  { ch:"Word 20", q:"<span class='word'>DEARTH</span> most nearly means —",
    options:["a surplus","a shortage (lack)","an increase","an explosion"], answer:1,
    why:"Dearth = a shortage — a scarcity or serious lack of something (a dearth of water)." },
  { ch:"Word 21", q:"<span class='word'>OBSCURE</span> most nearly means —",
    options:["famous","tragic","unclear or little-known","required"], answer:2,
    why:"Obscure = unclear or little-known — hard to see or understand, or not well known." },
  { ch:"Word 22", q:"<span class='word'>INCREMENT</span> most nearly means —",
    options:["a decrease","an increase (a step up)","a surprise","a repair"], answer:1,
    why:"Increment = an increase — a small amount by which something grows (a yearly pay increment)." },
  { ch:"Word 23", q:"<span class='word'>MISCONSTRUED</span> most nearly means —",
    options:["followed directions","corrected a mistake","interpreted wrongly","gave good advice"], answer:2,
    why:"Misconstrued = interpreted wrongly — understood or explained something incorrectly." },
  { ch:"Word 24", q:"<span class='word'>VESTIGE</span> most nearly means —",
    options:["a design","a robe","a strap","a trace (small remaining sign)"], answer:3,
    why:"Vestige = a trace — a small sign or remnant of something that once existed (a vestige of the past)." }
];

questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0, score = 0, answered = false;
const passNeeded = Math.ceil(questions.length * PASS_PCT);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Passing score: 85% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  let opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) render(); else showResult();
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You know every word."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent! You passed the 85% mark."; emoji = '🎖️'; }
  else if (pct >= 65) { stars = '⭐⭐⭐'; msg = "So close! You need 85% to pass — review the words and try again."; emoji = '📖'; }
  else if (pct >= 45) { stars = '⭐⭐'; msg = "Good effort! You need 85% to pass. Study the list and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's go over the words again and try once more."; emoji = '✏️'; }
  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 85%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#6a6a90;margin:-4px 0 8px;">Passing score: 85% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
