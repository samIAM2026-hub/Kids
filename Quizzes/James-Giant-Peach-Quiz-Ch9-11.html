<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James and the Giant Peach — Chapters 9–11 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
    background: linear-gradient(160deg, #ffe29a 0%, #ffb37b 50%, #ff8a5c 100%);
    min-height: 100vh;
    color: #4a2c0f;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #ff7043;
    border-radius: 24px;
    padding: 26px 24px;
    text-align: center;
    color: #fff;
    box-shadow: 0 8px 0 #d84315;
    margin-bottom: 18px;
  }
  header .peach { font-size: 52px; line-height: 1; }
  header h1 { font-size: 26px; margin: 8px 0 4px; }
  header p { font-size: 16px; opacity: 0.95; }
  .bar {
    background: #fff3e0;
    border-radius: 16px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #ffccbc;
  }
  .progress-track { flex: 1; height: 14px; background: #ffccbc; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #43a047; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 6px 0 #e0a96d;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #ef6c00; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.4; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #fff8f0;
    border: 3px solid #ffd2a8;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #4a2c0f;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #ff9d57; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f5d3; border-color: #43a047; }
  .opt.wrong { background: #ffd9d9; border-color: #e53935; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.4;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f7e6; color: #2e7d32; }
  .feedback.bad { background: #fdeaea; color: #c62828; }
  .btn {
    background: #43a047;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #2e7d32;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .btn.next { background: #ff7043; box-shadow: 0 5px 0 #d84315; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fff;
    border-radius: 24px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #e0a96d;
  }
  .result .big { font-size: 64px; }
  .result h2 { font-size: 28px; margin: 10px 0; color: #ef6c00; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 34px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #7a4a1f; margin-top: 10px; opacity: .8; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="peach">🍑</div>
    <h1>James and the Giant Peach</h1>
    <p>Reading Quiz · Chapters 9–11</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">⭐ 0</span>
  </div>

  <div id="quizArea"></div>

  <div id="resultArea" class="result hidden"></div>

  <footer>For Grace · Read the chapters, then test what you remember! 🐛🕷️🐞</footer>
</div>

<script>
const questions = [
  {
    ch: "Chapter 9",
    q: "After all the visitors went home, what did Aunt Sponge and Aunt Spiker order James to do?",
    options: ["Go straight to bed without supper", "Go outside and clean up the mess the crowds had left", "Count all the money they had earned", "Pick the peach off the tree"],
    answer: 1,
    why: "The aunts were tired and cross, so they sent James out into the garden to tidy up the litter the crowd had dropped."
  },
  {
    ch: "Chapter 9",
    q: "What time of day was it when James was sent outside?",
    options: ["Early morning", "Right after breakfast", "Evening, as it was getting dark", "The middle of the night"],
    answer: 2,
    why: "It was evening and growing dark, which made the lonely garden feel even spookier for James."
  },
  {
    ch: "Chapter 9",
    q: "When James reached out and touched the giant peach, how did it feel?",
    options: ["Hard and smooth like a rock", "Soft and covered in fuzz", "Cold and wet like ice", "Sharp and prickly"],
    answer: 1,
    why: "The peach was soft and fuzzy — covered in the fine fuzz that real peaches have on their skin."
  },
  {
    ch: "Chapter 9",
    q: "What surprising thing did James spot on the side of the peach?",
    options: ["A hole", "A window", "A ladder", "A bird's nest"],
    answer: 0,
    why: "James noticed a hole in the side of the peach, right down near the bottom."
  },
  {
    ch: "Chapter 10",
    q: "About how big was the hole in the peach?",
    options: ["As tiny as a keyhole", "About the size of a fox's hole", "As wide as a doorway", "Big enough to drive a car through"],
    answer: 1,
    why: "The hole was about the size of a fox's hole — just big enough for James to crawl into."
  },
  {
    ch: "Chapter 10",
    q: "What did the tunnel inside the peach feel like as James crawled through it?",
    options: ["Dry and dusty", "Damp and murky", "Hot like an oven", "Made of smooth glass"],
    answer: 1,
    why: "Inside, the tunnel was damp and murky, with soft, juicy peach walls all around him."
  },
  {
    ch: "Chapter 10",
    q: "What did James do as he crawled deeper into the tunnel?",
    options: ["He sang a loud song", "He took bites out of the juicy peach walls", "He left a trail of crumbs", "He carried a lantern to see"],
    answer: 1,
    why: "James was hungry, and the walls were made of peach — so he ate big juicy bites as he went!"
  },
  {
    ch: "Chapter 10",
    q: "James kept crawling until he bumped his head on something hard. What was it?",
    options: ["A wooden box", "The big stone (the pit) in the center of the peach", "A locked treasure chest", "A giant seed of corn"],
    answer: 1,
    why: "He reached the center and bumped into the peach's huge stone — the pit right in the middle."
  },
  {
    ch: "Chapter 10",
    q: "What did James find carved into the side of the big stone?",
    options: ["His name", "A door", "A picture of his parents", "A pile of gold"],
    answer: 1,
    why: "There was a door cut into the stone. James pushed it, and it swung open."
  },
  {
    ch: "Chapter 11",
    q: "What did James discover waiting for him inside the peach stone?",
    options: ["A room full of giant insects and creatures", "A pile of sleeping kittens", "His Aunt Sponge and Aunt Spiker", "A chest of pirate treasure"],
    answer: 0,
    why: "Inside was a room full of enormous creatures — bugs as big as James himself!"
  },
  {
    ch: "Chapter 11",
    q: "Which of these creatures did James meet inside the peach?",
    options: ["A lion, a tiger, and a bear", "A grasshopper, a centipede, a spider, a ladybug, and an earthworm", "A dragon and a unicorn", "A whale and a shark"],
    answer: 1,
    why: "James met the Old-Green-Grasshopper, the Centipede, the Spider, the Ladybug, and the Earthworm — all enormous!"
  },
  {
    ch: "Chapter 11",
    q: "How big was the Grasshopper?",
    options: ["As small as a real grasshopper", "As big as a large dog", "As tall as a house", "Too small to see"],
    answer: 1,
    why: "The Old-Green-Grasshopper was at least as big as a large dog — huge compared to a normal one."
  },
  {
    ch: "Chapter 11",
    q: "Why was James frightened when he first saw the creatures?",
    options: ["They were shouting at him", "They were talking about being hungry, and he thought they might eat him", "They were throwing peach pieces", "They had sharp swords"],
    answer: 1,
    why: "The creatures were saying how hungry they were, and James worried they were planning to eat HIM!"
  },
  {
    ch: "Chapter 11",
    q: "How did the creatures react when they realized James was scared they'd eat him?",
    options: ["They got angry and chased him", "They laughed and told him not to be silly", "They ignored him completely", "They ran away frightened"],
    answer: 1,
    why: "They burst out laughing at the idea and reassured James — they would never eat him."
  },
  {
    ch: "Chapter 11",
    q: "What kind thing did the creatures tell James about himself?",
    options: ["That he must leave at once", "That he is one of them now, and they'd been waiting for him all day", "That he had to do all their chores", "That he was too small to stay"],
    answer: 1,
    why: "They welcomed James warmly, telling him he was one of them now and that they'd been expecting him all day."
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `⭐ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `⭐ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = pct >= 80;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect! You're a James and the Giant Peach expert!"; emoji = '🏆'; }
  else if (pct >= 80) { stars = '⭐⭐⭐⭐'; msg = "Amazing reading! You really know these chapters."; emoji = '🍑'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — peek back at a few pages and try again."; emoji = '😊'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Nice try! You need 80% to pass. Let's re-read and try again."; emoji = '📖'; }
  else { stars = '⭐'; msg = "Let's read the chapters together and give it another go!"; emoji = '🐛'; }

  const banner = passed
    ? `<div style="background:#d7f5d3;color:#2e7d32;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fdeaea;color:#c62828;border-radius:14px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a4a1f;margin:-4px 0 8px;">Passing score: 80% (12 of 15)</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
