<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 17 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', 'Times New Roman', serif; background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%); min-height: 100vh; color: #2c2418; padding: 20px; }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { background: #5b4636; border-radius: 18px; padding: 26px 24px; text-align: center; color: #f5ecd9; box-shadow: 0 8px 0 #3a2c20; margin-bottom: 18px; }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar { background: #f5ecd9; border-radius: 14px; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 16px; box-shadow: 0 4px 0 #c9b890; }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card { background: #fffdf7; border-radius: 16px; padding: 22px; box-shadow: 0 6px 0 #c9b890; margin-bottom: 16px; }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt { display: block; width: 100%; text-align: left; background: #f7f1e3; border: 3px solid #ddcaa3; border-radius: 12px; padding: 13px 16px; font-size: 17px; font-family: inherit; color: #2c2418; margin-bottom: 10px; cursor: pointer; transition: transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback { margin-top: 6px; padding: 12px 14px; border-radius: 10px; font-size: 15px; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn { background: #3a7d44; color: #fff; border: none; border-radius: 12px; padding: 14px 28px; font-size: 18px; font-family: inherit; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #285a30; transition: transform .1s; }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result { background: #fffdf7; border-radius: 18px; padding: 34px 24px; text-align: center; box-shadow: 0 6px 0 #c9b890; }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Chapter 17 · Fill-in-the-Blank &amp; Comprehension · by Mark Twain</p>
  </header>
  <div class="bar">
    <span id="qcount">Question 1 of 13</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer">For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80%</footer>
</div>
<script>
const questions = [
  // ---------- PART 1: FILL IN THE BLANK ----------
  { ch:"Part 1 · Fill in the Blank",
    q:"When the man at the window asked who was there, Huck gave the false name ______.",
    options:["George Jackson","Tom Sawyer","Aleck Hopkins","Sarah Williams"],
    answer:0,
    why:"Huck told the family his name was 'George Jackson' — one of the many false names he uses to stay hidden." },
  { ch:"Part 1 · Fill in the Blank",
    q:"The man wanted to know if Huck belonged to the ______, the family his own family was feuding with.",
    options:["Shepherdsons","Wilks family","Phelps family","Watson family"],
    answer:0,
    why:"The Grangerfords were locked in a deadly feud with the Shepherdsons, so they had to be sure Huck was not one of them." },
  { ch:"Part 1 · Fill in the Blank",
    q:"The Grangerford boy about Huck's own age, who lent him dry clothes, was named ______.",
    options:["Buck","Silas","Jasper","Harney"],
    answer:0,
    why:"Buck is about the same age as Huck — even their names rhyme — and the two boys quickly become friends." },
  { ch:"Part 1 · Fill in the Blank",
    q:"The Grangerford girl who had died young and painted sad, gloomy pictures was named ______.",
    options:["Emmeline","Mary Jane","Sophia","Charlotte"],
    answer:0,
    why:"Emmeline Grangerford died as a girl, leaving behind mournful poems and dark paintings all about death." },
  { ch:"Part 1 · Fill in the Blank",
    q:"On the parlor walls hung pictures of famous ______, like George Washington and the Declaration of Independence.",
    options:["moments from American history","kings and queens of England","ships out on the ocean","animals on the farm"],
    answer:0,
    why:"The Grangerfords decorated with proud scenes of Revolutionary America — a sign of how respectable they wished to seem." },

  // ---------- PART 2: COMPREHENSION ----------
  { ch:"Part 2 · Comprehension",
    q:"Why does Huck give a made-up name like 'George Jackson' to the family at the door?",
    options:[
      "He is used to hiding who he really is from strangers",
      "He is trying to sound like a rich city boy",
      "He has honestly forgotten his own real name",
      "He wants the whole family to believe that he is famous"],
    answer:0,
    why:"By now Huck lies about his identity as a matter of habit — it is how a runaway boy stays safe among strangers." },
  { ch:"Part 2 · Comprehension",
    q:"The man lets Huck in but warns him not to bring anyone. What does this show about the Grangerfords?",
    options:[
      "They are kind, yet also fearful and suspicious",
      "They are cruel people who dislike visitors",
      "They feel safe and calm inside their home",
      "They are hoping to pick a quarrel with young Huck"],
    answer:0,
    why:"They welcome a stranger but keep their guns ready. Their kindness is real, but so is the fear their feud has bred in them." },
  { ch:"Part 2 · Comprehension",
    q:"Buck is close to Huck's age and even has a similar name. What is the biggest difference between them?",
    options:[
      "Buck is tangled up in his family's deadly feud",
      "Buck is quite a few years older than Huck",
      "Buck has trouble reading and writing words",
      "Buck has spent his entire life near this one house"],
    answer:0,
    why:"Twain makes Buck a near-mirror of Huck on purpose — the key difference is that Buck was born into a violent family feud." },
  { ch:"Part 2 · Comprehension",
    q:"Buck brags that he would have shot a Shepherdson, and his father approves. What does the book suggest by this?",
    options:[
      "A feud hands its hatred down to children in the family",
      "Buck is the bravest young boy in the whole county",
      "The Shepherdsons had started the quarrel last week",
      "Hunting is the favourite weekend sport among the local boys"],
    answer:0,
    why:"A boy cheerfully talking of killing — with his father's blessing — shows how a feud passes hatred down to children who never chose it." },
  { ch:"Part 2 · Comprehension",
    q:"Huck carefully notes the brass doorknob and the brick fireplace. Why mention such details?",
    options:[
      "They show the Grangerfords are wealthy and grand",
      "They prove the old house is quietly falling to pieces",
      "They mean the family built the house alone",
      "They show the family has very little money"],
    answer:0,
    why:"Town-style touches like a brass doorknob mark the Grangerfords as rich and 'genteel' — part of the fine image they present." },
  { ch:"Part 2 · Comprehension",
    q:"Emmeline's paintings and poems are all about death and sorrow. What is Twain gently poking fun at?",
    options:[
      "The gloomy, over-sentimental art of that time",
      "The idea of girls learning to paint at home",
      "Huck's habit of admiring the wrong things",
      "The high price of buying fancy picture frames"],
    answer:0,
    why:"Emmeline's endless mournful art is Twain teasing the popular, tear-jerking 'graveyard' style of his day — funny because it is so overdone." },
  { ch:"Part 2 · Comprehension",
    q:"Emmeline's room is kept exactly as it was the day she died. What does this reveal about the family?",
    options:[
      "They hold tight to her memory and grief",
      "They have run short of extra bedrooms",
      "They plan to rent the little room out to a guest",
      "They had forgotten the room was there"],
    answer:0,
    why:"Freezing her room in time shows a family devoted to mourning and appearances — the same showy sentimentality as Emmeline's art." },
  { ch:"Part 2 · Comprehension",
    q:"Huck tries to write a tribute poem for Emmeline but cannot finish it. What does this show about Huck?",
    options:[
      "He respects her, but is no natural poet",
      "He thinks writing poems is a boring chore",
      "He secretly disliked her sad paintings",
      "He was worn out from the long river trip"],
    answer:0,
    why:"Huck admires Emmeline enough to try honouring her — but plain, honest Huck simply isn't built for flowery poetry." }
];

// Shuffle the answer choices for every question so the correct one is never in the same spot.
questions.forEach(item => {
  const correctText = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correctText);
});

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Part 1: fill the blank · Part 2: think about WHY. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  let opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() { current++; if (current < questions.length) render(); else showResult(); }

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 17 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 17 again carefully and try once more."; emoji = '🪵'; }
  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
