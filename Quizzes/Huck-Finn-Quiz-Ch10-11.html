<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapters 10 & 11 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🐍🪶</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Comprehension Quiz · Chapters 10 &amp; 11 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Think about WHY, not just what happens. Passing score: 80%</footer>
</div>

<script>
const questions = [
  // ---------- CHAPTER 10 ----------
  { ch:"Chapter 10 · Talking About the Dead",
    q:"Huck wants to talk about the dead man they found, but Jim says it will bring bad luck. What does Jim's reaction really tell us about him?",
    options:[
      "He lives by a set of beliefs and superstitions that give him his own way of understanding the world",
      "He is hiding the fact that he killed the man",
      "He does not care about the dead man at all",
      "He is angry at Huck for asking questions"],
    answer:0,
    why:"Jim's superstitions aren't silly to him — they're a real system of beliefs he takes seriously. Twain uses them to show Jim as a full, thoughtful person with his own view of the world, not a background character." },

  { ch:"Chapter 10 · The Snakeskin",
    q:"Earlier Huck had handled a snakeskin even though Jim warned it brings bad luck. Why does Huck decide to play a trick with a dead snake?",
    options:[
      "He doesn't really believe in the bad luck and thinks it will be a funny joke on Jim",
      "He wants to scare Jim away from the island",
      "He is trying to make Jim leave him alone",
      "Jim dared him to do it"],
    answer:0,
    why:"Huck doubts the superstition, so he curls a dead rattlesnake by Jim's blanket as a prank. It shows Huck is still a boy who acts first and doesn't think about who might get hurt." },

  { ch:"Chapter 10 · A Trick Backfires",
    q:"That night the dead snake's mate comes and bites Jim. Why is this moment an example of irony?",
    options:[
      "Huck mocked the 'bad luck' of the snakeskin, but his own careless joke is exactly what caused the harm",
      "The snake was actually Huck's pet",
      "Jim had wanted to be bitten all along",
      "The bite turned out to help Jim feel better"],
    answer:0,
    why:"It's ironic: Huck laughed at the idea of snakeskin bad luck, yet his snakeskin trick is what brought the second snake — and real 'bad luck' — down on Jim. Twain lets Huck's own actions prove the point." },

  { ch:"Chapter 10 · Huck's Conscience",
    q:"After Jim is bitten, Huck secretly slips away and hides the dead snakes so Jim won't know he caused it. What does this reveal about Huck?",
    options:[
      "He feels guilty and ashamed, which shows his conscience is starting to work on him",
      "He is proud of his clever trick",
      "He has completely forgotten about the snake",
      "He blames Jim for being careless"],
    answer:0,
    why:"Huck doesn't brag — he hides the evidence because he feels bad. That quiet guilt is important: it shows Huck cares about Jim's suffering and is beginning to grow a conscience." },

  { ch:"Chapter 10 · Learning the Hard Way",
    q:"By the end of the snake incident, Huck says he'll never take hold of a snakeskin again. What lesson is Twain really showing through this?",
    options:[
      "That Huck learns best from real consequences, not from being told what to do",
      "That snakes are the most dangerous animal on the river",
      "That Jim was wrong about everything",
      "That Huck has given up believing anything Jim says"],
    answer:0,
    why:"Huck ignored Jim's warning, but a painful result changed his mind. Twain shows that experience — not lectures — is how Huck actually learns, and that Jim's 'superstition' had a grain of wisdom." },

  { ch:"Chapter 10 · Jim Suffers",
    q:"Jim's leg swells badly and he is laid up for four days. How does Twain want the reader to feel about Jim here?",
    options:[
      "Sympathetic — Jim is an innocent person hurt by someone else's thoughtless prank",
      "Amused, because Jim looks foolish",
      "Suspicious that Jim is faking his injury",
      "Relieved that Jim is finally quiet"],
    answer:0,
    why:"Jim is genuinely hurt through no fault of his own. By making us feel for Jim, Twain builds him up as a real, sympathetic human being — pushing back against how society of the time treated him." },

  { ch:"Chapter 10 · A Growing Bond",
    q:"How does the snakeskin episode fit into the changing relationship between Huck and Jim?",
    options:[
      "It's one more step where Huck sees the harm he can do to Jim and starts to value him more",
      "It permanently turns Huck and Jim into enemies",
      "It proves Huck can survive without Jim",
      "It has no effect on their relationship"],
    answer:0,
    why:"Each shared hardship ties Huck and Jim closer. Feeling responsible for Jim's pain is part of how Huck slowly comes to see Jim as a companion who matters, not just a runaway he's traveling with." },

  { ch:"Chapter 10 · The Money",
    q:"When they searched the floating house, they found eight dollars sewn in the lining of an old coat. Why did Twain likely include this small detail?",
    options:[
      "To show the pair are resourceful survivors who take what they need to keep going",
      "To prove Huck and Jim are greedy thieves",
      "To show the dead man was very rich",
      "To explain why they left the island"],
    answer:0,
    why:"The hidden eight dollars is a practical windfall for two people living off the river. It reinforces that Huck and Jim are scrappy survivors making do with whatever the flood floats their way." },

  { ch:"Chapter 10 · A Risky Idea",
    q:"Huck decides he needs to sneak into town to find out what people are saying. Why is this both useful and dangerous?",
    options:[
      "News could warn them of danger, but Huck could be recognized since everyone thinks he's dead",
      "Town is useful only because Huck is bored on the island",
      "There is no danger at all in going to town",
      "Jim ordered Huck to go and buy supplies"],
    answer:0,
    why:"Information is their protection — but Huck is supposed to be dead, so being spotted would blow everything wide open. The scene is tense because the very trip that could help them could also expose them." },

  { ch:"Chapter 10 · The Disguise Plan",
    q:"Jim suggests Huck dress up in the calico gown and sun-bonnet from the floating house and go as a girl. Why is this a smart plan?",
    options:[
      "People are looking for a boy named Huck, so a girl is far less likely to be suspected",
      "Girls are allowed in town but boys are not",
      "The dress is warmer than Huck's own clothes",
      "Jim wanted to keep the boy clothes for himself"],
    answer:0,
    why:"A disguise works by breaking people's expectations. Everyone is on the lookout for the boy Huck Finn, so appearing as a girl is a clever way for him to move around town unnoticed." },

  // ---------- CHAPTER 11 ----------
  { ch:"Chapter 11 · Choosing the House",
    q:"In town, Huck goes to the shanty of a woman he has never seen before instead of a house he knows. Why is that a careful choice?",
    options:[
      "A newcomer won't recognize his face, so his disguise is safer with her",
      "Her house was the closest one to the river",
      "He knew she would give him free food",
      "She was the only person awake that late"],
    answer:0,
    why:"Mrs. Loftus is new to town and has never seen Huck, so she can't recognize him. Huck is thinking strategically — a stranger is the safest person to test his girl disguise on." },

  { ch:"Chapter 11 · Shocking News",
    q:"From the woman, Huck learns the town's biggest gossip. What is it?",
    options:[
      "People believe Huck was murdered, and they're trying to figure out who did it",
      "The town has forgotten all about Huck",
      "Huck has won a large reward",
      "The Widow Douglas has moved away"],
    answer:0,
    why:"Huck's fake death worked too well — the whole town thinks he was really murdered and is buzzing about the crime. Now Huck gets to hear his own 'murder' being discussed." },

  { ch:"Chapter 11 · Suspicion Falls on Jim",
    q:"The woman says many people now suspect JIM of killing Huck. Why did suspicion land on Jim?",
    options:[
      "Jim ran away the very same night Huck disappeared, so people connected the two events",
      "Jim confessed to the crime",
      "Someone saw Jim hurt Huck",
      "Jim was the last person to visit the Widow"],
    answer:0,
    why:"Jim vanished the same night as Huck, and the townspeople jump to conclusions — assuming a runaway must be guilty. It's a chilling example of how quickly people blame Jim without any real proof." },

  { ch:"Chapter 11 · The Reward",
    q:"There's a three-hundred-dollar reward for catching Jim. What does this large reward reveal about the danger Jim is in?",
    options:[
      "Money gives lots of people a strong reason to hunt Jim down, so almost anyone is a threat",
      "It means Jim is safe because he is valuable",
      "It shows the town likes and misses Jim",
      "It proves Jim is guilty of the murder"],
    answer:0,
    why:"A big reward turns ordinary people into bounty hunters. It means the threat to Jim isn't just one sheriff — it's the whole countryside, anyone who wants the money. Jim's freedom is hanging by a thread." },

  { ch:"Chapter 11 · Urgent Danger",
    q:"Why does the news Huck overhears suddenly become an EMERGENCY?",
    options:[
      "The woman saw smoke on Jackson's Island, and her husband is going there that night to hunt for Jim",
      "The woman recognized Huck right away",
      "A storm is about to destroy the island",
      "The reward money has just been doubled"],
    answer:0,
    why:"It's no longer distant gossip — the woman's husband is heading to the island tonight because of the smoke she spotted. Jim could be caught within hours, which is why Huck has to race back." },

  { ch:"Chapter 11 · The Disguise Slips",
    q:"The woman grows suspicious and gives Huck secret little tests — threading a needle, throwing at a rat, catching a lump of lead. Why do these tests give Huck away?",
    options:[
      "He does each task the way a boy would, not the way a girl of that time was taught to",
      "He refuses to do any of the tasks",
      "He does everything perfectly, which looks fake",
      "He starts crying and admits the truth"],
    answer:0,
    why:"Mrs. Loftus is clever. She watches how Huck threads, throws, and catches — all habits that were taught differently to boys and girls back then. His 'boy' instincts, not his clothes, expose him." },

  { ch:"Chapter 11 · Caught",
    q:"The moment the woman announces she knows he's a boy, Huck instantly makes up a NEW story about being a runaway apprentice named George Peters. What does this show about Huck?",
    options:[
      "He is a quick, clever thinker who can invent a believable lie under pressure",
      "He always tells the truth when confronted",
      "He panics and can't say anything",
      "He gives up and tells her about Jim"],
    answer:0,
    why:"Instead of freezing, Huck spins a whole new identity on the spot. His talent for improvising stories is one of his survival skills — and it keeps Jim's secret safe even when Huck is caught." },

  { ch:"Chapter 11 · An Uncomfortable Irony",
    q:"Once she thinks Huck is a mistreated runaway apprentice, the woman is kind and even offers to help him. Why is that ironic, given what else she said?",
    options:[
      "She'll help a runaway boy escape, yet she also wants her husband to hunt down Jim, a runaway man",
      "She is kind to everyone she meets equally",
      "She had promised never to help any runaways",
      "She actually dislikes Huck the whole time"],
    answer:0,
    why:"Her sympathy stops at Huck. She'll gladly help a white runaway boy but would send her husband to capture Jim for the reward. Twain quietly exposes how people's kindness was twisted by the prejudice of the time." },

  { ch:"Chapter 11 · Reading Character",
    q:"Even though Mrs. Loftus is a minor character, Twain makes her sharp and observant. Why does giving her these qualities make the scene work better?",
    options:[
      "A clever woman makes Huck's narrow escape feel real and tense, not easy",
      "It proves Huck is not smart at all",
      "It shows the town is full of foolish people",
      "It has nothing to do with the story's tension"],
    answer:0,
    why:"If she were dull, Huck's escape would feel unearned. Because she notices things and nearly traps him, the scene crackles with suspense — and Huck's quick thinking feels genuinely impressive." },

  { ch:"Chapter 11 · 'They're After Us'",
    q:"Huck rushes back to the island and shouts, 'Git up and hump yourself, Jim! There ain't a minute to lose. They're after us!' What is powerful about the word 'us'?",
    options:[
      "Huck now thinks of himself and Jim as a team whose fates are tied together",
      "Huck is confused about who is really in danger",
      "Huck means only himself and is leaving Jim behind",
      "Huck is talking about the woman and her husband"],
    answer:0,
    why:"Huck could have said 'they're after you,' but he says 'us.' That one word shows he has joined his fate to Jim's — he's not just warning Jim, he's standing with him. It's a quiet turning point in their bond." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Think about WHY, not just what happens. Passing score: 80% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood these chapters deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapters 10 & 11 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapters 10 & 11 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
