<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlie and the Chocolate Factory — Chapters 5–6 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'Comic Sans MS','Trebuchet MS',system-ui,sans-serif; background:linear-gradient(160deg,#e8d3b5 0%,#d7b98f 50%,#c69c6d 100%); min-height:100vh; color:#3a241d; padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  header { background:#4e342e; border-radius:24px; padding:26px 24px; text-align:center; color:#fff4e6; box-shadow:0 8px 0 #2e1a14; margin-bottom:18px; }
  header .ic { font-size:50px; line-height:1; }
  header h1 { font-size:24px; margin:8px 0 4px; }
  header p { font-size:15px; opacity:.95; }
  .bar { background:#fff3e0; border-radius:16px; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; margin-bottom:16px; box-shadow:0 4px 0 #e0c39a; }
  .progress-track { flex:1; height:14px; background:#e0c39a; border-radius:10px; margin:0 14px; overflow:hidden; }
  .progress-fill { height:100%; width:0; background:#6d4c33; border-radius:10px; transition:width .3s; }
  .card { background:#fffaf2; border-radius:20px; padding:22px; box-shadow:0 6px 0 #d3b184; margin-bottom:16px; }
  .qmeta { font-size:13px; color:#8a5a2b; font-weight:bold; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:20px; margin:8px 0 16px; line-height:1.45; }
  .opt { display:block; width:100%; text-align:left; background:#fff7ec; border:3px solid #e3c9a3; border-radius:14px; padding:13px 16px; font-size:17px; font-family:inherit; color:#3a241d; margin-bottom:10px; cursor:pointer; transition:transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform:translateX(4px); border-color:#b98a4e; }
  .opt:disabled { cursor:default; }
  .opt.correct { background:#d7f0d3; border-color:#3a7d44; }
  .opt.wrong { background:#f6d6d6; border-color:#c0392b; }
  .feedback { margin-top:6px; padding:12px 14px; border-radius:12px; font-size:15px; line-height:1.45; display:none; }
  .feedback.show { display:block; }
  .feedback.good { background:#e8f5e6; color:#2e6b34; }
  .feedback.bad { background:#fbeaea; color:#a5352a; }
  .btn { background:#6d4c33; color:#fff; border:none; border-radius:14px; padding:14px 28px; font-size:18px; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 #4e342e; transition:transform .1s; }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #4e342e; }
  .btn.next { background:#b07d3c; box-shadow:0 5px 0 #7a5424; display:none; margin-top:6px; }
  .center { text-align:center; }
  .result { background:#fffaf2; border-radius:24px; padding:34px 24px; text-align:center; box-shadow:0 6px 0 #d3b184; }
  .result .big { font-size:62px; }
  .result h2 { font-size:27px; margin:10px 0; color:#4e342e; }
  .scoreline { font-size:22px; margin:14px 0; }
  .stars { font-size:33px; letter-spacing:4px; margin:10px 0; }
  .hidden { display:none; }
  footer { text-align:center; font-size:13px; color:#5b3a24; margin-top:10px; opacity:.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ic">🍫</div>
    <h1>Charlie and the Chocolate Factory</h1>
    <p>Reading Quiz · Chapters 5–6 · by Roald Dahl</p>
  </header>
  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">🍫 0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer">For Grace · Read carefully! Passing score: 80%</footer>
</div>
<script>
const PASS_PCT = 0.80;
const questions = [
  // ---------- Chapter 5 · The Golden Tickets ----------
  { ch:"Chapter 5 · The Golden Tickets", q:"Who is the man behind the Golden Ticket contest?",
    options:["Mr Willy Wonka","Old Grandpa Joe","Charlie's father","Prince Pondicherry"], answer:0,
    why:"It is Mr Willy Wonka who dreams up the whole Golden Ticket contest." },
  { ch:"Chapter 5 · The Golden Tickets", q:"What do the five ticket winners get to do?",
    options:["Tour the secret factory","Meet the young queen","Drive a shiny new car","Live inside the factory"], answer:0,
    why:"Each winner is allowed to tour Mr Wonka's secret chocolate factory." },
  { ch:"Chapter 5 · The Golden Tickets", q:"What colour are the special tickets?",
    options:["Shining gold","Deep sky blue","Bright rose red","Plain snowy white"], answer:0,
    why:"They are called Golden Tickets because each one is printed on gold-coloured paper." },
  { ch:"Chapter 5 · The Golden Tickets", q:"How does a child win a place on the tour?",
    options:["By finding a ticket","By writing a letter","By paying a big fee","By winning a race"], answer:0,
    why:"A child wins only by finding one of the five hidden Golden Tickets." },
  { ch:"Chapter 5 · The Golden Tickets", q:"Why can't Charlie just buy lots of bars to search?",
    options:["His family is poor","He is far too busy","He dislikes sweets","The shop is closed"], answer:0,
    why:"The Buckets are very poor, so Charlie cannot afford to buy bars to hunt through." },
  { ch:"Chapter 5 · The Golden Tickets", q:"What surprising thing does Grandpa Joe do when he hears the news?",
    options:["Sits up in bed","Runs down the road","Starts to weep","Drifts off to sleep"], answer:0,
    why:"Grandpa Joe is so thrilled that he sits up in the bed he almost never leaves." },
  { ch:"Chapter 5 · The Golden Tickets", q:"Who says the tickets will go to rich children?",
    options:["Grandpa George","Grandma Josephine","Charlie's father","Charlie himself"], answer:0,
    why:"Grumpy Grandpa George says only wealthy children who buy many bars will win." },
  { ch:"Chapter 5 · The Golden Tickets", q:"What special day is Charlie's one yearly bar saved for?",
    options:["His birthday","New Year's Day","The first school day","A rainy Sunday"], answer:0,
    why:"Charlie's single bar each year is saved as a treat for his birthday." },
  { ch:"Chapter 5 · The Golden Tickets", q:"How does the whole country feel about the contest?",
    options:["Wild with excitement","Calm and quiet","Angry and cross","Bored and sleepy"], answer:0,
    why:"News of the tickets sweeps the country and everyone grows wildly excited." },
  { ch:"Chapter 5 · The Golden Tickets · Think About It", q:"Why does Mr Wonka's plan make people buy so much chocolate?",
    options:["They hope to win","They love the wrapper","The price dropped low","Wonka gives it free"], answer:0,
    why:"People buy bar after bar because each one might hide a Golden Ticket." },

  // ---------- Chapter 6 · The First Two Finders ----------
  { ch:"Chapter 6 · The First Two Finders", q:"In what order are the first two tickets found?",
    options:["Augustus, then Veruca","Veruca, then Augustus","Both on the same day","Charlie, then Veruca"], answer:0,
    why:"Augustus Gloop finds the first ticket, and Veruca Salt finds the second." },
  { ch:"Chapter 6 · The First Two Finders", q:"How do the Buckets learn that Augustus found a ticket?",
    options:["From the newspaper","From a phone call","From Mr Wonka","From a neighbour"], answer:0,
    why:"The family reads all about Augustus and sees his photo in the newspaper." },
  { ch:"Chapter 6 · The First Two Finders", q:"What does the newspaper picture of Augustus show?",
    options:["A huge fat boy","A tiny thin boy","A smiling girl","A grey old man"], answer:0,
    why:"The photo shows Augustus as an enormously fat boy, famous for overeating." },
  { ch:"Chapter 6 · The First Two Finders", q:"How does Charlie's family feel about Augustus?",
    options:["They dislike him","They admire him","They envy him","They pity him"], answer:0,
    why:"The Buckets do not like the greedy look of Augustus Gloop at all." },
  { ch:"Chapter 6 · The First Two Finders", q:"What kind of factory does Veruca's father own?",
    options:["A peanut factory","A toy factory","A shoe factory","A paper factory"], answer:0,
    why:"Mr Salt owns a factory where peanuts are shelled." },
  { ch:"Chapter 6 · The First Two Finders", q:"Why did Mr Salt buy so many chocolate bars?",
    options:["Veruca demanded one","He adores chocolate","He runs a sweet shop","He felt very hungry"], answer:0,
    why:"Spoiled Veruca threw tantrums until her father promised to buy her a ticket." },
  { ch:"Chapter 6 · The First Two Finders", q:"Who actually unwrapped all the bars to find Veruca's ticket?",
    options:["His factory workers","Veruca on her own","Mr Wonka's helpers","The town police"], answer:0,
    why:"Mr Salt made his peanut-factory workers unwrap the bars instead of shelling nuts." },
  { ch:"Chapter 6 · The First Two Finders", q:"How long did it take the workers to find the ticket?",
    options:["Days of unwrapping","One quick minute","A whole long year","Barely an hour"], answer:0,
    why:"It took the workers days of unwrapping thousands of bars before one held a ticket." },
  { ch:"Chapter 6 · The First Two Finders", q:"What does Grandpa Joe warn about spoiling a child?",
    options:["It ends badly","It makes them kind","It saves money","It is good fun"], answer:0,
    why:"Grandpa Joe warns that spoiling a child like Veruca always ends badly." },
  { ch:"Chapter 6 · The First Two Finders · Think About It", q:"Why do Charlie and Grandpa Joe feel Veruca did not really earn her ticket?",
    options:["Her dad's money won it","She searched very hard","She had good luck","She swapped for it"], answer:0,
    why:"It was her father's money and his workers, not Veruca, that found the ticket." }
];

questions.forEach(item => {
  const correct = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correct);
});

let current = 0, score = 0, answered = false;
const passNeeded = Math.ceil(questions.length * PASS_PCT);
const pctLabel = Math.round(PASS_PCT * 100);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent = `For Grace · Read carefully! Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `🍫 ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  const opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `🍫 ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() { current++; if (current < questions.length) render(); else showResult(); }

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars='⭐⭐⭐⭐⭐'; msg="Perfect score! A golden-ticket performance!"; emoji='🏆'; }
  else if (passed) { stars='⭐⭐⭐⭐'; msg="Excellent reading! You passed with room to spare."; emoji='🎖️'; }
  else if (pct >= 60) { stars='⭐⭐⭐'; msg=`So close! You need ${pctLabel}% to pass — review a few pages and try again.`; emoji='🍫'; }
  else if (pct >= 40) { stars='⭐⭐'; msg=`Good effort! You need ${pctLabel}% to pass. Re-read the chapters and go again.`; emoji='📚'; }
  else { stars='⭐'; msg="Let's read these chapters again carefully and try once more."; emoji='📗'; }
  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need ${pctLabel}%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#5b3a24;margin:-4px 0 8px;">Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
