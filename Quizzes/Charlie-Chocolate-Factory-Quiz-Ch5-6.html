<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlie and the Chocolate Factory — Chapters 5–6 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'Comic Sans MS','Trebuchet MS',system-ui,sans-serif; background:linear-gradient(160deg,#e8d3b5 0%,#d7b98f 50%,#c69c6d 100%); min-height:100vh; color:#3a241d; padding:20px; }
  .wrap { max-width:760px; margin:0 auto; }
  header { background:#4e342e; border-radius:24px; padding:26px 24px; text-align:center; color:#fff4e6; box-shadow:0 8px 0 #2e1a14; margin-bottom:18px; }
  header .ic { font-size:50px; line-height:1; }
  header h1 { font-size:24px; margin:8px 0 4px; }
  header p { font-size:15px; opacity:.95; }
  .bar { background:#fff3e0; border-radius:16px; padding:12px 18px; display:flex; justify-content:space-between; align-items:center; font-weight:bold; margin-bottom:16px; box-shadow:0 4px 0 #e0c39a; }
  .progress-track { flex:1; height:14px; background:#e0c39a; border-radius:10px; margin:0 14px; overflow:hidden; }
  .progress-fill { height:100%; width:0; background:#6d4c33; border-radius:10px; transition:width .3s; }
  .card { background:#fffaf2; border-radius:20px; padding:22px; box-shadow:0 6px 0 #d3b184; margin-bottom:16px; }
  .qmeta { font-size:13px; color:#8a5a2b; font-weight:bold; text-transform:uppercase; letter-spacing:.5px; }
  .qtext { font-size:20px; margin:8px 0 16px; line-height:1.45; }
  .opt { display:block; width:100%; text-align:left; background:#fff7ec; border:3px solid #e3c9a3; border-radius:14px; padding:13px 16px; font-size:17px; font-family:inherit; color:#3a241d; margin-bottom:10px; cursor:pointer; transition:transform .1s, background .15s, border-color .15s; }
  .opt:hover:not(:disabled) { transform:translateX(4px); border-color:#b98a4e; }
  .opt:disabled { cursor:default; }
  .opt.correct { background:#d7f0d3; border-color:#3a7d44; }
  .opt.wrong { background:#f6d6d6; border-color:#c0392b; }
  .feedback { margin-top:6px; padding:12px 14px; border-radius:12px; font-size:15px; line-height:1.45; display:none; }
  .feedback.show { display:block; }
  .feedback.good { background:#e8f5e6; color:#2e6b34; }
  .feedback.bad { background:#fbeaea; color:#a5352a; }
  .btn { background:#6d4c33; color:#fff; border:none; border-radius:14px; padding:14px 28px; font-size:18px; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 0 #4e342e; transition:transform .1s; }
  .btn:active { transform:translateY(3px); box-shadow:0 2px 0 #4e342e; }
  .btn.next { background:#b07d3c; box-shadow:0 5px 0 #7a5424; display:none; margin-top:6px; }
  .center { text-align:center; }
  .result { background:#fffaf2; border-radius:24px; padding:34px 24px; text-align:center; box-shadow:0 6px 0 #d3b184; }
  .result .big { font-size:62px; }
  .result h2 { font-size:27px; margin:10px 0; color:#4e342e; }
  .scoreline { font-size:22px; margin:14px 0; }
  .stars { font-size:33px; letter-spacing:4px; margin:10px 0; }
  .hidden { display:none; }
  footer { text-align:center; font-size:13px; color:#5b3a24; margin-top:10px; opacity:.85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="ic">🍫</div>
    <h1>Charlie and the Chocolate Factory</h1>
    <p>Reading Quiz · Chapters 5–6 · by Roald Dahl</p>
  </header>
  <div class="bar">
    <span id="qcount">Question 1 of 20</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">🍫 0</span>
  </div>
  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>
  <footer id="footer">For Grace · Read carefully! Passing score: 80%</footer>
</div>
<script>
const PASS_PCT = 0.80;
const questions = [
  // ---------- Chapter 5 · The Golden Tickets ----------
  { ch:"Chapter 5 · The Golden Tickets", q:"What exciting news does Mr Wonka announce in the newspaper?",
    options:["Five children can visit","He is closing down for good","He is moving abroad","He has stopped cooking"], answer:0,
    why:"Wonka announces that five lucky children will be allowed to visit his secret factory." },
  { ch:"Chapter 5 · The Golden Tickets", q:"How many Golden Tickets did Mr Wonka hide?",
    options:["Just five of them","About twenty","Only two","A whole hundred"], answer:0,
    why:"Wonka hid exactly five Golden Tickets, so only five children could win." },
  { ch:"Chapter 5 · The Golden Tickets", q:"Where were the Golden Tickets hidden?",
    options:["Under bar wrappers","Inside fizzy drinks","In library books","Below shop floors"], answer:0,
    why:"Each ticket was printed on gold paper and slipped under the wrapper of a chocolate bar." },
  { ch:"Chapter 5 · The Golden Tickets", q:"How do the five special bars look next to the other bars?",
    options:["Just like normal bars","Painted bright gold","Far bigger than most","Tied up with ribbon"], answer:0,
    why:"The winning bars look exactly like ordinary ones, so no one can tell which is which." },
  { ch:"Chapter 5 · The Golden Tickets", q:"Where in the world could a lucky bar turn up?",
    options:["In any shop anywhere","Only in Wonka's town","Only in big cities","Only in one country"], answer:0,
    why:"The bars were sent out everywhere, so a ticket could be in any shop in any country." },
  { ch:"Chapter 5 · The Golden Tickets", q:"Besides a factory tour, what else does a ticket finder win?",
    options:["Sweets for life","A pile of money","A brand-new house","A shiny gold crown"], answer:0,
    why:"Each winner is promised a lifelong supply of Wonka's chocolate and sweets." },
  { ch:"Chapter 5 · The Golden Tickets", q:"How does Grandpa Joe react when he hears the news?",
    options:["Wildly excited","Rather bored","Quite sleepy","A bit cross"], answer:0,
    why:"Grandpa Joe gets so excited that he sits straight up in the bed he never usually leaves." },
  { ch:"Chapter 5 · The Golden Tickets", q:"Why does Grandpa George think Charlie has little chance?",
    options:["Rich kids buy more bars","Charlie reads too slow","The shops are all shut","Charlie hates chocolate"], answer:0,
    why:"Rich children can buy bars every day, while poor Charlie gets only one a year." },
  { ch:"Chapter 5 · The Golden Tickets", q:"How often does Charlie get a chocolate bar of his own?",
    options:["Once a year","Every single day","Twice each week","Each Sunday"], answer:0,
    why:"Charlie is given just one bar a year, as a special treat on his birthday." },
  { ch:"Chapter 5 · The Golden Tickets · Think About It", q:"What does the family's reaction to the news show about them?",
    options:["They share big hopes","They dislike each other","They are bored by it","They plan to cheat"], answer:0,
    why:"Even though they are poor, the family dreams and hopes together — that is what keeps them close." },

  // ---------- Chapter 6 · The First Two Finders ----------
  { ch:"Chapter 6 · The First Two Finders", q:"Who found the very first Golden Ticket?",
    options:["Augustus Gloop","Charlie Bucket","Veruca Salt","Grandpa Joe"], answer:0,
    why:"The first ticket was found by a greedy boy named Augustus Gloop." },
  { ch:"Chapter 6 · The First Two Finders", q:"What is Augustus Gloop like?",
    options:["A greedy fat boy","A shy thin girl","A tall quiet man","A tiny old lady"], answer:0,
    why:"Augustus is a very fat boy who eats enormous amounts of chocolate all day long." },
  { ch:"Chapter 6 · The First Two Finders", q:"How did Augustus's town treat him after his win?",
    options:["Cheered and praised him","Ignored him completely","Chased him out of the town","Sent him to bed"], answer:0,
    why:"The whole town celebrated Augustus and his photo appeared in the newspaper." },
  { ch:"Chapter 6 · The First Two Finders", q:"Why did Augustus's mother say he was sure to find a ticket?",
    options:["He ate huge amounts","He prayed each night","He is very lucky","He is very clever"], answer:0,
    why:"His mother said that eating so much chocolate every day was bound to turn up a ticket." },
  { ch:"Chapter 6 · The First Two Finders", q:"How did people around the world act after the first ticket was found?",
    options:["Bought bars madly","Stopped eating sweets","Grew bored quickly","Gave their bars away"], answer:0,
    why:"People everywhere rushed to buy Wonka bars, hoping to find one of the tickets." },
  { ch:"Chapter 6 · The First Two Finders", q:"What did Professor Foulbody invent?",
    options:["A gold-finding machine","A flying chocolate boat","A talking newspaper","A giant sugar oven"], answer:0,
    why:"He built a machine meant to sense the gold hidden under a chocolate wrapper." },
  { ch:"Chapter 6 · The First Two Finders", q:"What went wrong with Professor Foulbody's machine?",
    options:["It grabbed a gold tooth","It melted all the bars","It blew up loudly","It ran right out of power"], answer:0,
    why:"The machine reached out and seized a lady's gold filling instead of a ticket." },
  { ch:"Chapter 6 · The First Two Finders", q:"Who found the second Golden Ticket?",
    options:["Veruca Salt","Augustus Gloop","Grandma Josephine","Mr Fickelgruber"], answer:0,
    why:"The second ticket went to a spoiled rich girl named Veruca Salt." },
  { ch:"Chapter 6 · The First Two Finders", q:"How did Veruca's father get the ticket for her?",
    options:["Workers opened thousands","She searched one shop","He baked his own bar","He kindly asked Mr Wonka"], answer:0,
    why:"Mr Salt bought thousands of bars and had his factory workers unwrap them until one held a ticket." },
  { ch:"Chapter 6 · The First Two Finders · Think About It", q:"What do Charlie and Grandpa Joe think about how Veruca won?",
    options:["It was not fair","It was very clever","It was good luck","It was hard work"], answer:0,
    why:"They feel it was unfair, and Grandpa Joe warns that spoiling a child never ends well." }
];

questions.forEach(item => {
  const correct = item.options[item.answer];
  for (let i = item.options.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [item.options[i], item.options[j]] = [item.options[j], item.options[i]];
  }
  item.answer = item.options.indexOf(correct);
});

let current = 0, score = 0, answered = false;
const passNeeded = Math.ceil(questions.length * PASS_PCT);
const pctLabel = Math.round(PASS_PCT * 100);
const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent = `For Grace · Read carefully! Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})`;

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `🍫 ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;
  const opts = item.options.map((o, i) => `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`).join('');
  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');
  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `🍫 ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() { current++; if (current < questions.length) render(); else showResult(); }

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';
  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars='⭐⭐⭐⭐⭐'; msg="Perfect score! A golden-ticket performance!"; emoji='🏆'; }
  else if (passed) { stars='⭐⭐⭐⭐'; msg="Excellent reading! You passed with room to spare."; emoji='🎖️'; }
  else if (pct >= 60) { stars='⭐⭐⭐'; msg=`So close! You need ${pctLabel}% to pass — review a few pages and try again.`; emoji='🍫'; }
  else if (pct >= 40) { stars='⭐⭐'; msg=`Good effort! You need ${pctLabel}% to pass. Re-read the chapters and go again.`; emoji='📚'; }
  else { stars='⭐'; msg="Let's read these chapters again carefully and try once more."; emoji='📗'; }
  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need ${pctLabel}%</div>`;
  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#5b3a24;margin:-4px 0 8px;">Passing score: ${pctLabel}% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}
render();
</script>
</body>
</html>
