<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 4 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.45;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🪵🌊</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Reading Quiz · Chapter 4 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer>For Warren · Read Chapter 4, then show what you know! Passing score: 80% (12 of 15)</footer>
</div>

<script>
const questions = [
  {
    ch: "Chapter 4 · Settling In",
    q: "How much time had passed at the start of Chapter 4, and what season was it?",
    options: ["A few days, in summer", "Three or four months, well into winter", "About two years, in spring", "One week, in autumn"],
    answer: 1,
    why: "Huck says three or four months had run along and it was well into the winter now."
  },
  {
    ch: "Chapter 4 · Settling In",
    q: "What had Huck learned to do during his months at school?",
    options: ["Read, write, and spell a little, plus some multiplication", "Play the piano", "Speak French", "Build boats"],
    answer: 0,
    why: "Huck could now spell, read, and write 'just a little,' and recite part of the multiplication table."
  },
  {
    ch: "Chapter 4 · Settling In",
    q: "What did Huck do whenever he got especially tired of school?",
    options: ["He cried", "He played hookey (skipped school)", "He asked the widow for a break", "He pretended to be sick"],
    answer: 1,
    why: "Huck would play hookey, and said the 'hiding' (whipping) he got the next day actually cheered him up."
  },
  {
    ch: "Chapter 4 · Bad Luck",
    q: "What did Huck spill at breakfast that he believed would bring bad luck?",
    options: ["A glass of milk", "Salt (he turned over the salt-cellar)", "A pot of coffee", "A jar of jam"],
    answer: 1,
    why: "Huck knocked over the salt-cellar, which he believed was a sure sign of coming bad luck."
  },
  {
    ch: "Chapter 4 · Bad Luck",
    q: "What did Huck try to do to undo the bad luck — and who stopped him?",
    options: ["Throw salt over his left shoulder; Miss Watson stopped him", "Say a prayer; the widow stopped him", "Spin in a circle; Jim stopped him", "Knock on wood; the teacher stopped him"],
    answer: 0,
    why: "Huck reached to toss salt over his left shoulder, but Miss Watson grabbed his hands first, so the charm failed."
  },
  {
    ch: "Chapter 4 · The Tracks",
    q: "Walking out after breakfast, what did Huck discover in the fresh snow?",
    options: ["A lost dog", "Somebody's footprints (boot tracks)", "A pile of money", "A dead bird"],
    answer: 1,
    why: "There was an inch of new snow, and Huck spotted tracks that had come up from the quarry and circled the fence."
  },
  {
    ch: "Chapter 4 · The Tracks",
    q: "What special mark told Huck the boot prints belonged to his Pap?",
    options: ["A worn-down heel", "A cross made with big nails in the left boot-heel", "A muddy toe print", "The initials 'P.F.'"],
    answer: 1,
    why: "The left boot-heel had a cross of big nails — a charm 'to keep off the devil' — which Huck knew was Pap's mark."
  },
  {
    ch: "Chapter 4 · Judge Thatcher",
    q: "Where did Huck rush off to as fast as he could after seeing the tracks?",
    options: ["The school", "Judge Thatcher's house", "The church", "Tom Sawyer's house"],
    answer: 1,
    why: "Frightened, Huck shinned down the hill and went straight to Judge Thatcher's."
  },
  {
    ch: "Chapter 4 · Judge Thatcher",
    q: "What did Huck ask Judge Thatcher to do with his fortune of six thousand dollars?",
    options: ["Take it all (he wanted to give it away)", "Double it by investing", "Send it to the widow", "Hide it in the woods"],
    answer: 0,
    why: "Huck begged the judge to take all his money — the six thousand and the interest too."
  },
  {
    ch: "Chapter 4 · Judge Thatcher",
    q: "Why did Huck suddenly want to get rid of all his money?",
    options: ["He felt guilty about being rich", "So his Pap couldn't take it from him", "He wanted to buy a boat", "The widow told him to"],
    answer: 1,
    why: "Knowing Pap was back (from the tracks), Huck wanted no money so Pap would have nothing to take."
  },
  {
    ch: "Chapter 4 · Judge Thatcher",
    q: "How did Judge Thatcher arrange the deal legally, and what did he pay Huck?",
    options: ["He 'bought' it 'for a consideration' and paid Huck one dollar", "He gave Huck a gold watch", "He paid Huck one hundred dollars", "He signed nothing and just took it"],
    answer: 0,
    why: "The judge wrote a paper saying he bought the property 'for a consideration,' handing Huck a single dollar to make it legal."
  },
  {
    ch: "Chapter 4 · Jim's Magic",
    q: "Whose magic hair-ball did Huck visit, and where had the hair-ball come from?",
    options: ["The widow's; from a cow's tail", "Jim's; taken from the fourth stomach of an ox", "Tom's; from a horse's mane", "Miss Watson's; from a sheep"],
    answer: 1,
    why: "Huck went to Jim, who owned a hair-ball as big as a fist taken from the fourth stomach of an ox."
  },
  {
    ch: "Chapter 4 · Jim's Magic",
    q: "How did Huck pay the hair-ball, and how did Jim fix the coin?",
    options: ["With a real dollar; he didn't fix it", "With a fake (counterfeit) quarter; Jim hid it in a raw potato overnight", "With a gold coin; Jim polished it", "With a button; Jim painted it silver"],
    answer: 1,
    why: "Huck offered a slick counterfeit quarter, and Jim planned to slip it inside a raw Irish potato overnight to make it look real."
  },
  {
    ch: "Chapter 4 · The Fortune",
    q: "What did the hair-ball fortune say about Huck's Pap?",
    options: ["He had two angels around him — one white, one black — fighting over him", "He had moved far away forever", "He had become very rich", "He had drowned in the river"],
    answer: 0,
    why: "Jim said two angels hovered around Pap — a white shiny one and a black one — and no one could tell which would win him."
  },
  {
    ch: "Chapter 4 · Cliffhanger",
    q: "When Huck lit his candle and went up to his room that night, who was waiting there?",
    options: ["The widow", "Jim", "His Pap, his own self", "Judge Thatcher"],
    answer: 2,
    why: "The chapter ends on a shock: Huck reaches his room and finds Pap himself sitting there!"
  }
];

let current = 0;
let score = 0;
let answered = false;

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  let opts = item.options.map((o, i) =>
    `<button class="opt" data-i="${i}" onclick="choose(${i})">${o}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  if (i === item.answer) {
    score++;
    buttons[i].classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    buttons[i].classList.add('wrong');
    buttons[item.answer].classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = pct >= 80;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You truly know Chapter 4."; emoji = '🏆'; }
  else if (pct >= 80) { stars = '⭐⭐⭐⭐'; msg = "Excellent reading! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — review a few pages and try again."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 4 and give it another go."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 4 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (12 of 15)</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
