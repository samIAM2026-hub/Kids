<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventures of Huckleberry Finn — Chapter 12 Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: linear-gradient(160deg, #cfe8f0 0%, #a9d3c2 45%, #8bb98f 100%);
    min-height: 100vh;
    color: #2c2418;
    padding: 20px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header {
    background: #5b4636;
    border-radius: 18px;
    padding: 26px 24px;
    text-align: center;
    color: #f5ecd9;
    box-shadow: 0 8px 0 #3a2c20;
    margin-bottom: 18px;
  }
  header .raft { font-size: 48px; line-height: 1; }
  header h1 { font-size: 25px; margin: 8px 0 4px; font-style: italic; }
  header p { font-size: 16px; opacity: 0.92; }
  .bar {
    background: #f5ecd9;
    border-radius: 14px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    margin-bottom: 16px;
    box-shadow: 0 4px 0 #c9b890;
  }
  .progress-track { flex: 1; height: 14px; background: #d9c9a3; border-radius: 10px; margin: 0 14px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0; background: #3a7d44; border-radius: 10px; transition: width .3s; }
  .card {
    background: #fffdf7;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 6px 0 #c9b890;
    margin-bottom: 16px;
  }
  .qmeta { font-size: 13px; color: #8a6d3b; font-weight: bold; text-transform: uppercase; letter-spacing: .5px; }
  .qtext { font-size: 20px; margin: 8px 0 16px; line-height: 1.45; }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    background: #f7f1e3;
    border: 3px solid #ddcaa3;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 17px;
    font-family: inherit;
    color: #2c2418;
    margin-bottom: 10px;
    cursor: pointer;
    transition: transform .1s, background .15s, border-color .15s;
  }
  .opt:hover:not(:disabled) { transform: translateX(4px); border-color: #b89968; }
  .opt:disabled { cursor: default; }
  .opt.correct { background: #d7f0d3; border-color: #3a7d44; }
  .opt.wrong { background: #f6d6d6; border-color: #c0392b; }
  .feedback {
    margin-top: 6px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good { background: #e8f5e6; color: #2e6b34; }
  .feedback.bad { background: #fbeaea; color: #a5352a; }
  .btn {
    background: #3a7d44;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-size: 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 5px 0 #285a30;
    transition: transform .1s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #285a30; }
  .btn.next { background: #8a6d3b; box-shadow: 0 5px 0 #5b4636; display: none; margin-top: 6px; }
  .center { text-align: center; }
  .result {
    background: #fffdf7;
    border-radius: 18px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 6px 0 #c9b890;
  }
  .result .big { font-size: 60px; }
  .result h2 { font-size: 27px; margin: 10px 0; color: #5b4636; }
  .scoreline { font-size: 22px; margin: 14px 0; }
  .stars { font-size: 32px; letter-spacing: 4px; margin: 10px 0; }
  .hidden { display: none; }
  footer { text-align: center; font-size: 13px; color: #4c4030; margin-top: 10px; opacity: .85; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="raft">🛶🚢</div>
    <h1>The Adventures of Huckleberry Finn</h1>
    <p>Comprehension Quiz · Chapter 12 · by Mark Twain</p>
  </header>

  <div class="bar">
    <span id="qcount">Question 1 of 15</span>
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <span id="scoreboard">✓ 0</span>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" class="result hidden"></div>

  <footer id="footer">For Warren · Think about WHY, not just what happens. Passing score: 80%</footer>
</div>

<script>
const questions = [
  { ch:"Chapter 12 · Life on the Raft",
    q:"Huck and Jim travel down the river only at night and lie hidden all day. What does this daily routine really reveal about their 'freedom'?",
    options:[
      "Their freedom is fragile — they can only be truly free in the dark, hidden from the world",
      "They are completely safe and free at all times",
      "They simply prefer sleeping during the day",
      "Jim is afraid of sunlight"],
    answer:0,
    why:"On the raft they feel free and peaceful, but they still have to hide by day. Twain shows their freedom is real yet fragile — it survives only in the dark, away from a society that would seize Jim." },

  { ch:"Chapter 12 · The Wigwam",
    q:"They build a snug wigwam on the raft to stay dry and keep their things safe. What does this small act of planning show about how Huck and Jim work together?",
    options:[
      "They are practical partners who prepare for hardship before it comes",
      "They are lazy and avoid all work",
      "Jim does nothing while Huck does everything",
      "They care only about comfort, not survival"],
    answer:0,
    why:"Building shelter before the weather turns shows foresight. By now Huck and Jim function as a capable team — Jim's steady, practical wisdom is a big part of why life on the raft runs smoothly." },

  { ch:"Chapter 12 · Passing St. Louis",
    q:"One night they drift past St. Louis, which is huge and blazing with lights. Why might Twain place their tiny dark raft right next to that giant glowing city?",
    options:[
      "To contrast the busy 'respectable' world with the two outsiders quietly slipping past it",
      "To show Huck wants to move to the city",
      "To prove the river is short",
      "Because the city lights help them steer"],
    answer:0,
    why:"The blazing city and the hidden little raft are a deliberate contrast: the settled, law-abiding world on one side, and the two runaways drifting past it in the dark on the other. They belong to different worlds." },

  { ch:"Chapter 12 · 'Borrowing'",
    q:"Huck slips ashore at night and takes chickens, corn, and melons. He calls it 'borrowing' because Pap said borrowing is fine if you mean to pay it back someday. What is Twain really doing here?",
    options:[
      "Gently mocking how people invent nice words to excuse doing something wrong",
      "Teaching that stealing food is always fine",
      "Showing that Pap was a wise and honest man",
      "Proving Huck never takes anything"],
    answer:0,
    why:"Calling theft 'borrowing' is a comfortable lie. Twain is poking fun at the way people dress up wrongdoing in polite words to keep their conscience clean — a theme that runs through the whole book." },

  { ch:"Chapter 12 · A Convenient Conscience",
    q:"To feel better, Huck and Jim decide to STOP taking just two things: crab-apples and persimmons — which weren't even ripe or good yet. Why is their choice a little bit funny?",
    options:[
      "They 'give up' only the items they didn't want anyway, so it costs them nothing",
      "Crab-apples and persimmons are the most valuable foods",
      "They actually gave up all their food",
      "Jim forced Huck to stop eating fruit"],
    answer:0,
    why:"They quiet their conscience by swearing off the two foods that were worthless anyway. It's a comic, very human trick — feeling moral while sacrificing nothing. Twain smiles at how easily people fool themselves." },

  { ch:"Chapter 12 · The Wrecked Steamboat",
    q:"They come upon a steamboat wrecked on the rocks in a storm. Huck is eager to climb aboard; Jim wants nothing to do with it. What does each reaction tell us about them?",
    options:[
      "Huck is hungry for adventure, while Jim is cautious and wisely senses danger",
      "Huck is a coward and Jim is reckless",
      "Both of them want to explore equally",
      "Jim is only pretending to be scared"],
    answer:0,
    why:"Huck's craving for excitement pushes him toward the wreck, while Jim's caution warns him away. Again and again Jim's instincts are the sensible ones — and once again Huck talks him into taking the risk." },

  { ch:"Chapter 12 · Why Huck Insists",
    q:"Huck argues they should board the wreck because 'Tom Sawyer wouldn't back out.' What does this reason reveal about what drives Huck here?",
    options:[
      "He's chasing the thrill of adventure-book heroics instead of thinking about real danger",
      "He truly needs something from the wreck to survive",
      "Tom Sawyer is actually on the boat",
      "Jim begged Huck to explore it"],
    answer:0,
    why:"Huck measures the moment against storybook adventure — what Tom Sawyer would do — not against real risk. Twain shows how romantic adventure tales can tempt a boy into genuine danger." },

  { ch:"Chapter 12 · What Huck Overhears",
    q:"Sneaking through the wreck, Huck hears men's voices. What alarming thing does he discover is happening on board?",
    options:[
      "A gang of robbers has a man tied up and is arguing over whether to kill him",
      "A family is having a quiet dinner",
      "The crew is trying to rescue the boat",
      "Two boys are playing a game"],
    answer:0,
    why:"The 'adventure' turns real and deadly: Huck stumbles onto a band of robbers holding a captive and debating his murder. What looked like a fun explore is now a life-or-death situation." },

  { ch:"Chapter 12 · The Robbers' Logic",
    q:"The robbers decide NOT to shoot their prisoner, but to leave him on the wreck to drown when it breaks apart. Why do they prefer that?",
    options:[
      "They tell themselves it's safer and less like murder, even though the man dies either way",
      "They have suddenly become kind and merciful",
      "They plan to come back and rescue him",
      "They are out of bullets"],
    answer:0,
    why:"Leaving him to drown lets the robbers feel less guilty than pulling a trigger — even though the result is the same death. It echoes the 'borrowing' joke: people rename a bad act to make it feel acceptable." },

  { ch:"Chapter 12 · Huck's Conscience",
    q:"Even though these men are dangerous criminals, Huck starts worrying about the prisoner being left to die. What does this show about Huck?",
    options:[
      "His sense of right and wrong reaches even to people society would call bad",
      "He wants to join the robber gang",
      "He no longer cares about anyone",
      "He is only trying to steal from them"],
    answer:0,
    why:"Huck can't stomach leaving a man to drown, even a criminal. That flash of compassion — worrying about someone he has every reason to ignore — is a quiet sign of his growing conscience." },

  { ch:"Chapter 12 · A Sudden Disaster",
    q:"While Huck is exploring, Jim discovers something terrifying about their raft. What has happened?",
    options:[
      "The raft has torn loose and floated away, stranding them on the sinking wreck",
      "The raft has been stolen by the robbers",
      "The raft has caught fire",
      "Jim accidentally sank the raft"],
    answer:0,
    why:"Their escape vehicle drifts off, leaving Huck and Jim trapped on a sinking wreck with murderers. It's a gut-punch consequence — the reckless hunt for adventure has cost them their safety." },

  { ch:"Chapter 12 · Irony of the Adventure",
    q:"Huck went aboard chasing excitement, and now he and Jim are trapped with killers on a wreck with no raft. Why is this a good example of irony?",
    options:[
      "The 'fun' adventure Huck wanted becomes the very thing that nearly gets them killed",
      "Nothing surprising happens at all",
      "The robbers turn out to be Huck's friends",
      "The wreck was perfectly safe the whole time"],
    answer:0,
    why:"Huck chased a thrilling adventure and got one — a deadly one. The gap between what he hoped for and what he got is the irony, and it teaches him something about the cost of recklessness." },

  { ch:"Chapter 12 · Jim's Judgment",
    q:"Looking back at the whole steamboat episode, whose instinct turned out to be right — Huck's or Jim's?",
    options:[
      "Jim's — his caution about boarding the wreck was exactly the right call",
      "Huck's — exploring the wreck was a great idea",
      "Neither had any opinion",
      "The robbers', for staying on board"],
    answer:0,
    why:"Jim didn't want to go near the wreck, and events prove him right. Twain keeps quietly showing that Jim's judgment is sound — pushing back against how the world of the story underestimates him." },

  { ch:"Chapter 12 · A Repeated Theme",
    q:"The 'borrowing' of food and the robbers renaming murder as 'letting him drown' are placed in the same chapter on purpose. What idea is Twain highlighting?",
    options:[
      "People of all kinds excuse their wrongdoing by giving it a gentler name",
      "Stealing and murder are exactly the same crime",
      "Only children ever make excuses",
      "Robbers are always honest about what they do"],
    answer:0,
    why:"Twain lines up a small excuse (Huck's 'borrowing') beside a monstrous one (the robbers' 'drowning') to show the same human habit at both extremes: renaming a wrong to make it feel okay." },

  { ch:"Chapter 12 · The Boy Huck Is Becoming",
    q:"By the end of Chapter 12, what has this adventure mainly shown us about Huck's character?",
    options:[
      "He is impulsive and adventure-hungry, but has a real conscience that's starting to guide him",
      "He is heartless and only thinks of himself",
      "He never takes any risks at all",
      "He has decided to become a robber"],
    answer:0,
    why:"Huck rushes into danger for a thrill, yet he also can't ignore a man left to die. That mix — reckless boy and caring conscience — is exactly the tension Twain is building as Huck grows up." }
];

let current = 0;
let score = 0;
let answered = false;
const passNeeded = Math.ceil(questions.length * 0.8);

const quizArea = document.getElementById('quizArea');
const resultArea = document.getElementById('resultArea');
const qcount = document.getElementById('qcount');
const scoreboard = document.getElementById('scoreboard');
const progress = document.getElementById('progress');
document.getElementById('footer').textContent =
  `For Warren · Think about WHY, not just what happens. Passing score: 80% (${passNeeded} of ${questions.length})`;

function shuffle(a) {
  for (let k = a.length - 1; k > 0; k--) {
    const j = Math.floor(Math.random() * (k + 1));
    [a[k], a[j]] = [a[j], a[k]];
  }
  return a;
}

function render() {
  answered = false;
  const item = questions[current];
  qcount.textContent = `Question ${current + 1} of ${questions.length}`;
  scoreboard.textContent = `✓ ${score}`;
  progress.style.width = `${(current / questions.length) * 100}%`;

  // Shuffle the option order so the correct answer isn't always in the same spot
  const order = shuffle(item.options.map((_, i) => i));

  let opts = order.map(origIdx =>
    `<button class="opt" data-orig="${origIdx}" onclick="choose(${origIdx})">${item.options[origIdx]}</button>`
  ).join('');

  quizArea.innerHTML = `
    <div class="card">
      <div class="qmeta">${item.ch}</div>
      <div class="qtext">${item.q}</div>
      ${opts}
      <div class="feedback" id="fb"></div>
      <div class="center"><button class="btn next" id="nextBtn" onclick="next()">Next →</button></div>
    </div>`;
}

function choose(origIdx) {
  if (answered) return;
  answered = true;
  const item = questions[current];
  const buttons = document.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const fb = document.getElementById('fb');

  const chosenBtn = [...buttons].find(b => +b.dataset.orig === origIdx);
  const correctBtn = [...buttons].find(b => +b.dataset.orig === item.answer);

  if (origIdx === item.answer) {
    score++;
    chosenBtn.classList.add('correct');
    fb.className = 'feedback good show';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${item.why}`;
  } else {
    chosenBtn.classList.add('wrong');
    correctBtn.classList.add('correct');
    fb.className = 'feedback bad show';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${item.why}`;
  }
  scoreboard.textContent = `✓ ${score}`;
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function next() {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showResult();
  }
}

function showResult() {
  quizArea.classList.add('hidden');
  document.querySelector('.bar').classList.add('hidden');
  resultArea.classList.remove('hidden');
  progress.style.width = '100%';

  const pct = Math.round((score / questions.length) * 100);
  const passed = score >= passNeeded;
  let stars, msg, emoji;
  if (pct === 100) { stars = '⭐⭐⭐⭐⭐'; msg = "Perfect score! You really understood this chapter deeply."; emoji = '🏆'; }
  else if (passed) { stars = '⭐⭐⭐⭐'; msg = "Excellent thinking! You passed with room to spare."; emoji = '🎖️'; }
  else if (pct >= 60) { stars = '⭐⭐⭐'; msg = "So close! You need 80% to pass — reread and think about the WHY behind each event."; emoji = '📖'; }
  else if (pct >= 40) { stars = '⭐⭐'; msg = "Good effort! You need 80% to pass. Re-read Chapter 12 and try again."; emoji = '📚'; }
  else { stars = '⭐'; msg = "Let's read Chapter 12 again carefully and try once more."; emoji = '🪵'; }

  const banner = passed
    ? `<div style="background:#d7f0d3;color:#2e6b34;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">🎉 PASSED! 🎉</div>`
    : `<div style="background:#fbeaea;color:#a5352a;border-radius:12px;padding:14px;font-size:24px;font-weight:bold;margin:14px 0;">Not passed yet — need 80%</div>`;

  resultArea.innerHTML = `
    <div class="big">${emoji}</div>
    <h2>Quiz Complete!</h2>
    ${banner}
    <div class="stars">${stars}</div>
    <div class="scoreline">You got <strong>${score}</strong> out of <strong>${questions.length}</strong> (${pct}%)</div>
    <div style="font-size:15px;color:#7a6a4a;margin:-4px 0 8px;">Passing score: 80% (${passNeeded} of ${questions.length})</div>
    <p style="margin:10px 0 20px;font-size:17px;">${msg}</p>
    <button class="btn" onclick="restart()">Try Again 🔄</button>`;
}

function restart() {
  current = 0; score = 0; answered = false;
  resultArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  document.querySelector('.bar').classList.remove('hidden');
  render();
}

render();
</script>
</body>
</html>
